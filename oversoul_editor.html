<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Over-Soul 원고 편집기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--text:#e8e8e8;--muted:#8892b0;--accent:#e94560;--green:#4ecca3;--border:#233554}
html,body{height:100%;font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;background:var(--bg);color:var(--text)}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);height:52px}
.header h1{font-size:15px;font-weight:700;color:var(--green)}
.header .right-info{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--muted)}
.header .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;background:var(--green)}
.main{display:flex;height:calc(100vh - 52px)}

.left{width:380px;min-width:280px;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border)}
.chat-log{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
.msg{padding:10px 14px;border-radius:12px;max-width:95%;font-size:13px;line-height:1.6;word-break:break-word}
.msg.system{background:var(--card);color:var(--muted);align-self:center;text-align:center;font-size:11px;border-radius:8px}
.msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.bot{background:var(--card);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.chat-input-area{padding:10px;border-top:1px solid var(--border);display:flex;gap:6px}
.chat-input-area textarea{flex:1;resize:none;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;height:72px}
.chat-input-area textarea:focus{border-color:var(--green)}
.chat-input-area button{width:54px;border:none;border-radius:10px;background:var(--green);color:var(--bg);font-weight:700;font-size:13px;cursor:pointer}
.chat-input-area button:hover{opacity:.85}

.resize-handle{width:5px;cursor:col-resize;background:var(--border);transition:background .2s}
.resize-handle:hover,.resize-handle.active{background:var(--accent)}

.right{flex:1;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);flex-wrap:wrap}
.toolbar button{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);font-size:11px;cursor:pointer}
.toolbar button:hover{background:var(--card)}
.toolbar button.active{background:var(--card);border-color:var(--green);color:var(--green)}
.toolbar .sep{width:1px;height:18px;background:var(--border)}
.toolbar .info{margin-left:auto;white-space:nowrap}

.find-bar{display:none;padding:8px 14px;background:var(--surface);border-bottom:1px solid var(--border);gap:6px;align-items:center}
.find-bar.open{display:flex;flex-wrap:wrap}
.find-bar input{padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;outline:none;flex:1;min-width:100px}
.find-bar input:focus{border-color:var(--green)}
.find-bar button{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--text);font-size:11px;cursor:pointer}
.find-bar button.primary{background:var(--green);color:var(--bg);border-color:var(--green)}
.find-bar span{font-size:11px;color:var(--muted)}

.editor-wrap{flex:1;overflow:hidden;display:flex}
.editor-wrap textarea{flex:1;resize:none;border:none;outline:none;background:var(--bg);color:var(--text);padding:20px 28px;font-size:15px;line-height:1.85;font-family:'Noto Serif KR','Batang',serif;tab-size:2}
.editor-wrap .preview{flex:1;overflow-y:auto;padding:20px 28px;font-family:'Noto Serif KR','Batang',serif;font-size:15px;line-height:1.85;display:none}
.editor-wrap .preview h1{font-size:22px;margin:20px 0 10px;color:var(--green)}
.editor-wrap .preview h2{font-size:18px;margin:16px 0 8px;color:var(--green)}
.editor-wrap .preview h3{font-size:16px;margin:12px 0 6px;color:var(--accent)}
.editor-wrap .preview blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--muted);margin:8px 0}
.editor-wrap .preview strong{color:#fff}
.editor-wrap .preview hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.editor-wrap .preview img{max-width:100%;border-radius:8px;margin:10px 0}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){.main{flex-direction:column}.left{width:100%;height:35vh;min-width:unset}.resize-handle{display:none}.right{height:65vh}}
</style>
</head>
<body>
<div class="header">
  <h1>Over-Soul 원고 편집기</h1>
  <div class="right-info">
    <span><span class="dot"></span><span id="statusText">준비됨</span></span>
    <span>|</span>
    <span id="charCount">0자</span>
  </div>
</div>
<div class="main">
  <div class="left" id="leftPanel">
    <div class="chat-log" id="chatLog">
      <div class="msg system">원고를 직접 편집하거나, 여기에 명령을 입력하세요.<br><b>"원문" → "수정문"</b> : 텍스트 바꾸기<br><b>끝에 추가:</b> 텍스트 : 문서 끝에 삽입<br><b>"기준" 뒤에 추가:</b> 텍스트 : 특정 위치 삽입<br><br>완료 후 <b>다운로드</b> 버튼으로 저장하세요.</div>
    </div>
    <div class="chat-input-area">
      <textarea id="chatInput" placeholder="수정 명령 입력..." rows="3"></textarea>
      <button onclick="handleChat()">전송</button>
    </div>
  </div>
  <div class="resize-handle" id="resizeHandle"></div>
  <div class="right">
    <div class="toolbar">
      <button id="btnEdit" class="active" onclick="toggleMode('edit')">편집</button>
      <button id="btnPreview" onclick="toggleMode('preview')">미리보기</button>
      <div class="sep"></div>
      <button onclick="toggleFind()">찾기/바꾸기</button>
      <button onclick="undoAction()">실행취소</button>
      <div class="sep"></div>
      <button onclick="downloadFile()" style="background:var(--green);color:var(--bg);border-color:var(--green);font-weight:700">다운로드</button>
      <div class="info" id="lineInfo">줄 1</div>
    </div>
    <div class="find-bar" id="findBar">
      <input id="findInput" placeholder="찾기..." oninput="doFind()">
      <span id="findCount"></span>
      <input id="replaceInput" placeholder="바꾸기...">
      <button onclick="doReplace()">바꾸기</button>
      <button class="primary" onclick="doReplaceAll()">모두 바꾸기</button>
    </div>
    <div class="editor-wrap">
      <textarea id="editor" spellcheck="false"></textarea>
      <div class="preview" id="preview"></div>
    </div>
  </div>
</div>
<script>
const INITIAL="# [\ucc45\ucd94\ub0a8 \ubd88\ubcc0\uc758 \uc9c0\ud61c \uc2dc\ub9ac\uc988 01]\n# \ud83c\udf3f \ub0b4 \uc548\uc758 \uc6b0\uc8fc : \ub784\ud504 \uc648\ub3c4 \uc5d0\uba38\uc2a8\uc758 \uc601\ud63c\uc744 \uae68\uc6b0\ub294 \ucd08\uc6d4\uc8fc\uc758 \uc5d0\uc138\uc774\n### (The Over-Soul)\n\n![\ucc45\ud45c\uc9c0](images/cover.png)\n\n**\uc6d0\uc800:** \ub784\ud504 \uc648\ub3c4 \uc5d0\uba38\uc2a8 (Ralph Waldo Emerson)  \n**\ubc88\uc5ed \ubc0f \ud574\uc81c:** \ucc45\ucd94\ub0a8\n\n---\n\n# \ud83d\udcd6 \ubaa9\ucc28 (Table of Contents)\n\n[TOC_PLACEHOLDER]\n\n---\n\n## \u25a0 \ucc45\ucd94\ub0a8 \uc11c\ubb38 : \ubaa8\ub4e0 \uc131\uacf5\ud559\uc758 \ubfcc\ub9ac, \uadf8 \uac70\ub300\ud55c \uc0d8\ubb3c\uc744 \ub9cc\ub098\ub2e4\n\n![\ud2b9\ubcc4\uc11c\ubb38](images/scene_ch1.png)\n\n\ub2f9\uc2e0\uc774 \uc54c\uace0 \uc788\ub294 \ubaa8\ub4e0 \uc131\uacf5\ud559 \uc11c\uc801, \uadf8 \ubaa8\ub4e0 \u2018\ub04c\uc5b4\ub2f9\uae40\uc758 \ubc95\uce59\u2019\uc774 \uc2dc\uc791\ub41c \ub2e8 \ud558\ub098\uc758 \uc9c0\uc810\uc774 \uc788\ub2e4\uba74 \ubc14\ub85c \uc774\uacf3\uc785\ub2c8\ub2e4. \n\n\uc804 \uc138\uacc4 \uc218\ucc9c\ub9cc \uba85\uc758 \uc6b4\uba85\uc744 \ubc14\uafbc \u300a\ubd80\uc790\uac00 \ub418\ub294 \uacfc\ud559\uc801\uc778 \ubc29\ubc95(The Science of Getting Rich)\u300b\uc758 \uc800\uc790 **\uc6d4\ub7ec\uc2a4 \uc6cc\ud2c0\uc2a4(Wallace Wattles)**\ub294 \uc790\uc2e0\uc758 \uc6b0\uc8fc\uad00\uacfc \uc0ac\uc0c1\uc758 \ucca0\ud559\uc801 \ubfcc\ub9ac\uac00 \ub370\uce74\ub974\ud2b8, \uc2a4\ud53c\ub178\uc790, \ub77c\uc774\ud504\ub2c8\uce20, \uc1fc\ud39c\ud558\uc6b0\uc5b4, \uadf8\ub9ac\uace0 \ud5e4\uac94\uacfc \uc5d0\uba38\uc2a8\uc758 '\uc77c\uc6d0\ub860(Monism: \uc6b0\uc8fc\uc758 \ubaa8\ub4e0 \uac83\uc740 \ud558\ub098\ub77c\ub294 \uc0ac\uc0c1)'\uc5d0 \uc788\ub2e4\uace0 \uba85\ubc31\ud788 \ubc1d\ud614\uc2b5\ub2c8\ub2e4. \ud2b9\ud788 \uadf8\ub294 \uc790\uc2e0\uc758 \ucca0\ud559\uc801 \uae30\ucd08\ub97c \ub354 \uae4a\uc774 \ud30c\uace0\ub4e4\uace0\uc790 \ud558\ub294 \ub3c5\uc790\ub4e4\uc5d0\uac8c \ub2e4\ub978 \ub204\uad6c\ubcf4\ub2e4\ub3c4 **'\ud5e4\uac94\uacfc \uc5d0\uba38\uc2a8\uc758 \uc800\uc11c\ub97c \uc9c1\uc811 \ucc3e\uc544 \uc77d\uc5b4\ubcfc \uac83'**\uc744 \uc11c\ubb38\uc5d0\uc11c \uc544\uc8fc \uac15\ub825\ud558\uac8c \ucd94\ucc9c\ud588\uc2b5\ub2c8\ub2e4.\n\n\uc2e4\uc81c\ub85c \uc6cc\ud2c0\uc2a4\ub294 \uc790\uc2e0\uc758 \ucca0\ud559\uc801 \uc0ac\uc0c9\uacfc \uc6b0\uc8fc\uad00 \uc804\ubc18\uc5d0 \uac78\uccd0 \ub784\ud504 \uc648\ub3c4 \uc5d0\uba38\uc2a8\uc758 \uc0ac\uc0c1\uc744 \uac15\ub825\ud558\uac8c \ubc18\uc601\ud588\uc73c\uba70, \ud2b9\ud788 \uc5d0\uba38\uc2a8\uc758 \uba85\uc800\uc774\uc790 \uc9c0\uae08 \ub2f9\uc2e0\uc774 \uc77d\uace0 \uc788\ub294 **\u300a\ub300\ub839(The Over-Soul, \ucd08\uc601\ud63c)\u300b**\uc744 \uc9c1\uc811 \uc9c0\ubaa9\ud558\uc5ec \ub3c5\uc790\uc5d0\uac8c \uac00\uc7a5 \uc2e0\uc911\ud558\uac8c \uc5f0\uad6c\ud560 \uac83\uc744 \uac15\ub825\ud788 \uad8c\ud588\uc2b5\ub2c8\ub2e4. \n\n\uadf8\ub294 \uc790\uc2e0\uc758 \ub610 \ub2e4\ub978 \ub300\ud45c\uc791\uc778 \u300a\uc704\ub300\ud574\uc9c0\ub294 \uacfc\ud559\uc801\uc778 \ubc29\ubc95(The Science of Being Great)\u300b\uc5d0\uc11c \ub2e4\uc74c\uacfc \uac19\uc774 \uc9c1\uc811 \uc11c\uc220\ud588\uc2b5\ub2c8\ub2e4.\n> \"\uc774 \uc704\ub300\ud55c \uc5d0\uc138\uc774(The Over-Soul)\ub294 \uc77c\uc6d0\ub860\uacfc \uc704\ub300\ud568\uc758 \uacfc\ud559\uc758 \uadfc\ubcf8 \uc6d0\ub9ac\ub97c \ubcf4\uc5ec\uc8fc\ubbc0\ub85c, \ub3c5\uc790\ub294 \ubcf8\uc11c\uc640 \ud568\uaed8 \uc774 \uc5d0\uc138\uc774\ub97c \uac00\uc7a5 \uc2e0\uc911\ud558\uac8c \uc5f0\uad6c\ud560 \uac83\uc744 \uad8c\ud55c\ub2e4.\"\n\n\ub610\ud55c \uc6cc\ud2c0\uc2a4\ub294 \uc5d0\uba38\uc2a8\uc758 \uc0ac\uc0c1\uacfc \uc5b4\uad6c\ub97c \ucc45 \uacf3\uacf3\uc5d0 \uc778\uc6a9\ud558\uba70 \uc790\uc2e0\uc758 \ud575\uc2ec \uc774\ub860\uc744 \uad6c\ucd95\ud588\uc2b5\ub2c8\ub2e4. \uc5d0\uba38\uc2a8\uc744 \uba85\uc2dc(\"as Emerson says\")\ud558\uba70 **\"\ub2f9\uc2e0 \uc790\uc2e0\uc5d0 \ub300\ud55c \uc5b4\ub5a4 \uc911\uc2ec\uc801\uc778 \uc0dd\uac01\u2026 \uc5d0\uba38\uc2a8\uc774 \ub9d0\ud588\ub4ef\uc774, \ub2f9\uc2e0\uc758 \uc0b6\uc758 \ubaa8\ub4e0 \uc0ac\uc2e4\ub4e4\uc774 \uadf8\uac83\uc5d0 \ub530\ub77c \ubc30\uc5f4\ub418\uace0 \ubd84\ub958\ub429\ub2c8\ub2e4\"**\ub77c\uba70 \uac1c\uc778\uc758 \ub0b4\uc801 \uc8fc\ud30c\uc218\uac00 \uc778\uc0dd\uc758 \ubb3c\uc9c8\uc801 \uc2e4\uc0c1\uc744 \uacb0\uc815\ud55c\ub2e4\ub294 \ubc95\uce59\uc744 \uc124\uba85\ud588\uc2b5\ub2c8\ub2e4. \ub098\uc544\uac00 **\"\uc170\uc775\uc2a4\ud53c\uc5b4\ub294 \uc170\uc775\uc2a4\ud53c\uc5b4\ub97c \uc5f0\uad6c\ud568\uc73c\ub85c\uc368 \ub9cc\ub4e4\uc5b4\uc9c0\uc9c0 \uc54a\uc744 \uac83\uc774\ub2e4. \uc170\uc775\uc2a4\ud53c\uc5b4\ub294 \uc170\uc775\uc2a4\ud53c\uc5b4\uc801\uc778 \uc0ac\uc0c1\uc744 \ud568\uc73c\ub85c\uc368 \ub9cc\ub4e4\uc5b4\uc9c8 \uac83\uc774\ub2e4\"**\ub77c\ub294 \uc5d0\uba38\uc2a8\uc758 \ud1b5\ucc30\uc744 \uc9c1\uc811 \uc778\uc6a9\ud558\uba70 \ubaa8\ubc29\uc774 \uc544\ub2cc \ucc3d\uc870\uc801\uc774\uace0 \uc8fc\uccb4\uc801\uc778 \uc0dd\uac01\uc758 \uc911\uc694\uc131\uc744 \uc5ed\uc124\ud588\uc2b5\ub2c8\ub2e4.\n\n\uadf8 \uc678\uc5d0\ub3c4 \uc6cc\ud2c0\uc2a4\uc758 \uc800\uc791\uc5d0\ub294 \ub2e4\uc74c\uacfc \uac19\uc740 \uc5d0\uba38\uc2a8\uc758 \ud575\uc2ec \uc0ac\uc0c1\uc774 \uae4a\uc774 \ub179\uc544\ub4e4\uc5b4 \uc788\uc2b5\ub2c8\ub2e4.\n*   **\"\ubaa8\ub4e0 \uc0ac\ub78c\uc758 \uc5f4\uc1e0\ub294 \uadf8\uc758 \uc0dd\uac01\uc774\ub2e4\"** (\uac1c\uc778 \uc0dd\uac01\uc758 \uc808\ub300\uc801 \ucc3d\uc870\ub825)\n*   **\"\uc704\ub300\ud55c \uc0ac\ub78c\ub4e4\uc740 \uc601\uc131\uc774 \ubb3c\uc9c8\uc801 \ud798\ubcf4\ub2e4 \uac15\ud568\uc744 \uc544\ub294 \uc0ac\ub78c\ub4e4\uc774\ub2e4\"** (\ub208\uc5d0 \ubcf4\uc774\uc9c0 \uc54a\ub294 \uc601\uc801 \uc5d0\ub108\uc9c0\uc758 \uc6b0\uc704)\n*   **\"\ud558\ub098\ub2d8\uc774 \uc774 \ud589\uc131\uc5d0 \uc704\ub300\ud55c \uc0ac\uc0c1\uac00\ub97c \ud480\uc5b4\ub193\uc73c\uc2e4 \ub54c \ubaa8\ub4e0 \uac83\uc774 \uc704\ud5d8\uc5d0 \ucc98\ud55c\ub2e4\"** (\uc0c8\ub85c\uc6b4 \ud328\ub7ec\ub2e4\uc784\uc774 \uac00\uc838\uc624\ub294 \ud30c\uad34\uc640 \ud601\uc2e0)\n\n\uc774\ucc98\ub7fc \uc6cc\ud2c0\uc2a4\uc758 \ubaa8\ub4e0 \ud48d\uc694 \ucca0\ud559\uc740 \uc5d0\uba38\uc2a8\uc774 \uc8fc\ucc3d\ud55c \u2018\ub300\ub839(The Over-Soul)\u2019\uacfc \ub0b4\uc801 \uc2e0\ub8b0\uc5d0 \ub2e8\ub2e8\ud788 \ubfcc\ub9ac\ub97c \ub0b4\ub9ac\uace0 \uc788\uc2b5\ub2c8\ub2e4. \n\n\uc624\ub298 \ub2f9\uc2e0\uc774 \uc190\uc5d0 \ub4e0 \uc774 \uc5d0\uc138\uc774 \u300a\ub300\ub839(The Over-Soul)\u300b\uc740 \uc774 \ubaa8\ub4e0 \ucd08\uc6d4\uc8fc\uc758\uc640 \ubd80(\u5bcc)\uc758 \uc0ac\uc0c1\uc774 \uc720\uae30\uc801\uc73c\ub85c \uc5ee\uc5ec \uc788\ub294 \uac70\ub300\ud55c \ubfcc\ub9ac\uc774\uc790, \ud604\ub300\uc758 \ubaa8\ub4e0 \uc790\uae30\uacc4\ubc1c\uc11c\uc640 \uc131\uacf5\ud559 \uc11c\uc801\ub4e4\uc774 \uc218\uc5c6\uc774 \uc7ac\uc778\uc6a9\ud558\uace0 \ubcc0\uc8fc\ud574\uc628 **\u2018\uc624\ub9ac\uc9c0\ub110 \uc124\uacc4\ub3c4\u2019**\uc785\ub2c8\ub2e4. \n*   **\uc6cc\ud2c0\uc2a4**\ub294 \uc774 \uc704\ub300\ud55c \uc6b0\uc8fc\uc801 \uc77c\uc6d0\ub860\uc5d0\uc11c \ud48d\uc694\ub97c \ucc3d\uc870\ud558\ub294 \u2018\ubb34\ud615\uc758 \ubb3c\uc9c8\u2019\uc774\ub77c\ub294 \uc601\uac10\uc744 \uc5bb\uc5c8\uace0, \n*   **\ub098\ud3f4\ub808\uc628 \ud790**\uc740 \uc5ec\uae30\uc11c \uc628 \uc6b0\uc8fc\uc640 \uc5f0\uacb0\ub41c \u2018\ubb34\ud55c \uc9c0\uc131\u2019\uc758 \uac1c\ub150\uc744 \ubc30\uc6e0\uc73c\uba70, \n*   **\ub860\ub2e4 \ubc88**\uc740 \uc5ec\uae30\uc11c \ub04c\uc5b4\ub2f9\uae40\uc758 \ube44\ubc00\uc778 \u2018\uc2dc\ud06c\ub9bf\u2019\uc758 \uc5f4\uc1e0\ub97c \ucc3e\uc558\uc2b5\ub2c8\ub2e4. \n\n\uc6b0\ub9ac\ub294 \uc774\uc81c \uacc1\uac00\uc9c0\uac00 \uc544\ub2cc \u2018\ubfcc\ub9ac\u2019\ub97c \ub9cc\ub0a9\ub2c8\ub2e4. 2\ucc28, 3\ucc28\ub85c \uac00\uacf5\ub41c \uc815\ubcf4\uac00 \uc544\ub2c8\ub77c, \uac70\uc7a5\ub4e4\uc758 \uac70\uc7a5\uc774 \ub9c8\uc168\ub358 \uadf8 \uc21c\uc218\ud558\uace0 \uac15\ub825\ud55c \uc9c0\ud61c\uc758 \uc0d8\ubb3c\uc744 \uc9c1\uc811 \ub9c8\uc2dc\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4. \uc774 \ucc45\uc744 \uc77d\ub294 \uac83\uc740 \ub2f9\uc2e0 \uc548\uc5d0 \uc7a0\ub4e4\uc5b4 \uc788\ub294 \uc6b0\uc8fc\uc801 \uac70\uc778, \uc989 \u2018\ub300\ub839\u2019\uacfc \ub2e4\uc2dc \uc5f0\uacb0\ub418\ub294 \uac00\uc7a5 \ube60\ub974\uace0 \ud655\uc2e4\ud55c \uae38\uc785\ub2c8\ub2e4. \n\n> \"\uc6b0\ub9ac\ub294 \uc6b0\uc8fc\uc801 \ubc14\ub2e4\uc758 \ud30c\ub3c4\ub2e4.\"\n\n\uc774\uc81c, \ubaa8\ub4e0 \ud48d\uc694\uc758 \uc2dc\uc791\uc810\uc73c\ub85c \ub2f9\uc2e0\uc744 \ucd08\ub300\ud569\ub2c8\ub2e4.\n\n---\n\n## \u25a0 \uc81c1\ubd80\n\n![\uc81c1\ubd80](images/scene_ch2.png)\n\n\ub784\ud504 \uc648\ub3c4 \uc5d0\uba38\uc2a8 (Ralph Waldo Emerson, 1801-1882)\n\ub300\ub839 (The Over-Soul)\n\uc5d0\uc138\uc774 \uc81c1\uc9d1 (1841) \uc218\ub85d\n\"\uadf8\ub7ec\ub098 \uc2e0\uc740 \uc790\uc2e0\uc758 \uc120\ud55c \uc0dd\uba85\uc744 \ub098\ub204\uc5b4 \uac00\uc9c4 \uc601\ud63c\ub4e4\uc744 \uc790\uae30 \uc790\uc2e0\ucc98\ub7fc \uc0ac\ub791\ud558\uc2ed\ub2c8\ub2e4. \ub2f9\uc2e0\uc740 \uc2e0\uc758 \ub208\ub3d9\uc790\ub9cc\ud07c\uc774\ub098 \uadf8\ubd84\uaed8 \uc544\uc8fc \uc18c\uc911\ud55c \uc874\uc7ac\ub78d\ub2c8\ub2e4. \uc2e0\uc740 \uacb0\ucf54 \ub2f9\uc2e0\uc744 \uc800\ubc84\ub9ac\uc9c0 \uc54a\uc73c\uc2e4 \ud14c\ub2c8, \ub9cc\uc57d \ub2f9\uc2e0\uc774 \uc8fd\ub294\ub2e4\uba74 \ud558\ub098\ub2d8 \uc790\uc2e0\ub3c4 \ud568\uaed8 \uc8fd\uc744 \ub9cc\ud07c \uc6b0\ub9ac\ub294 \uae4a\uc774 \uc5f0\uacb0\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \ubaa8\ub450 \uc0b4 \uac83\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \ubcf5\ub41c \uc601\uc6d0 \uc18d\uc5d0\uc11c \uc601\uc6d0\ud788 \uc0b4\uc544\uac08 \uac83\uc785\ub2c8\ub2e4.\"\n\u2500 \ud5e8\ub9ac \ubaa8\uc5b4 (Henry More)\n\n\uacf5\uac04\uc740 \ub3d9\ucabd\uc5d0\uc11c \uc11c\ucabd\uae4c\uc9c0 \ub05d\uc5c6\uc774 \ub113\uc9c0\ub9cc, \uadf8 \uae38\uc744 \ub450 \ub9c8\uc74c\uc774 \ub098\ub780\ud788 \uac08 \uc218\ub294 \uc5c6\uc73c\uba70, \uadf8 \uc548\uc744 \ub458\uc774\uc11c \uc628\uc804\ud788 \uac19\uc740 \uc18d\ub3c4\ub85c \uc5ec\ud589\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4. \uc800 \uc695\uc2ec \ub9ce\uc740 \ubed0\uafb8\uae30\uac00 \ub465\uc9c0\uc5d0\uc11c \ub2e4\ub978 \uc0c8\uc758 \uc54c\uc744 \ubabd\ub545 \ubc00\uc5b4\ub0b4\ub4ef\uc774, \uc6b0\ub9ac\uc758 \uc5d0\uace0(\uc774\uae30\uc2ec)\ub294 \uc0b0 \uac83\uc774\ub4e0 \uc8fd\uc740 \uac83\uc774\ub4e0 \ub0b4 \uac83\uc774 \uc544\ub2c8\uba74 \ub2e4 \ub0b4\ucad3\uc544 \ubc84\ub9bd\ub2c8\ub2e4. \ub4e4\ud310\uc758 \ud480\uacfc \ubc14\uc704 \uc704\uc5d0\ub294 \uc2e0\ube44\ub85c\uc6b4 \ub9c8\ubc95\uc774 \uac78\ub824 \uc788\uace0, \ub0ae\uacfc \ubc24\uc758 \ud750\ub984\uc870\ucc28\ub3c4 \uc5b4\ub5a4 \ubcf4\uc774\uc9c0 \uc54a\ub294 \ud798\uc5d0 \uc758\ud574 \uc815\uad50\ud558\uac8c \uc870\uc728\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \uc138\uc0c1 \ubaa8\ub4e0 \uac83\ub4e4\uc758 \uc131\uc9c8\uacfc \uadf8 \uae4a\uc740 \ubf1b\uc18d\uc5d0\ub294, \uc2dc\ub300\uc640 \uc2dc\uac04\uc744 \ub6f0\uc5b4\ub118\uc5b4 \uae30\uc5b4\uc774 \uc790\uc2e0\uc758 \ub73b\uc744 \uc774\ub8e8\uc5b4\ub0b4\uace0\uc57c \ub9c8\ub294 \uc5b4\ub5a4 \uac70\ub300\ud55c \ud798\uc774 \uac00\ub4dd \ucc28\uc62c\ub77c \ub728\uac81\uac8c \uace0\ub3d9\uce58\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\n\uc6b0\ub9ac \uc0b6\uc5d0\ub294 \uadf8\uc800 \ud758\ub7ec\uac00\ub294 \ud3c9\ubc94\ud55c \uc2dc\uac04\uc774 \uc788\uace0, \uc55e\uc73c\ub85c\uc758 \uc0b6\uc5d0 \uc5c4\uccad\ub09c \uc601\ud5a5\uc744 \ubbf8\uce58\ub294 \uad8c\uc704 \uc788\uace0 \ud2b9\ubcc4\ud55c \uc2dc\uac04\uc774 \uba85\ud655\ud558\uac8c \ub098\ub258\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \uae4a\uc740 \uae68\ub2ec\uc74c\uc758 \ubbff\uc74c\uc740 \ucc30\ub098\uc758 \uc21c\uac04\uc5d0 \ubc18\uc9dd\ud558\uace0 \ucc3e\uc544\uc624\ub294 \ubc18\uba74, \uc6b0\ub9ac\uc758 \ub098\uc05c \uc2b5\uad00\ub4e4\uc740 \uc9c0\ub8e8\ud558\uac8c \ubc18\ubcf5\ub429\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uadf8 \uc9e7\uc740 \uc601\uc801\uc778 \uc21c\uac04\ub4e4 \uc18d\uc5d0\ub294, \uc6b0\ub9ac\uac00 \uacaa\ub294 \ub2e4\ub978 \uc5b4\ub5a4 \uc77c\uc0c1\uc801\uc778 \uacbd\ud5d8\ubcf4\ub2e4\ub3c4 \ud6e8\uc52c \ub354 \ud070 '\uc9c4\uc9dc \uc2e4\uc7ac\uac10'\uc744 \ub290\ub07c\uac8c \ub9cc\ub4dc\ub294 \uc5c4\uccad\ub09c \uae4a\uc774\uac00 \uc228\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub807\uae30 \ub54c\ubb38\uc5d0 \uc778\uac04\uc758 \ubb34\ud55c\ud55c \uac00\ub2a5\uc131\uc744 \ubbff\uace0 \uc704\ub300\ud55c \ud76c\ub9dd\uc744 \ud488\ub294 \uc0ac\ub78c\ub4e4\uc5d0\uac8c, \"\uc9c0\uae08\uae4c\uc9c0 \uacaa\uc5b4\ubd10\uc11c \uc544\ub294\ub370 \ud604\uc2e4\uc740 \uadf8\ub807\uc9c0 \uc54a\uc544\"\ub77c\uace0 \ub9d0\ud558\uba70 \uc785\uc744 \ub9c9\uc73c\ub824\ub294 \ube44\ud310\uc790\ub4e4\uc758 \ub17c\ub9ac\ub294 \uc804\ud600 \ud798\uc744 \ubc1c\ud718\ud558\uc9c0 \ubabb\ud558\ub294 \ud5db\ub41c \ud551\uacc4\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \"\uadf8\ub798, \uacfc\uac70\uc758 \uacbd\ud5d8\uc740 \ub2f9\uc2e0 \ub9d0\ub300\ub85c \uc2e4\ud328\ud22c\uc131\uc774\uc600\uc5b4\"\ub77c\uace0 \ucfe8\ud558\uac8c \uc778\uc815\ud558\uba74\uc11c\ub3c4 \uc5ec\uc804\ud788 \ub9c8\uc74c\uc18d\uc5d0 \ub048\uc9c8\uae34 \ud76c\ub9dd\uc744 \ud488\uace0 \uc0b4\uc544\uac11\ub2c8\ub2e4. \uadf8\ub7ec\ubbc0\ub85c \ube44\ud310\uc790\ub4e4\uc740 \uc6b0\ub9ac\uc758 \uac00\uc2b4\uc18d\uc5d0 \uc65c \uc774\ub7f0 \uc9c0\uc6cc\uc9c0\uc9c0 \uc54a\ub294 \ud76c\ub9dd\uc774 \uc874\uc7ac\ud558\ub294\uc9c0 \uadf8 \uc774\uc720\ub97c \ub17c\ub9ac\uc801\uc73c\ub85c \uc124\uba85\ud574 \ub0b4\uc57c\ub9cc \ud560 \uac83\uc785\ub2c8\ub2e4.\n\n\uc6b0\ub9ac \uc0b6\uc774 \ub54c\ub85c\ub294 \ucc38\uc73c\ub85c \ucd08\ub77c\ud558\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uc6b0\ub9ac\ub294 \uc798 \uc54c\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub7f0\ub370 \ub180\ub77c\uc6b4 \uac83\uc740, \uc6b0\ub9ac\uc758 \uc0b6\uc774 '\ucd08\ub77c\ud558\ub2e4'\ub294 \uac83\uc744 \ub3c4\ub300\uccb4 \uc5b4\ub5bb\uac8c \uc54c\uc544\ucc28\ub838\ub290\ub0d0\ub294 \uc810\uc785\ub2c8\ub2e4. \uc6b0\ub9ac \ub9c8\uc74c\uc18d \uae4a\uc740 \uacf3\uc5d0 \uc790\ub9ac \uc7a1\uc740 \uc774 \uc54c \uc218 \uc5c6\ub294 \ubd88\uc548\ud568\uc758 \uc9c4\uc9dc \uc774\uc720\ub294 \ubb34\uc5c7\uc77c\uae4c\uc694? \uc774 \uc624\ub798\ub418\uace0 \ub048\uc9c8\uae34 \ubd88\ub9cc\uc758 \uc815\uccb4\ub294 \ub3c4\ub300\uccb4 \ubb34\uc5c7\uc77c\uae4c\uc694? \uc6b0\ub9ac \ubaa8\ub450\uac00 \uacf5\ud1b5\uc801\uc73c\ub85c \ub290\ub07c\ub294 \uc774 \ubd80\uc871\ud568\uacfc \uc2a4\uc2a4\ub85c \uc544\ubb34\uac83\ub3c4 \ubaa8\ub978\ub2e4\ub294 \uac10\uac01\uc740, \uc0ac\uc2e4 \uc6b0\ub9ac \uc601\ud63c\uc774 \uc790\uc2e0\uc758 \uc783\uc5b4\ubc84\ub9b0 \uc704\ub300\ud55c \uad8c\ub9ac\ub97c \ub418\ucc3e\uae30 \uc704\ud574 \ub04a\uc784\uc5c6\uc774 \ubcf4\ub0b4\ub294 \uc544\uc8fc \uc12c\uc138\ud558\uace0 \ud488\uaca9 \uc788\ub294 \uc2e0\ud638\uac00 \uc544\ub2d0\uae4c\uc694? \uc65c \uc0ac\ub78c\ub4e4\uc740 \uc778\uac04\uc758 \uc5ed\uc0ac\uac00 \uc544\uc9c1 \uc81c\ub300\ub85c \ub2e4 \uc4f0\uc774\uc9c0 \uc54a\uc558\ub2e4\uace0 \ub298 \uc544\uc26c\uc6cc\ud560\uae4c\uc694? \uc65c \uc778\uac04\uc774\ub77c\ub294 \uc874\uc7ac\ub294 \ub204\uad70\uac00 \uc815\uc758 \ub0b4\ub9b0 \uc881\uc740 \ud2c0 \uc18d\uc5d0 \uac07\ud788\uc9c0 \uc54a\uace0 \ub298 \uadf8 \ub108\uba38\ub85c \ud6cc\uca4d \ub5a0\ub098\ubc84\ub824\uc11c, \uadf8 \uc815\uc758\ub97c \uc21c\uc2dd\uac04\uc5d0 \ub0a1\uc740 \uac83\uc73c\ub85c \ub9cc\ub4e4\uace0 \ub450\uaebc\uc6b4 \ucca0\ud559 \ucc45\ub4e4\uc744 \uc4f8\ubaa8\uc5c6\uac8c \ub9cc\ub4e4\uc5b4 \ubc84\ub9ac\ub294 \uac83\uc77c\uae4c\uc694?\n\n\uc778\ub958\uac00 \uc313\uc544\uc628 \uc9c0\ub09c 6\ucc9c \ub144\uc758 \uc704\ub300\ud55c \ucca0\ud559\ub3c4 \uc6b0\ub9ac \uc601\ud63c\uc774 \uac00\uc9c4 \ube44\ubc00\uc2a4\ub7ec\uc6b4 \ubc29\ub4e4\uacfc \ubcf4\ubb3c \ucc3d\uace0\ub97c \uc804\ubd80 \ub4e4\uc5ec\ub2e4\ubcf4\uc9c0\ub294 \ubabb\ud588\uc2b5\ub2c8\ub2e4. \ucca0\ud559\uc790\ub4e4\uc774 \uac70\ub4ed\ud574 \uc628 \uc218\ub9ce\uc740 \uce58\uc5f4\ud55c \ubd84\uc11d\uacfc \uc2e4\ud5d8\uc758 \ub05d\uc5d0\ub294, \uc5b8\uc81c\ub098 \uc778\uac04\uc758 \ub611\ub611\ud55c \uc9c0\uc131\uc73c\ub85c\ub294 \ub3c4\uc800\ud788 \ud480 \uc218 \uc5c6\ub294 '\uc2e0\ube44\ub85c\uc6b4 \ucc0c\uaebc\uae30'\uac00 \uacc4\uc18d \ub0a8\uc544 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \uc778\uac04\uc740 \uadf8 \uc2dc\uc791 \uc9c0\uc810\uc774 \uc5b4\ub514\uc778\uc9c0 \uae4a\uc774 \uc228\uaca8\uc838 \uc788\ub294 \uac70\ub300\ud55c \uac15\ubb3c\uacfc \uac19\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc0dd\uba85\uacfc \uc874\uc7ac\ub294 \uc6b0\ub9ac\uac00 \uc54c\uc9c0 \ubabb\ud558\ub294 \uc800 \ub108\uba38 \uc5b4\ub518\uac00\ub85c\ubd80\ud130 \uc9c0\uae08\uc758 \uc6b0\ub9ac\uc5d0\uac8c\ub85c \ub04a\uc784\uc5c6\uc774 \ud758\ub7ec \ub4e4\uc5b4\uc624\uace0 \uc788\ub294 \uac83\uc785\ub2c8\ub2e4. \uc138\uc0c1\uc744 \uc544\ubb34\ub9ac \uc644\ubcbd\ud558\uac8c \uc608\uce21\ud558\ub294 \ub611\ub611\ud55c \uacc4\uc0b0\uac00\ub77c \ud560\uc9c0\ub77c\ub3c4, \uc218\ud559\uc801\uc73c\ub85c \ub3c4\ubb34\uc9c0 \uacc4\uc0b0\ud560 \uc218 \uc5c6\ub294 \uc5b4\ub5a4 \uc2e0\ube44\ub85c\uc6b4 \uc77c\uc774 \ubc14\ub85c \ub2e4\uc74c \uc21c\uac04 \uc6b0\ub9ac\uc758 \uc0b6\uc5d0 \ub07c\uc5b4\ub4e4\uc5b4 \ubaa8\ub4e0 \uacc4\ud68d\uc744 \uac00\ub85c\ucc4c\uc9c0 \uacb0\ucf54 \uc54c \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc800\ub294 \uc81c \uc0b6\uc5d0\uc11c \ub9e4 \uc21c\uac04 \uc77c\uc5b4\ub098\ub294 \uc218\ub9ce\uc740 \uc0ac\uac74\ub4e4 \ub4a4\uc5d0, \uc800\uc758 \uc584\ud30d\ud55c '\uc758\uc9c0'\ub098 \uacc4\ud68d\ubcf4\ub2e4 \ud6e8\uc52c \ub354 \ub192\uace0 \uc704\ub300\ud55c \ucc28\uc6d0\uc758 \uc6d0\uc778\uc774 \uc874\uc7ac\ud558\uace0 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uc778\uc815\ud560 \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4.\n\n\uc6b0\ub9ac\uc5d0\uac8c \uc77c\uc5b4\ub098\ub294 \uc0ac\uac74\ub4e4\ubfd0\ub9cc \uc544\ub2c8\ub77c \ub0b4 \uba38\ub9bf\uc18d\uc5d0 \ub5a0\uc624\ub974\ub294 \uc0dd\uac01\ub3c4 \ub9c8\ucc2c\uac00\uc9c0\uc785\ub2c8\ub2e4. \ub0b4\uac00 \ubcfc \uc218 \uc5c6\ub294 \uc2e0\ube44\ub85c\uc6b4 \uacf3\uc73c\ub85c\ubd80\ud130 \ub0b4 \uc548\uc73c\ub85c \ub04a\uc784\uc5c6\uc774 \uc3df\uc544\uc9c0\ub294 \uc800 \uc0dd\uac01\uc758 \uac15\ubb3c\uc744 \uac00\ub9cc\ud788 \uc9c0\ucf1c\ubcfc \ub54c, \uc800\ub294 \uc81c\uac00 \uc2a4\uc2a4\ub85c \uc0dd\uac01\uc744 \ub9cc\ub4e4\uc5b4\ub0b4\ub294 \uc8fc\uc778\uc774 \uc544\ub2c8\ub77c \uadf8 \ub180\ub77c\uc6b4 \uc0dd\uac01\ub4e4\uc744 \ub4ec\ubfcd \uc120\ubb3c\ub85c \ubc1b\ub294 '\uc218\ud61c\uc790'\ub77c\ub294 \uac83\uc744 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uc800\ub294 \uc138\uc0c1\uc744 \ucc3d\uc870\ud558\ub294 \uc6d0\uc778\uc774 \uacb0\ucf54 \uc544\ub2d9\ub2c8\ub2e4. \uc800\ub294 \uadf8\uc800 \uc774 \ud558\ub298\uc758 \ub9d1\uc740 \ube5b\uc774 \uc81c \uc548\uc73c\ub85c \ud758\ub7ec \ub4e4\uc5b4\uc624\ub294 \uac83\uc744 \ubc14\ub77c\ubcf4\uba70 \uc9c4\uc2ec\uc73c\ub85c \uac10\ud0c4\ud558\ub294 \ud55c \uba85\uc758 \uad6c\uacbd\uafbc\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \uc81c\uac00 \ub9c8\uc74c\uc744 \uc5f4\uace0 \uac04\uc808\ud788 \ubc14\ub77c\uba70 \ubb34\uc5b8\uac00\ub97c \ubc1b\uc544\ub4e4\uc774\ub824\ub294 \ud0dc\ub3c4\ub97c \ucde8\ud560 \ub54c, \uc81c \ub9c8\uc74c\uc18d\uc5d0 \ucc2c\ub780\ud558\uac8c \ub5a0\uc624\ub974\ub294 \ub180\ub77c\uc6b4 \ube44\uc804\ub4e4\uc740 \uc81c\uac00 \uc2a4\uc2a4\ub85c \ub9cc\ub4e4\uc5b4\ub0b8 \uac83\uc774 \uc544\ub2c8\ub77c \uc800 \ub108\uba38\uc758 '\uc704\ub300\ud55c \uc5b4\ub5a4 \ub0af\uc120 \uc5d0\ub108\uc9c0'\ub85c\ubd80\ud130 \ucc3e\uc544\uc624\ub294 \uac83\uc785\ub2c8\ub2e4. \uacfc\uac70\uc640 \ud604\uc7ac\uc758 \uc798\ubabb\ub4e4\uc744 \uc815\ud655\ud788 \uc2ec\ud310\ud574 \uc8fc\ub294 \ucd5c\uace0\uc758 \uc7ac\ud310\uad00\uc774\uc790 \uc55e\uc73c\ub85c \uc77c\uc5b4\ub0a0 \uc77c\ub4e4\uc744 \uc54c\ub824\uc8fc\ub294 \uc720\uc77c\ud55c \uc608\uc5b8\uc790\ub294, \ub9c8\uce58 \uc9c0\uad6c\uac00 \uacf5\uae30\uc758 \ubd80\ub4dc\ub7ec\uc6b4 \ud314 \uc548\uc5d0 \uc548\uaca8 \uc788\ub4ef\uc774 \uc6b0\ub9ac\uac00 \uc9c0\uae08 \ud3b8\uc548\ud558\uac8c \uc548\uc2dd\ud558\uace0 \uc788\ub294 \uc800 \uc704\ub300\ud55c '\ub300\uc790\uc5f0(\uc6b0\uc8fc\uc758 \uc12d\ub9ac)' \ubc14\ub85c \uadf8\uac83\uc785\ub2c8\ub2e4. \uadf8\uac83\uc774 \ubc14\ub85c \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \ud769\uc5b4\uc9c4 \uc874\uc7ac\ub4e4\uc774 \uadf8 \uc548\uc5d0 \ud479 \uc548\uaca8\uc11c \ub2e4\ub978 \ubaa8\ub4e0 \uc0ac\ub78c\ub4e4\uacfc \uc628\uc804\ud788 \ud558\ub098\uac00 \ub418\uac8c \ub9cc\ub4e4\uc5b4 \uc8fc\ub294 \uc704\ub300\ud55c \ud558\ub098 \ub428(\uc77c\uccb4\uc131), \uc989 \uc704\ub300\ud55c '\ub300\ub839(The Over-Soul)'\uc785\ub2c8\ub2e4. \ub300\ub839\uc740 \uc6b0\ub9ac\uac00 \ub098\ub204\ub294 \uc9c4\uc2e4\ud55c \ub300\ud654\uac00 \uace7 \uac70\ub8e9\ud55c \uc608\ubc30\uac00 \ub418\uac8c \ud558\ub294 '\uc6b0\ub9ac \ubaa8\ub450\uc758 \uacf5\ud1b5\ub41c \ub9c8\uc74c'\uc774\uba70, \uc6b0\ub9ac\uc758 \ubaa8\ub4e0 \uc62c\ubc14\ub974\uace0 \uc120\ud55c \ud589\ub3d9\ub4e4\uc774 \uae30\uaebc\uc774 \uc21c\uc885\ud558\uac8c \ub418\ub294 \uc9c0\uadf9\ud788 \ub192\uace0 \uc22d\uace0\ud55c \uc6b0\uc8fc\uc758 \uc911\uc2ec\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc595\uc740 \uaf80\uc640 \ubcf4\uc798\uac83\uc5c6\ub294 \uc7ac\ub2a5\ub4e4\uc744 \uafb8\uc9d6\uace0 \ubaa8\ub4e0 \uc0ac\ub78c\uc774 \uc788\ub294 \uadf8\ub300\ub85c\uc758 \uc194\uc9c1\ud55c \ubaa8\uc2b5\uc73c\ub85c \uc11c\ub85c \ud1b5\ud558\uac8c \ub9cc\ub4e4\uba70, \uc584\ud30d\ud55c \ud600\uac00 \uc544\ub2c8\ub77c \uae4a\uc740 \uc778\uaca9\uc73c\ub85c \ub9d0\ud558\ub3c4\ub85d \uc774\ub044\ub294 \uadf8 \uc555\ub3c4\uc801\uc778 \uc2e4\uc7ac(\ub300\ub839)\ub294, \uc9c0\uae08 \uc774 \uc21c\uac04\uc5d0\ub3c4 \ub04a\uc784\uc5c6\uc774 \uc6b0\ub9ac\uc758 \uc0dd\uac01\uacfc \uc190\ub05d\uc73c\ub85c \ud758\ub7ec \ub4e4\uc5b4\uc640 \uc9c0\ud61c\uc640 \ub355, \ud798\uacfc \uc544\ub984\ub2e4\uc6c0\uc73c\ub85c \ud53c\uc5b4\ub098\ub824 \ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\n\uc6b0\ub9ac\ub294 \ub9e4\uc77c\uc758 \uccc7\ubc14\ud034 \uc18d\uc5d0\uc11c, \uac08\ub77c\uc9c4 \ub9c8\uc74c\uc18d\uc5d0\uc11c, \uc791\uc740 \uc870\uac01\ub4e4\ub85c \ubfd4\ubfd4\uc774 \ud769\uc5b4\uc9c4 \ucc44 \ubc14\uc058\uac8c \uc0b4\uc544\uac00\uc9c0\ub9cc, \ub180\ub78d\uac8c\ub3c4 \uadf8 \uc21c\uac04 \uc778\uac04\uc758 \ub0b4\uba74 \uae4a\uc740 \uacf3\uc5d0\ub294 \uc774\ubbf8 '\uc804\uccb4\uc758 \uc601\ud63c'\uc774 \ud558\ub098\ub3c4 \ube60\uc9d0\uc5c6\uc774 \uc628\uc804\ud788 \uae43\ub4e4\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \uadf8 \uc601\ud63c\uc740 \uc544\uc8fc \uc9c0\ud61c\ub85c\uc6b4 \uce68\ubb35\uc774\uba70, \uc138\uc0c1\uc758 \ubaa8\ub4e0 \uc791\uc740 \uc870\uac01\ub4e4\uc774 \ud3c9\ub4f1\ud558\uac8c \ud558\ub098\ub85c \uc5f0\uacb0\ub41c \ubcf4\ud3b8\uc801\uc778 \uc544\ub984\ub2e4\uc6c0\uc774\uc790, \uc601\uc6d0\ud788 \ucabc\uac1c\uc9c0\uc9c0 \uc54a\ub294 \uac70\ub300\ud55c '\ud558\ub098(The ONE)'\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc0b4\uc544 \uc228 \uc26c\uac8c \ud558\ub294 \uc774 \uae4a\uc740 \ud798, \uadf8\ub9ac\uace0 \uadf8 \ud798\uc774 \uc8fc\ub294 \uc5c4\uccad\ub09c \ucd95\ubcf5\uc740 \uc5b8\uc81c\ub098 \uc6b0\ub9ac\uc5d0\uac8c \ud65c\uc9dd \uc5f4\ub824 \uc788\uc2b5\ub2c8\ub2e4. \uc774 \ud798\uc740 1\ucd08\uc758 \ube48\ud2c8\ub3c4 \uc5c6\uc774 \uc644\ubcbd\ud558\uac8c \uc2a4\uc2a4\ub85c \ub9cc\uc871\ud560 \ubfd0\ub9cc \uc544\ub2c8\ub77c, \ubb34\uc5b8\uac00\ub97c \ubcf4\ub294 \ud589\ub3d9\uacfc \ubcf4\uc774\ub294 \uc0ac\ubb3c, \uad6c\uacbd\ud558\ub294 \uc0ac\ub78c\uacfc \uad6c\uacbd\uac70\ub9ac, \ub098\uc640 \uc138\uc0c1\uc774 \uc628\uc804\ud788 \ud558\ub098\uac00 \ub418\uac8c \ub9cc\ub4ed\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc6b0\ub9ac\ub294 \uc138\uc0c1\uc744 \ubc14\ub77c\ubcfc \ub54c \ud0dc\uc591, \ub2ec, \ub3d9\ubb3c, \ub098\ubb34\ucc98\ub7fc \uadf8\uc800 \uc791\uc740 \uc870\uac01\ub4e4\ub85c \uc774\ub9ac\uc800\ub9ac \ub098\ub204\uc5b4\uc11c \ubcfc \ubfd0\uc785\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uadf8 \ubc18\uc9dd\uc774\ub294 \uc791\uc740 \uc870\uac01\ub4e4\uc774 \uacb0\uad6d \ub9c8\uc9c0\ub9c9\uc5d0 \ud558\ub098\ub85c \ubaa8\uc5ec\uc11c \uc18d\ud558\uac8c \ub418\ub294 \uac70\ub300\ud55c '\uc804\uccb4'\uac00 \ubc14\ub85c \uc6b0\ub9ac \uc548\uc758 \uc601\ud63c\uc785\ub2c8\ub2e4.\n\n\uc624\uc9c1 \uadf8 \uae4a\uc740 \uc9c0\ud61c\uc758 \ub208\uc744 \ud1b5\ud574\uc11c\ub9cc \uc6b0\ub9ac\uac00 \uc0b4\uace0 \uc788\ub294 \uc2dc\ub300\uc758 \uc9d5\uc870\uc640 \uc6b4\uba85\uc744 \uc81c\ub300\ub85c \uc77d\uc5b4\ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac \ub0b4\uba74\uc758 \uc120\ud558\uace0 \ub9d1\uc740 \uc0dd\uac01\ub4e4\ub85c \ub3cc\uc544\uac00, \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \ub9c8\uc74c\uc18d\uc5d0 \uc228\uaca8\uc9c4 \uadf8 \uc608\uc5b8\uc758 \uc815\uc2e0\uc5d0 \uace0\ubd84\uace0\ubd84 \uc21c\uc751\ud560 \ub54c \ube44\ub85c\uc18c \uc6b0\ub9ac\ub294 \uc601\ud63c\uc774 \ubb34\uc5c7\uc744 \ub9d0\ud558\ub824\ub294\uc9c0 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uc774 \uc2e0\uc131\ud55c \uc0dd\uba85\uc758 \uc0d8\ubb3c\uc5d0\uc11c \uae38\uc5b4 \uc62c\ub824\uc9c4 \ub9d0\ub4e4\uc740, \uadf8 \uc0dd\uac01\uc758 \uc8fc\ud30c\uc218\uc5d0 \uc790\uc2e0\uc758 \ub9c8\uc74c\uc744 \ub9de\ucd94\uc9c0 \uc54a\uc740 \uc0ac\ub78c\ub4e4\uc758 \uadc0\uc5d0\ub294 \uadf8\uc800 \ud145 \ube48 \uba54\uc544\ub9ac\ucc98\ub7fc \uacf5\ud5c8\ud558\uac8c \ub4e4\ub9b4 \uc218\ubc16\uc5d0 \uc5c6\uc2b5\ub2c8\ub2e4. \uc800\ub294 \uac10\ud788 \uadf8 \uc704\ub300\ud55c \uc601\ud63c\uc744 \ub300\uc2e0\ud574\uc11c \ub9d0\ud560 \ub2a5\ub825\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \uc81c\uac00 \uc4f0\ub294 \uac70\uce60\uace0 \ud22c\ubc15\ud55c \ub2e8\uc5b4\ub4e4\ub85c\ub294 \uc601\ud63c\uc758 \uadf8 \ub2f9\ub2f9\ud558\uace0 \uc6c5\uc7a5\ud55c \uc758\ubbf8\ub97c \ub3c4\uc800\ud788 \ub2f4\uc544\ub0bc \uc218 \uc5c6\uc5b4\uc11c, \uadf8\uc800 \ucc28\uac11\uac8c \uc2dd\uc5b4\ubc84\ub9b4 \ubfd0\uc774\ub2c8\uae4c\uc694. \uc624\uc9c1 \uc601\ud63c\ub9cc\uc774 \uc790\uc2e0\uc774 \uc6d0\ud558\ub294 \uc0ac\ub78c\uc5d0\uac8c \uc9c1\uc811 \ub180\ub77c\uc6b4 \uc601\uac10\uc744 \uc904 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \ubcf4\uc138\uc694, \uc601\ud63c\uc758 \uac10\ub3d9\uc744 \ubc1b\uc740 \uc0ac\ub78c\ub4e4\uc758 \uc5b8\uc5b4\ub294 \uc544\ub984\ub2e4\uc6b4 \uc2dc\ucc98\ub7fc \ub2ec\ucf64\ud574\uc9c0\uace0, \uc544\uce68\uc5d0 \ubd88\uc5b4\uc624\ub294 \ubc14\ub78c\ucc98\ub7fc \uc138\uc0c1 \ub204\uad6c\uc5d0\uac8c\ub098 \ub2ff\ub294 \ubcf4\ud3b8\uc801\uc778 \uac70\ub8e9\ud568\uc744 \ub760\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub7fc\uc5d0\ub3c4 \ubd88\uad6c\ud558\uace0, \uc800\ub294 \ube44\ub85d \uc644\ubcbd\ud558\uace0 \uac70\ub8e9\ud55c \ub2e8\uc5b4\ub97c \uc4f0\uc9c0\ub294 \ubabb\ud560\uc9c0\ub77c\ub3c4 \uc81c\uac00 \uac00\uc9c4 \ud3c9\ubc94\ud55c \ub2e8\uc5b4\ub4e4\ub85c\ub77c\ub3c4 \uc774 \uc2e0\uc131\uc758 \ucc9c\uad6d\uc774 \uc5b4\ub514 \uc788\ub294\uc9c0 \uc190\uac00\ub77d\uc73c\ub85c \uac00\ub9ac\ucf1c \ubcf4\uace0 \uc2f6\uc2b5\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \uc6b0\uc8fc \ucd5c\uace0 \ubc95\uce59\uc774 \uac00\uc9c4 \ub180\ub77c\uc6b4 \ub2e8\uc21c\ud568\uacfc \uadf8 \uc5c4\uccad\ub09c \uc5d0\ub108\uc9c0\uc5d0 \ub300\ud574 \uc81c\uac00 \ubc1c\uacac\ud55c \uc791\uc740 \ud78c\ud2b8\ub4e4\uc744 \uc5ec\ub7ec\ubd84\uc5d0\uac8c \uac04\uc808\ud788 \uc804\ud574\uc8fc\uace0 \uc2f6\uc2b5\ub2c8\ub2e4.\n\n\uc6b0\ub9ac\uac00 \uc0ac\ub78c\ub4e4\uacfc \uc218\ub2e4\ub97c \ub5a8 \ub54c, \uba4d\ud558\ub2c8 \uc0c1\uc0c1\uc5d0 \ube60\uc9c0\uac70\ub098 \ubf08\uc800\ub9ac\uac8c \ud6c4\ud68c\ud560 \ub54c, \ud639\uc740 \uac10\uc815\uc774 \ud3ed\ubc1c\ud558\ub294 \uc2dc\uac04\uc774\ub098 \uae5c\uc9dd \ub180\ub77c\ub294 \uc21c\uac04\ub4e4, \uc2ec\uc9c0\uc5b4 \ub9e4\uc77c \ubc24 \uc774\uc0c1\ud55c \ubcc0\uc7a5\uc744 \ud558\uace0 \ub098\ud0c0\ub098\ub294 \uafc8\uc18d\uc758 \uac00\ub974\uce68\ub4e4\uc744 \uacf0\uacf0\uc774 \uc0dd\uac01\ud574\ubcf4\uc138\uc694. \uadf8 \uae30\uc774\ud558\uac8c \ubcc0\uc7a5\ud55c \uc0ac\uac74\ub4e4\uc774 \uc6b0\ub9ac \ub9c8\uc74c\uc758 \uc9c4\uc9dc \uc694\uc18c\ub4e4\uc744 \ud06c\uac8c \ubd80\ud480\ub824 \uc6b0\ub9ac\uc758 \uc2dc\uc120\uc744 \ud655 \ub04c\uc5b4\ub2f9\uae38 \ub54c, \uc6b0\ub9ac\ub294 \ub300\uc790\uc5f0\uc758 \uae4a\uc740 \ube44\ubc00\uc744 \uae68\ub2eb\uac8c \ud574\uc8fc\ub294 \uc218\ub9ce\uc740 \ud78c\ud2b8\ub4e4\uc744 \ub09a\uc544\ucc44\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4. \uc774 \ubaa8\ub4e0 \uc2e0\ube44\ub85c\uc6b4 \uc77c\ub4e4\uc740, \uc778\uac04 \ub0b4\uba74\uc5d0 \uc788\ub294 \uc601\ud63c\uc774 \ub2e8\uc9c0 \uc6b0\ub9ac \ubab8\uc758 \uc791\uc740 \uc7a5\uae30\ub098 \ub3c4\uad6c \uc911 \ud558\ub098\uac00 \uc544\ub2c8\ub77c, \uc6b0\ub9ac\uc758 \ubaa8\ub4e0 \ub2a5\ub825\uc744 \uc0b4\uc544 \uc6c0\uc9c1\uc774\uac8c \ud558\uace0 \uc81c\uba4b\ub300\ub85c \ubd80\ub9ac\ub294 \uc9c4\uc9dc \uc8fc\uc778\uc774\ub77c\ub294 \uac83\uc744 \uc544\uc8fc \uba85\ubc31\ud558\uac8c \ubcf4\uc5ec\uc90d\ub2c8\ub2e4. \uc601\ud63c\uc740 \uae30\uc5b5\ub825\uc774\ub098 \uacc4\uc0b0 \ub2a5\ub825, \ud639\uc740 \ube44\uad50\ud558\ub294 \ub2a5\ub825 \uac19\uc740 \ud2b9\uc815\ud55c \uae30\ub2a5\uc5d0\ub9cc \uba38\ubb3c\ub7ec \uc788\ub294 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc624\ud788\ub824 \uadf8\ub7f0 \uae30\ub2a5\ub4e4\uc744 \uc790\uc2e0\uc758 \uc190\ubc1c\ucc98\ub7fc \ub9c8\uc74c\ub300\ub85c \ubd80\ub9ac\ub294 \uc874\uc7ac\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc77c\uc885\uc758 \uc7ac\ub2a5\uc774\ub098 \ub2a5\ub825\uc774 \uc544\ub2c8\ub77c \ud658\ud558\uac8c \ube44\ucd94\ub294 '\ube5b'\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc9c0\ub2a5\uc774\ub098 \uc758\uc9c0 \uadf8 \uc790\uccb4\uac00 \uc544\ub2c8\ub77c, \uc6b0\ub9ac\uc758 \uc9c0\ub2a5\uacfc \uc758\uc9c0\ub97c \uc81c\uc77c \ub192\uc740 \uacf3\uc5d0\uc11c \ub2e4\uc2a4\ub9ac\ub294 \ucd5c\uace0\uc758 \uc8fc\uad8c\uc790\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc6b0\ub9ac\ub77c\ub294 \uc874\uc7ac\uac00 \uadf8\ub824\uc9c4 \uac70\ub300\ud55c \ubc14\ud0d5(\ubc30\uacbd)\uc774\uba70, \uadf8 \ubc14\ud0d5 \uc704\uc5d0 \uc6b0\ub9ac\uc758 \uc9c0\ub2a5\uacfc \uc758\uc9c0\uac00 \ub193\uc5ec \uc788\ub294 \uac83\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \uacb0\ucf54 \ub204\uad70\uac00\uc758 \uc18c\uc720\ubb3c\uc774 \ub41c \uc801\uc774 \uc5c6\uace0, \uc55e\uc73c\ub85c\ub3c4 \uc18c\uc720\ud560 \uc218 \uc5c6\ub294 \ubb34\ud55c\ud568 \uadf8 \uc790\uccb4\uc785\ub2c8\ub2e4.\n\n\uc6b0\ub9ac \ub9c8\uc74c\uc18d \uae4a\uc740 \uacf3, \ud639\uc740 \uc6b0\ub9ac \ub4f1 \ub4a4\uc5d0\uc11c \uc5b4\ub5a4 \uc2e0\ube44\ub85c\uc6b4 \ube5b\uc774 \uc6b0\ub9ac \ubab8\uc744 \ub6ab\uace0 \ub098\uc640 \uc138\uc0c1\uc758 \uc0ac\ubb3c\ub4e4\uc744 \ud658\ud558\uac8c \ube44\ucda5\ub2c8\ub2e4. \uadf8\ub54c \uc6b0\ub9ac\ub294 \"\uc544, \ub098\ub294 \uc544\ubb34\uac83\ub3c4 \uc544\ub2c8\uad6c\ub098. \uc624\uc9c1 \uc774 \ube5b\uc774 \uc138\uc0c1\uc758 \uc804\ubd80\uc600\uad6c\ub098\"\ub77c\ub294 \uac83\uc744 \uc2a4\uc2a4\ub85c \uae4a\uc774 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uc778\uac04\uc774\ub77c\ub294 \uc874\uc7ac\ub294, \uc138\uc0c1\uc758 \ubaa8\ub4e0 \uc9c0\ud61c\uc640 \uc120\ud568\uc774 \uba38\ubb34\ub294 \ud06c\uace0 \uc6c5\uc7a5\ud55c \uc2e0\uc804\uc758 \ud654\ub824\ud55c \uc55e\uba74(\uc785\uad6c)\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \ud3c9\uc18c\uc5d0 '\uc0ac\ub78c'\uc774\ub77c\uace0 \ubd80\ub974\ub294 \uc874\uc7ac, \uc989 \ub9e4\uc77c \ubc25\uc744 \uba39\uace0 \ubb3c\uc744 \ub9c8\uc2dc\uba70 \uc528\uc557\uc744 \uc2ec\uace0 \ub3c8\uc744 \uacc4\uc0b0\ud558\ub294 \uadf8 \uac89\ubaa8\uc2b5\uc740 \uadf8 \uc0ac\ub78c\uc758 \uc9c4\uc9dc \ubaa8\uc2b5\uc744 \ubcf4\uc5ec\uc8fc\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc624\ud788\ub824 \uc9c4\uc9dc \uadf8 \uc0ac\ub78c\uc774 \uc5b4\ub5a4 \uc874\uc7ac\uc778\uc9c0 \ud06c\uac8c \uc624\ud574\ud558\uac8c \ub9cc\ub4e4 \ubfd0\uc774\uc8e0. \uc6b0\ub9ac\ub294 \uadf8\ub7f0 \uaecd\ub370\uae30\ubfd0\uc778 \uc584\ud30d\ud55c \uc0ac\ub78c\uc758 \ubaa8\uc2b5\uc740 \uacb0\ucf54 \uc874\uacbd\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \ub9cc\uc57d \uadf8 \uc0ac\ub78c\uc774 \uc2a4\uc2a4\ub85c\uac00 \ub3c4\uad6c\ub77c\ub294 \uac83\uc744 \uc778\uc815\ud558\uace0, \uc790\uc2e0\uc758 \ud589\ub3d9\uc744 \ud1b5\ud574 \uc9c4\uc9dc \uc601\ud63c\uc774 \ubc16\uc73c\ub85c \ub4dc\ub7ec\ub098\uac8c\ub9cc \ud5c8\ub77d\ud574 \uc900\ub2e4\uba74, \uadf8 \uc704\ub300\ud55c \uc601\ud63c\uc740 \ub2e8\uc228\uc5d0 \uc6b0\ub9ac \ubaa8\ub450\uc758 \ubb34\ub98e\uc744 \uafc7\uac8c \ub9cc\ub4e4 \uac83\uc785\ub2c8\ub2e4. \uadf8 \uc704\ub300\ud55c \uc601\ud63c\uc774 \uc0ac\ub78c\uc758 \uc9c0\ub2a5\uc744 \ud1b5\ud574 \uc228\uc744 \ub0b4\uc274 \ub54c \uadf8\uac83\uc740 \ubc18\uc9dd\uc774\ub294 '\ucc9c\uc7ac\uc131'\uc774 \ub418\uace0, \uc0ac\ub78c\uc758 \uc758\uc9c0\ub97c \ud1b5\ud574 \uc228\uc744 \uc274 \ub54c \uadf8\uac83\uc740 \uc22d\uace0\ud55c '\ub355'\uc774 \ub429\ub2c8\ub2e4. \uc601\ud63c\uc774 \uc0ac\ub78c\uc758 \ub530\ub73b\ud55c \ub9c8\uc74c\uc744 \ud0c0\uace0 \ud750\ub97c \ub54c \uadf8\uac83\uc740 '\uc0ac\ub791'\uc774 \ub429\ub2c8\ub2e4. \ubc18\ub300\ub85c \uc6b0\ub9ac\uc758 \uc9c0\uc131\uc774 \ub208\uc774 \uba40\uc5b4\ubc84\ub9ac\ub294 \ube44\uadf9\uc740, \uc6b0\ub9ac\uc758 \ub611\ub611\ud55c \uc9c0\uc131\uc774 \uc601\ud63c\uc744 \ubb34\uc2dc\ud558\uace0 \uc2a4\uc2a4\ub85c \ub300\ub2e8\ud55c \ubb34\uc5b8\uac00\uac00 \ub418\ub824\uace0 \ubed7\ub308 \ub54c \ube44\ub85c\uc18c \uc2dc\uc791\ub429\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc27d\uac8c \ud754\ub4e4\ub9ac\uace0 \uc758\uc9c0\uac00 \uc57d\ud574\uc9c0\ub294 \uc774\uc720\ub3c4 \ub611\uac19\uc2b5\ub2c8\ub2e4. \uc601\ud63c\uacfc \uc5f0\uacb0\ub418\uc9c0 \uc54a\uc740 \ucc44, \ub098\ub77c\ub294 \ud55c \uac1c\uc778\uc774 \uc2a4\uc2a4\ub85c \ub3c5\ub9bd\uc801\uc778 \ud798\uc744 \uac00\uc9c4 \ubb34\uc5b8\uac00\uac00 \ub418\ub824\uace0 \ubc1c\ubc84\ub465 \uce60 \ub54c \uc6b0\ub9ac\uc758 \uc758\uc9c0\ub294 \uae43\ud138\ucc98\ub7fc \ud55c\uc5c6\uc774 \uc57d\ud574\uc9c0\ub294 \ubc95\uc785\ub2c8\ub2e4.\n\n\uc778\ub958\uac00 \ud574\uc628 \ubaa8\ub4e0 \ud6cc\ub96d\ud55c \uac1c\ud601\uacfc \ubc1c\uc804\ub4e4\uc740, \uacb0\uad6d \uc5b4\ub5bb\uac8c\ub4e0 \uc601\ud63c\uc774 \uc6b0\ub9ac\ub97c \uac70\uccd0\uc11c \uc790\uc2e0\uc774 \uac00\uc57c \ud560 \uae38\uc744 \uc790\uc720\ub86d\uac8c \uac00\ub3c4\ub85d \ub9cc\ub4e4\uc5b4 \uc8fc\ub824\ub294 \ub611\uac19\uc740 \ubaa9\uc801\uc744 \uac00\uc9c0\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc27d\uac8c \ub9d0\ud574\uc11c, \uc6b0\ub9ac\uc5d0\uac8c \uc584\ud30d\ud558\uace0 \uc0ac\uc0ac\ub85c\uc6b4 \uac1c\uc778\uc758 \uc790\uc544(\uc774\uae30\uc2ec)\ub97c \ubbf8\ub828 \uc5c6\uc774 \ubc84\ub9ac\uace0, \ub0b4 \uc548\uc758 \uc704\ub300\ud55c \ub300\ub839\uc5d0\uac8c 100% \uc628\uc804\ud788 \uc21c\uc885\ud558\ub77c\uace0 \uac00\ub974\uce58\ub294 \uac83\uc5d0 \ub2e4\ub984 \uc544\ub2d9\ub2c8\ub2e4. \uc774 \uc218\uc815\ucc98\ub7fc \ub9d1\uace0 \uc21c\uc218\ud55c \ubcf8\uc131\uc744 \uc6b0\ub9ac \ubaa8\ub450\ub294 \uc0b4\uba74\uc11c \uc5b8\uc820\uac00 \ud55c \ubc88\ucbe4\uc740 \uaf2d \ub290\ub07c\uac8c \ub429\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc544\uc27d\uac8c\ub3c4 \uc778\uac04\uc758 \uc5b8\uc5b4\uc640 \ub2e8\uc5b4\ub4e4\ub85c\ub294 \uadf8 \ub208\ubd80\uc2e0 \ube5b\uae54\uc744 \ub3c4\uc800\ud788 \uc644\ubcbd\ud558\uac8c \uadf8\ub824\ub0bc \ubc29\ubc95\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \uc601\ud63c\uc740 \ub108\ubb34\ub098\ub3c4 \uc12c\uc138\ud574\uc11c \ub9d0\ub85c \ub531 \uc798\ub77c \uc815\uc758\ud560 \uc218\ub3c4 \uc5c6\uace0 \ud06c\uae30\ub97c \uc7b4 \uc218\ub3c4 \uc5c6\uc9c0\ub9cc, \uadf8\uac83\uc774 \uc6b0\ub9ac\ub97c \ucd09\ucd09\ud558\uac8c \uc801\uc2dc\uba70 \uc2a4\uba70\ub4e4\uace0 \uc788\uace0 \uc6b0\ub9ac\ub97c \uc628\uc804\ud788 \ud488\uc5b4 \uc548\uace0 \uc788\ub2e4\ub294 \uc0ac\uc2e4\ub9cc\uc740 \ubd84\uba85\ud558\uac8c \uc54c \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc138\uc0c1\uc758 \ubaa8\ub4e0 \uc704\ub300\ud55c \uc601\uc801 \uc874\uc7ac\uac00 \uc774\ubbf8 \uc0ac\ub78c\uc758 \ub9c8\uc74c\uc18d\uc5d0 \uc788\ub2e4\ub294 \uac83\uc744 \uc798 \uc54c\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc544\uc8fc \uc9c0\ud61c\ub85c\uc6b4 \uc61b\ub0a0 \uc18d\ub2f4\uc5d0 \"\ud558\ub098\ub2d8\uc740 \uc694\ub780\ud55c \uc885\uc18c\ub9ac \ud558\ub098 \uc5c6\uc774 \uc544\uc8fc \uc870\uc6a9\ud788 \uc6b0\ub9ac\ub97c \ucc3e\uc544\uc624\uc2e0\ub2e4\"\ub77c\ub294 \ub9d0\uc774 \uc788\ub294 \uac83\uc785\ub2c8\ub2e4.\n\n\ub2e4\uc2dc \ub9d0\ud574, \uc6b0\ub9ac\uc758 \uc815\uc218\ub9ac\uc640 \uc800 \ub05d\uc5c6\ub294 \ud558\ub298 \uc0ac\uc774\uc5d0 \uc6b0\ub9ac\ub97c \ub9c9\ub294 \uc720\ub9ac\ucc3d\uc774\ub098 \ucc9c\uc7a5\uc774 \uc5c6\ub4ef\uc774, \uacb0\uacfc\ubb3c\uc5d0 \ubd88\uacfc\ud55c \uc778\uac04\uc774\ub77c\ub294 \uc874\uc7ac\uac00 \ub05d\ub098\ub294 \uacf3\uacfc \uadf8 \uc6d0\uc778\uc778 \ud558\ub098\ub2d8\uc774 \uc2dc\uc791\ub418\ub294 \uc601\ud63c\uc758 \uae4a\uc740 \uacbd\uacc4\uc120\uc5d0\ub294 \uadf8 \uc5b4\ub5a4 \uc790\ubb3c\uc1e0\ub098 \ub2e8\ub2e8\ud55c \ubcbd\ub3c4 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\ub97c \uac00\ub85c\ub9c9\ub358 \ubaa8\ub4e0 \ubcbd\uc740 \uc774\ubbf8 \uc644\uc804\ud788 \ud5c8\ubb3c\uc5b4\uc84c\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc601\ud63c \ud55c\uad6c\uc11d\uc740 \uc544\uc8fc \uae4a\uace0 \ub9d1\uc740 \uc601\uc801\uc778 \ubcf8\uc131\uc758 \ubc14\ub2e4\ub85c, \uadf8\ub9ac\uace0 \ud558\ub098\ub2d8\uc758 \uc601\uc6d0\ud55c \uc131\ud488\uc744 \ud5a5\ud574 \ud65c\uc9dd \uc5f4\ub824 \uc788\ub294 \uc0c1\ud0dc\uc785\ub2c8\ub2e4. \ubc14\ub85c \uadf8 \uc5f4\ub9b0 \ubb38\uc744 \ud1b5\ud574, \uc6b0\ub9ac\ub294 \uc815\uc758\uac00 \ubb34\uc5c7\uc778\uc9c0 \ub450 \ub208\uc73c\ub85c \ub611\ub611\ud788 \ubcf4\uace0 \uae68\ub2ec\uc73c\uba70, \uc0ac\ub791\uacfc \uc790\uc720, \uadf8\ub9ac\uace0 \uc9c4\uc815\ud55c \ud798\uc774 \ubb34\uc5c7\uc778\uc9c0 \uc544\uc8fc \uc120\uba85\ud558\uac8c \uc54c \uc218 \uc788\uac8c \ub429\ub2c8\ub2e4.\n\n\uc138\uc0c1 \uadf8 \uc5b4\ub5a4 \uc778\uac04\ub3c4 \uc774\ub7f0 \uac70\ub8e9\ud55c \ub3c4\ub355\uc801 \uc131\ud488\ub4e4(\uc0ac\ub791, \uc815\uc758, \uc790\uc720) \uc704\ub85c \uad70\ub9bc\ud558\uba70 \uc62c\ub77c\uc120 \uc801\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \uc624\ud788\ub824 \uadf8 \uc18d\uc131\ub4e4\uc774 \uc6b0\ub9ac \uba38\ub9ac \uc704\uc5d0 \uc6c5\uc7a5\ud558\uac8c \uc6b0\ub69d \uc19f\uc544 \uc788\uc9c0\uc694. \ud2b9\ud788\ub098 \uc6b0\ub9ac\uc758 \uc584\ud30d\ud55c \uac1c\uc778\uc801 \uc774\uc775\uc774 \uc6b0\ub9ac\ub97c \ub2ec\ucf64\ud558\uac8c \uc720\ud639\ud574\uc11c \uadf8 \ub3c4\ub355\uc801 \uc131\ud488\ub4e4\uc5d0 \uc0c1\ucc98\ub97c \uc785\ud788\ub824 \ub4dc\ub294 \uc544\uc2ac\uc544\uc2ac\ud55c \ubc14\ub85c \uadf8 \uc21c\uac04\uc5d0, \uc774 \uc18d\uc131\ub4e4\uc740 \ub354\uc6b1 \ub192\uace0 \ub2e8\ud638\ud558\uac8c \uc19f\uc544\uc624\ub985\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc9c0\uae08\uae4c\uc9c0 \uc774\uc57c\uae30\ud55c \uc774 \uc2e0\uc131\ud55c \ubcf8\uc131\uc774 \uac00\uc9c4 \uac15\ub825\ud55c \uc8fc\uad8c\uc740, \uc6b0\ub9ac\ub97c \uc0ac\ubc29\uc5d0\uc11c \uaf49 \uc870\uc5ec \ub9e4\uace0 \uc788\ub294 \uc138\uc0c1\uc758 \uc628\uac16 \uc81c\ud55c\uc774\ub098 \ud55c\uacc4\ub4e4\ub85c\ubd80\ud130 100% \uc790\uc720\ub86d\uac8c \ub3c5\ub9bd\ub418\uc5b4 \uc788\ub2e4\ub294 \uc0ac\uc2e4\uc744 \ud1b5\ud574 \uadf8 \uc9c4\uc9dc \ubaa8\uc2b5\uc744 \ub4dc\ub7ec\ub0c5\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc624\ud788\ub824 \uc138\uc0c1 \ubaa8\ub4e0 \uac83\uc744 \ud06c\uac8c \uac10\uc2f8 \uc548\uc73c\uba70 \uc790\uae30 \uc8fc\ubcc0\uc758 \ubaa8\ub4e0 \uc0ac\ubb3c\ub4e4\uc5d0\uac8c \ud55c\uacc4\ub97c \uadf8\uc5b4\ubc84\ub9ac\ub294 \uc8fc\uc778\uc774\uae30 \ub54c\ubb38\uc5d0, \uc81c\uac00 \uc55e\uc11c \ub9d0\uc500\ub4dc\ub838\ub4ef\uc774 \uc601\ud63c\uc740 \uc6b0\ub9ac\uac00 \uc774 \ub545\uc5d0\uc11c \uacaa\ub294 \ubaa8\ub4e0 \uc584\ud30d\ud55c \uc0c1\uc2dd\uacfc \uacbd\ud5d8\ub4e4\uc744 \uc544\uc8fc \uc2dc\uc6d0\ud558\uac8c \ubc18\ubc15\ud574 \ubc84\ub9bd\ub2c8\ub2e4. \ub9c8\ucc2c\uac00\uc9c0\ub85c \uc601\ud63c\uc740 \uc2dc\uac04\uacfc \uacf5\uac04\uc774\ub77c\ub294 \uac1c\ub150 \uc790\uccb4\ub97c \uc644\uc804\ud788 \uc5c6\uc560\ubc84\ub9bd\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \ub208\uc5d0 \ubcf4\uc774\ub294 \uac10\uac01\uc758 \ud798\uc774 \uc6cc\ub099 \uc138\uc11c \ub300\ubd80\ubd84\uc758 \uc0ac\ub78c\ub4e4 \ub9c8\uc74c\uc744 \uaf49 \uc9d3\ub20c\ub7ec\ubc84\ub9b0 \ud0d3\uc5d0, \uc6b0\ub9ac\ub294 \uc2dc\uac04\uacfc \uacf5\uac04\uc758 \ubcbd\uc774 \uc9c4\uc9dc\ub85c \uc874\uc7ac\ud558\uace0 \uc808\ub300 \ub118\uc744 \uc218 \uc5c6\ub294 \ucca0\ubcbd\uc778 \uac83\ucc98\ub7fc \ucc29\uac01\ud558\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc774 \ud604\uc2e4 \uc138\uacc4\uc5d0\uc11c \"\uc2dc\uac04\uacfc \uacf5\uac04\uc758 \ud55c\uacc4 \ub530\uc704\ub294 \uc544\ubb34\uac83\ub3c4 \uc544\ub2c8\uc57c\"\ub77c\uace0 \uac00\ubccd\uac8c \ub5a0\ub4e4\uace0 \ub2e4\ub2c8\uba74, \uc0ac\ub78c\ub4e4\uc740 \uadf8\ub97c \uc81c\uc815\uc2e0\uc774 \uc544\ub2cc \ubbf8\uce5c \uc0ac\ub78c \ucde8\uae09\ud558\uae30\uae4c\uc9c0 \ud569\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc9c4\uc2e4\uc744 \ub9d0\ud558\uc790\uba74 \uc2dc\uac04\uacfc \uacf5\uac04\uc740 \uc601\ud63c\uc758 \uc704\ub300\ud55c \ud798\uc744 \uc7ac\ub294 '\uac70\uafb8\ub85c \ub41c \ub208\uae08\uc790'\uc5d0 \ubd88\uacfc\ud560 \ubfd0\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc704\ub300\ud55c \uc815\uc2e0\uc740 \uc2dc\uac04\uc744 \uc7a5\ub09c\uac10\ucc98\ub7fc \uc774\ub9ac\uc800\ub9ac \uac00\uc9c0\uace0 \ub180\uba70 \uc544\uc8fc \uc790\uc720\ub86d\uac8c \uc7a5\ub09c\uc744 \uce69\ub2c8\ub2e4. \"\ub05d\uc5c6\ub294 \uc601\uc6d0\uc744 \ub2e8 \ud55c \uc2dc\uac04\uc774\ub77c\ub294 \uc9e7\uc740 \ud2c0 \uc18d\uc5d0 \uafb9\uafb9 \ubc00\uc5b4 \ub123\uc744 \uc218\ub3c4 \uc788\uace0, \ubc18\ub300\ub85c \ub531 \ud55c \uc2dc\uac04\ubfd0\uc778 \ucc30\ub098\ub97c \ub05d\uc5c6\ub294 \uc601\uc6d0\uc73c\ub85c \uace0\ubb34\uc904\ucc98\ub7fc \ub298\ub9b4 \uc218\ub3c4 \uc788\ub178\ub77c.\"\n\n\uc6b0\ub9ac\ub294 \uc0b4\ub2e4 \ubcf4\uba74 \uc8fc\ubbfc\ub4f1\ub85d\uc99d\uc5d0 \uc801\ud78c \ud0dc\uc5b4\ub09c \uc5f0\ub3c4\ub85c \uacc4\uc0b0\ud558\ub294 \uc721\uccb4\uc758 \ub098\uc774\uc640\ub294 \uc644\uc804\ud788 \ub2e4\ub978, \uc9c4\uc9dc '\uc80a\uc74c'\uacfc '\ub299\uc74c'\uc774 \uc6b0\ub9ac \ub9c8\uc74c\uc5d0 \uc874\uc7ac\ud55c\ub2e4\ub294 \uac83\uc744 \uc790\uc8fc \ub290\ub07c\uac8c \ub429\ub2c8\ub2e4. \uc5b4\ub5a4 \uace0\uacb0\ud558\uace0 \uc704\ub300\ud55c \uc0dd\uac01\ub4e4\uc740, \uc6b0\ub9ac\ub97c \uc5b8\uc81c\ub098 \ud48b\ud48b\ud558\uace0 \uc80a\uc740 \uc0c1\ud0dc\ub85c \ucc3e\uc544\ub0b4\uc5b4 \uc55e\uc73c\ub85c\ub3c4 \uacc4\uc18d \uadf8 \uc2f1\uadf8\ub7ec\uc6b4 \uc80a\uc74c\uc744 \uc720\uc9c0\ud560 \uc218 \uc788\uac8c \ub2e8\ub2e8\ud788 \uc9c0\ucf1c\uc90d\ub2c8\ub2e4. \uc6b0\ub9ac\ub97c \uc601\uc6d0\ud788 \uc80a\uac8c \ub9cc\ub4e4\uc5b4\uc8fc\ub294 \uadf8 \ub9c8\ubc95 \uac19\uc740 \uc0dd\uac01\uc774\ub780, \ubc14\ub85c \uc138\uc0c1 \uc5b4\ub514\uc5d0\ub098 \uc874\uc7ac\ud558\uace0 \uc601\uc6d0\ud788 \ubcc0\uce58 \uc54a\ub294 \uc544\ub984\ub2e4\uc6c0\uc744 \uc9c4\uc2ec\uc73c\ub85c \uc0ac\ub791\ud558\ub294 \ub9c8\uc74c\uc785\ub2c8\ub2e4. \uc544\ub984\ub2e4\uc6c0\uc744 \uae4a\uc774 \uc0dd\uac01\ud558\ub294 \uadf8 \uba85\uc0c1\uc5d0\uc11c \uae68\uc5b4\ub0a0 \ub54c\uba74, \ubaa8\ub4e0 \uc0ac\ub78c\uc740 \uc774 \uc9e7\uace0 \ud5c8\ubb34\ud558\uac8c \ub05d\ub0a0 \uc721\uccb4\uc758 \uc0b6\ubcf4\ub2e4\ub294 \ucc28\ub77c\ub9ac \ub0b4\uac00 '\uc601\uc6d0\ud55c \uc6b0\uc8fc\uc758 \uc138\uc6d4' \uc18d\uc5d0 \ub2f9\ub2f9\ud788 \uc18d\ud574 \uc788\ub2e4\ub294 \ubc85\ucc2c \uae30\ubd84\uc744 \ub290\ub07c\uac8c \ub429\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc9c0\uc801\uc778 \ub2a5\ub825\uc774 \ucc30\ub098\uc758 \uc21c\uac04 \uc544\uc8fc \uc791\uac8c \ubc18\uc9dd\ud558\uace0 \uae68\uc5b4\ub098\uae30\ub9cc \ud574\ub3c4, \uadf8\uac83\uc740 \uc6b0\ub9ac\ub97c \uc634\uc9dd\ub2ec\uc2f9 \ubabb \ud558\uac8c \ubb36\uace0 \uc788\ub294 \uc2dc\uac04\uc758 \uc9c0\ub8e8\ud55c \uc18d\ubc15\uc73c\ub85c\ubd80\ud130 \uc6b0\ub9ac\ub97c \uc5b4\ub290 \uc815\ub3c4 \ud6cc\uca4d \uad6c\ucd9c\ud574 \uc90d\ub2c8\ub2e4. \ubab8\uc774 \ubab9\uc2dc \uc544\ud504\uac70\ub098 \ub098\ub978\ud558\uac8c \uccd0\uc838 \uc788\uc744 \ub54c\ub77c\ub3c4, \ub9c8\uc74c\uc744 \uc6b8\ub9ac\ub294 \uc2dc \ud55c \uad6c\uc808\uc774\ub098 \ucca0\ud559\uc790\uc758 \uae4a\uc740 \ubb38\uc7a5 \ud558\ub098\ub97c \uc6b0\uc5f0\ud788 \uc77d\uac8c \ub418\uba74 \uc6b0\ub9ac\ub294 \uadf8 \uc989\uc2dc\u7cbe\u795e\uc774 \ubc88\uca4d \ub4e4\uba70 \uc644\ubcbd\ud558\uac8c \uc0c1\ucf8c\ud574\uc9d1\ub2c8\ub2e4. \ud639\uc740 \uadf8\uc800 \ud50c\ub77c\ud1a4\uc774\ub098 \uc170\uc775\uc2a4\ud53c\uc5b4\uc758 \ud6cc\ub96d\ud55c \ucc45\uc744 \uaebc\ub0b4\uac70\ub098 \uadf8\ub4e4\uc758 \uc704\ub300\ud55c \uc774\ub984\uc744 \ub9c8\uc74c\uc18d\uc5d0 \ub5a0\uc62c\ub9ac\uae30\ub9cc \ud574\ub3c4, \uc6b0\ub9ac\ub294 \uc21c\uc2dd\uac04\uc5d0 \uc2dc\uac04\uc744 \ud6cc\uca4d \ub6f0\uc5b4\ub118\uc5b4 \uc601\uc6d0\ud788 \ub299\uc9c0 \uc54a\uace0 \uc624\ub798 \uc0ac\ub294 \ub4ef\ud55c \ud669\ud640\ud55c \uae30\ubd84\uc5d0 \ud479 \uc816\uc5b4\ub4e4\uac8c \ub429\ub2c8\ub2e4. \uc544\uc8fc \uae4a\uace0 \uc2e0\uc131\ud55c \uc0dd\uac01 \ud558\ub098\uac00 \uc5b4\ub5bb\uac8c \uae4c\ub9c8\ub4dd\ud55c \uc218\ubc31 \ub144, \uc218\ucc9c \ub144\uc758 \uc2dc\uac04\uc744 \uc190\ubc14\ub2e5\ub9cc \ud558\uac8c \ucd95\uc18c\uc2dc\ucf1c \ubc84\ub9ac\uace0, \uc5b5\uac81\uc758 \ubaa8\ub4e0 \uc2dc\ub300\ub97c \uad00\ud1b5\ud558\uc5ec \uc9c0\uae08 \uc6b0\ub9ac \ub208\uc55e\uc5d0 \uc0dd\uc0dd\ud558\uac8c \uc0b4\uc544 \uc228 \uc26c\uac8c \ub9cc\ub4dc\ub294\uc9c0 \uac00\ub9cc\ud788 \uc9c0\ucf1c\ubcf4\uc2ed\uc2dc\uc624. \uc608\uc218 \uadf8\ub9ac\uc2a4\ub3c4\uc758 \uac00\ub974\uce68\uc774 2\ucc9c \ub144 \uc804 \uadf8\ubd84\uc774 \ucc98\uc74c \uc785\uc744 \uc5f4\uc5b4 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \ub9d0\uc500\ud558\uc168\ub358 \uadf8\ub0a0\ubcf4\ub2e4, \uc9c0\uae08 \uc774 \uc21c\uac04 \uc6b0\ub9ac\uc5d0\uac8c \ub354 \uc801\uc740 \uac10\ub3d9\uacfc \ud6a8\uacfc\ub97c \uc8fc\uace0 \uc788\uc2b5\ub2c8\uae4c? \uc808\ub300 \uadf8\ub807\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4.\n\n\uc138\uc0c1\uc758 \uc218\ub9ce\uc740 \uc0ac\uc2e4\ub4e4\uacfc \uc0ac\ub78c\ub4e4\uc774 \uc0b6\uc5d0\uc11c \uc5b4\ub514\uc5d0 \ubc11\uc904\uc744 \uae0b\uace0 \uc911\uc694\ud558\uac8c \uc0dd\uac01\ud558\ub294\uc9c0\ub294, \uc800\uc758 \uae4a\uc740 \uc0ac\uc720 \uc18d\uc5d0\uc11c\ub294 '\uc2dc\uac04'\uacfc \uc544\ubb34\ub7f0 \uc0c1\uad00\uc774 \uc5c6\ub294 \ubb38\uc81c\uc785\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc601\ud63c\uc758 \uc704\ub300\ud568\uc744 \uc7ac\ub294 \uc7a3\ub300\ub294 \uc5b8\uc81c\ub098 \ubcc0\ud568\uc5c6\uc774 \ub2e8 \ud558\ub098\ubfd0\uc778 \ubc18\uba74, \uc6b0\ub9ac\uc758 \uc595\uc740 \uac10\uac01\uacfc \uc138\uc18d\uc801\uc778 \uc9c0\uc2dd\uc744 \uc7ac\ub294 \uc7a3\ub300\ub294 \uc0c1\ud669\uc5d0 \ub530\ub77c \uc644\uc804\ud788 \ub2e4\ub978 \uc7a3\ub300\ub85c \ud719\ud719 \ubc14\ub01d\ub2c8\ub2e4. \uc601\ud63c\uc774 \uc6b0\ub9ac\uc5d0\uac8c \ubcf4\uc5ec\uc8fc\ub294 \uc800 \uc704\ub300\ud55c \uae68\ub2ec\uc74c \uc55e\uc5d0\uc11c\ub294 \uc2dc\uac04\ub3c4, \uacf5\uac04\ub3c4, \uadf8\ub9ac\uace0 \ub208\uc5d0 \ubcf4\uc774\ub294 \uc790\uc5f0\uc870\ucc28\ub3c4 \ubaa8\ub450 \ud754\uc801 \uc5c6\uc774 \uc791\uac8c \ucabc\uadf8\ub77c\ub4e4\uc5b4 \uc644\uc804\ud788 \uc0ac\ub77c\uc838 \ubc84\ub9bd\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc77c\uc0c1\uc801\uc73c\ub85c \ub300\ud654\ub97c \ub098\ub20c \ub54c \uc6b0\uc8fc \uc800 \uba40\ub9ac \uc5c4\uccad\ub098\uac8c \ub5a8\uc5b4\uc838 \uc788\ub294 \ubcc4\ub4e4\uc744 \uc740\uc5f0\uc911\uc5d0 \ub9c8\uce58 \ub465\uae00\uace0 \uc624\ubaa9\ud55c \ud150\ud2b8 \uc9c0\ubd95 \ud558\ub098\uc5d0 \ub2e4 \uac19\uc774 \ub9e4\ub2ec\ub824 \uc788\ub294 \uac83\ucc98\ub7fc \ubb36\uc5b4\uc11c \ubd80\ub974\ub4ef\uc774, \uc6b0\ub9ac\ub294 \ub298 \ubaa8\ub4e0 \uc0ac\ubb3c\uacfc \uc0ac\uac74\uc744 '\uc2dc\uac04'\uc774\ub77c\ub294 \ubc14\uad6c\ub2c8 \uc18d\uc5d0 \uc9d1\uc5b4\ub123\uace0 \ub9d0\ud558\ub294 \uc2b5\uad00\uc774 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc6b0\ub9ac\ub294 \ud754\ud788 \uc138\uc0c1\uc758 \ub05d\uc774 \uba40\uc5c8\ub290\ub2c8 \uac00\uae5d\ub290\ub2c8, \ud3c9\ud654\ub85c\uc6b4 \ubc00\ub808\ub2c8\uc5c4 \uc2dc\ub300\uac00 \ub2e4\uac00\uc628\ub2e4\ub290\ub2c8, \ud639\uc740 \uc815\uce58\uc801\uc774\uace0 \ub3c4\ub355\uc801\uc778 \uc0ac\ud68c \uac1c\ud601\uc758 \ub0a0\uc774 \uc5bc\ub9c8 \ub0a8\uc9c0 \uc54a\uc558\ub2e4\uace0 \ub5a0\ub4e4\uace4 \ud569\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc774 \ub9d0\uc758 \uc9c4\uc9dc \uc18d\ub73b\uc740, \uc6b0\ub9ac\uac00 \uc0dd\uac01\ud558\ub294 \uc0ac\uc2e4 \uc911 \ud558\ub098\ub294 \uadf8\uc800 \uaecd\ub370\uae30\uc77c \ubfd0\uc778 '\uc77c\uc2dc\uc801\uc778 \uac83'\uc774\uace0, \ub2e4\ub978 \ud558\ub098\ub294 \uc808\ub300\ub85c \ubcc0\ud558\uc9c0 \uc54a\uace0 \uc601\ud63c\uacfc \uc6d0\ub798\ubd80\ud130 \ub531 \ub2ec\ub77c\ubd99\uc5b4 \uc788\ub294 '\uc601\uad6c\uc801\uc778 \uac83'\uc774\ub77c\ub294 \ub73b\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc9c0\uae08 \uc808\ub300\ub85c \ubcc0\ud558\uc9c0 \uc54a\uc744 \uac70\ub77c\uace0 \uad73\uac8c \ubbff\uace0 \uc788\ub294 \uc138\uc0c1\uc758 \uc218\ub9ce\uc740 \uac83\ub4e4\uc740, \uba38\uc9c0\uc54a\uc544 \uc798 \uc775\uc740 \uacfc\uc77c\uc774 \ub098\ubb34\uc5d0\uc11c \ud22d \ub5a8\uc5b4\uc9c0\ub4ef\uc774 \uc6b0\ub9ac\uc758 \uc0b6\uc758 \uacbd\ud5d8\uc5d0\uc11c \ud558\ub098\uc529 \ud558\ub098\uc529 \ub5a8\uc5b4\uc838 \ub098\uac08 \uac83\uc785\ub2c8\ub2e4. \ubd88\uc5b4\uc624\ub294 \ubc14\ub78c\uc740 \uadf8\uac83\ub4e4\uc774 \ub5a8\uc5b4\uc838 \ub0b4\ub9b0 \uacf3\uc774 \uc5b4\ub518\uc9c0\ub3c4 \ubaa8\ub974\uac8c \uba40\ub9ac \ub0a0\ub824 \ubcf4\ub0bc \uac83\uc785\ub2c8\ub2e4. \ub208\uc55e\uc758 \uc544\ub984\ub2e4\uc6b4 \ud48d\uacbd\ub4e4, \uc720\uba85\ud55c \uc778\ubb3c\ub4e4, \ubcf4\uc2a4\ud134\uc774\ub098 \ub7f0\ub358 \uac19\uc740 \uac70\ub300\ud55c \ub3c4\uc2dc\uc870\ucc28\ub3c4 \uc0ac\uc2e4\uc740 \uacfc\uac70\uc758 \ub0a1\uc740 \uc81c\ub3c4\ub098 \uc7a0\uae50 \ud53c\uc5b4\uc62c\ub790\ub2e4 \uc0ac\ub77c\uc9c0\ub294 \uc548\uac1c, \ud639\uc740 \uc5f0\uae30\ub9cc\ud07c\uc774\ub098 \ud145 \ube44\uace0 \ub367\uc5c6\ub294 \uac83\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \uc778\uac04\uc774 \ub9cc\ub4e0 \uc0ac\ud68c\ub3c4, \uc774 \uc138\uacc4 \uc804\uccb4\ub3c4 \ubaa8\ub450 \ub9c8\ucc2c\uac00\uc9c0\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc55e\uc744 \ud655\uace0\ud558\uac8c \ubc14\ub77c\ubcf4\uba70 \uc790\uc2e0\uc758 \ubc1c\uac78\uc74c \uc55e\uc5d0 \uc0c8\ub85c\uc6b4 \uc138\uacc4\ub97c \ub05d\uc5c6\uc774 \ucc3d\uc870\ud558\uace0, \uc790\uc2e0\uc774 \ub5a0\ub098\uc628 \ub4a4\uc5d0\ub294 \uc9c0\ub098\uac04 \ub0a1\uc740 \uc138\uacc4\ub4e4\uc744 \ubbf8\ub828 \uc5c6\uc774 \ub0a8\uaca8\ub450\uace0 \ud640\uc5f0\ud788 \ub5a0\ub0a9\ub2c8\ub2e4. \uc601\ud63c\uc5d0\uac8c\ub294 \ub2ec\ub825\uc758 \ub0a0\uc9dc\ub3c4, \ubcf5\uc7a1\ud55c \uc758\ub840\ub3c4, \uc720\uba85\ud55c \uc778\ubb3c\ub3c4, \ud2b9\ubcc4\ud55c \uc0c1\ud669\ub3c4, \uc2ec\uc9c0\uc5b4 \uc0ac\ub78c\uc758 \uac89\ubaa8\uc2b5\uc870\ucc28 \uc911\uc694\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc624\uc9c1 \uc601\ud63c \uadf8 \uc790\uccb4\ub9cc\uc744 \uc54c\uc544\ubcfc \ubfd0\uc785\ub2c8\ub2e4. \uc6b0\ub9ac \uc0b6\uc5d0 \ucd18\ucd18\ud558\uac8c \uc5bd\ud600 \uc788\ub294 \uc218\ub9ce\uc740 \uc0ac\uac74\uc758 \uadf8\ubb3c\ub9dd\uc740, \uc0ac\uc2e4 \uc601\ud63c\uc774 \uc785\uace0 \uc788\ub294 \uc6b0\uc544\ud558\uace0 \ucc30\ub791\uac70\ub9ac\ub294 \uc608\ubcf5\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \uc601\ud63c\uc774 \uc55e\uc73c\ub85c \ub098\uc544\uac00\ub294 \uc9c4\ubcf4\uc758 \uc18d\ub3c4\ub294, 1 \ub354\ud558\uae30 1\uc740 2\ub77c\ub294 \uc2dd\uc758 \ub531\ub531\ud55c \uc0b0\uc218 \uacc4\uc0b0\uc774 \uc544\ub2c8\ub77c \uc624\uc9c1 \uc601\ud63c\uc774 \uac00\uc9c4 \uace0\uc720\ud55c \uc6b0\uc8fc\uc758 \ubc95\uce59\uc5d0 \ub530\ub77c \uacc4\uc0b0\ub418\uc5b4\uc57c\ub9cc \ud569\ub2c8\ub2e4. \uc601\ud63c\uc758 \uc804\uc9c4\uc740 \uc790\ub97c \ub300\uace0 \uadf8\uc740 \uc9c1\uc120\uc744 \ub530\ub77c \ud55c \uce78\uc529 \ub610\ubc15\ub610\ubc15 \uc55e\uc73c\ub85c \uac78\uc5b4\uac00\ub294 \uc2dd\uc758 \ubed4\ud55c \ub2e8\uacc4\uc801 \uc131\uc7a5\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uadf8\uac83\uc740 \ucc28\ub77c\ub9ac \ub3d9\uadf8\ub780 \uc54c\uc5d0\uc11c \uafc8\ud2c0\uac70\ub9ac\ub294 \uc560\ubc8c\ub808\ub85c, \uadf8\ub9ac\uace0 \uadf8 \uc560\ubc8c\ub808\uac00 \ud5c8\ubb3c\uc744 \ubc97\uace0 \ub0a0\uac1c\uac00 \ub2ec\ub9b0 \ub098\ube44\ub85c \uc644\uc804\ud788 \ubcc0\ud574\ubc84\ub9ac\ub294 '\ubcc0\ud0dc(Metamorphosis)'\ub85c \ud45c\ud604\ud560 \uc218 \uc788\ub294, \uc544\uc608 \ucc28\uc6d0\uc774 \ub2ec\ub77c\uc9c0\ub294 \uc0c1\ud0dc\uc758 '\uc601\uc131\uc801\uc778 \uc0c1\uc2b9'\uc785\ub2c8\ub2e4. \ub0b4 \uc548\uc758 \ucc9c\uc7ac\uc131\uc774 \uc465\uc465 \uc131\uc7a5\ud558\ub294 \uac83\uc740, \uc120\ud0dd\ubc1b\uc740 \uc544\uc8fc \ub611\ub611\ud55c \ub204\uad70\uac00\uac00 \ub2ec\ub9ac\uae30 \uc2dc\ud569\uc744 \ud558\ub4ef \uc55e\uc0ac\ub78c\uc744 \uc81c\uce58\uace0 \ub610 \ub2e4\uc74c \uc0ac\ub78c\uc744 \uc81c\uce58\uba74\uc11c \ub4a4\ucc98\uc9c4 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc5f4\ub4f1\uac10\uc774\ub77c\ub294 \uc544\ud514\uc744 \uc8fc\ub294 \ubc29\uc2dd\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uadf8\uac83\uc740 \uc131\uc7a5\uc758 \uc9c4\ud1b5\uc774 \ucc3e\uc544\uc62c \ub54c\ub9c8\ub2e4, \uc0ac\ub78c\uc774 \uc790\uae30\uac00 \ubb35\ubb35\ud788 \uc77c\ud558\ub358 \ubc14\ub85c \uadf8 \ud3c9\ubc94\ud55c \uc790\ub9ac\uc5d0\uc11c \ud48d\uc120\ucc98\ub7fc \ud6c5 \ubd80\ud480\uc5b4 \uc624\ub974\uba70, \ub9e5\ubc15\uc774 \ucff5\ucf85\uac70\ub9b4 \ub54c\ub9c8\ub2e4 \uc778\ub958\uc758 \uacc4\uae09\uacfc \uc218\ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc744 \ud1b5\uc9f8\ub85c \ub6f0\uc5b4\ub118\uc5b4\ubc84\ub9ac\ub294 \uc804\uc778\uaca9\uc801\uc774\uace0 \uc704\ub300\ud55c \ub3c4\uc57d\uc785\ub2c8\ub2e4. \ub300\ub839\uc774 \uc8fc\uc2dc\ub294 \uc2e0\uc131\ud55c \ucda9\ub3d9\uc774 \ub9c8\uc74c\uc744 \ub450\ub4dc\ub9b4 \ub54c\ub9c8\ub2e4, \uc6b0\ub9ac\uc758 \ub9c8\uc74c\uc740 \ub208\uc5d0 \ubcf4\uc774\uace0 \ud55c\uacc4\uac00 \ub69c\ub837\ud55c \uc138\uc0c1\uc758 \uc587\uc740 \uaecd\uc9c8\uc744 \uc2dc\uc6d0\ud558\uac8c \ucc22\uc5b4\ubc84\ub9ac\uace0 \uc601\uc6d0\uc758 \uc138\uacc4 \uc18d\uc73c\ub85c \uac78\uc5b4 \ub098\uc640 \uadf8 \uc2e0\uc131\ud558\uace0 \ub9d1\uc740 \uacf5\uae30\ub97c \ub9c8\uc74c\uaecf \ub4e4\uc774\ub9c8\uc2dc\uace0 \ub0b4\ubc49\uc2b5\ub2c8\ub2e4. \uadf8\ub54c \uc6b0\ub9ac\uc758 \ub9c8\uc74c\uc740 \uc138\uc0c1\uc5d0\uc11c \uc544\uc8fc \uc624\ub798\uc804\ubd80\ud130 \uc804\ud574\uc838 \uc624\ub358 \uc601\uc6d0\ud55c \uc9c4\ub9ac\ub4e4\uacfc \ub300\ud654\ub97c \ub098\ub204\uac8c \ub429\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \ud54f\uc904\uc774 \uc11e\uc778 \ud55c \uc9d1\uc548 \uc2dd\uad6c\ub4e4\ubcf4\ub2e4 \uc624\ud788\ub824 \uc218\ucc9c \ub144 \uc804 \uc2a4\ud1a0\uc544 \ucca0\ud559\uc790 \uc81c\ub178(Zeno)\ub098 \uc5d0\ud53d\ud14c\ud1a0\uc2a4\uc758 \uc5b4\ub85d\uc744 \uae30\ub85d\ud55c \uc544\ub9ac\uc548(Arrian) \uac19\uc740 \uace0\ub300\uc758 \uc704\ub300\ud55c \uc131\uc778\ub4e4\uacfc \ud6e8\uc52c \ub354 \uac00\uae5d\uace0 \uae4a\uc740 \uc601\uc801\uc778 \ub3d9\uc9c8\uac10\uc744 \ub290\ub07c\uac8c \ub429\ub2c8\ub2e4.\n\n\uc774\uac83\uc774 \ubc14\ub85c \uc6b0\ub9ac\uac00 \ub3c4\ub355\uc801\uc774\uace0 \uc9c0\uc801\uc778 \uae68\ub2ec\uc74c\uc744 \uc5bb\ub294 \uac00\uc7a5 \ucd5c\uace0\uc758 \ubc95\uce59\uc785\ub2c8\ub2e4. \ub9c8\uc74c\uc774 \ub2e8\uc21c\ud558\uace0 \uc21c\ubc15\ud55c \uc0ac\ub78c\ub4e4\uc740 \uadf8\ub4e4\uc774 \uac00\uc9c4 \ud2b9\uc720\uc758 \uc601\uc801\uc778 \uac00\ubcbc\uc6c0 \ub355\ubd84\uc5d0, \ubb34\uc5b8\uac00 \ud55c \uac00\uc9c0 \ucc29\ud55c \uc77c\uc744 \uc560\uc368\uc11c \ud574\ub0b4\ub294 \uac83\uc774 \uc544\ub2c8\ub77c, \ub9c8\uce58 \ud48d\uc120\ucc98\ub7fc \uc138\uc0c1\uc758 \ubaa8\ub4e0 \ub355\ubaa9\uc774 \uc790\uc5f0\uc2a4\ub7fd\uac8c \uc874\uc7ac\ud558\ub294 \uc2e0\uc131\ud55c \uc601\uc5ed\uc73c\ub85c \ub465\uc2e4 \ub5a0\uc624\ub985\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \ubaa8\ub4e0 \ubbf8\ub355\uc744 \ub109\ub109\ud788 \ud488\uace0 \uc788\ub294 \uac70\ub300\ud55c \uc601\ud63c\uc758 \uc0c1\ud0dc \uc548\uc5d0 \ud3c9\uc548\ud788 \uba38\ubb3c\ub7ec \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc601\ud63c\uc740 \uc6b0\ub9ac\uc5d0\uac8c \uc21c\uacb0\ud568\uc744 \uc694\uad6c\ud558\uc9c0\ub9cc, '\uc21c\uacb0'\uc774\ub77c\ub294 \ub2e8\uc5b4 \ud558\ub098\uac00 \uc601\ud63c\uc758 \uc804\ubd80\ub294 \uc544\ub2d9\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc6b0\ub9ac\uc5d0\uac8c \uc815\uc758\ub86d\uac8c \uc0b4\ub77c\uace0 \uc694\uad6c\ud558\uc9c0\ub9cc '\uc815\uc758' \uadf8 \uc790\uccb4\uac00 \uc601\ud63c\uc778 \uac83\uc740 \uc544\ub2c8\uba70, \uc120\ud55c \ud589\ub3d9\uc744 \uc694\uad6c\ud558\uc9c0\ub9cc \uc601\ud63c\uc740 \uc5b8\uc81c\ub098 \uadf8\ub7f0 \ud589\ub3d9\ub4e4\ubcf4\ub2e4 \ud6e8\uc52c \ub354 \ub192\uace0 \uc704\ub300\ud55c \ubb34\uc5b8\uac00\uc785\ub2c8\ub2e4. \uadf8\ub807\uae30 \ub54c\ubb38\uc5d0 \uc6b0\ub9ac\uac00 \uac00\uc7a5 \ub192\uc740 \ucc28\uc6d0\uc758 '\uc6b0\uc8fc\uc801 \ub3c4\ub355\uc131'\uc5d0 \ub300\ud574 \uc774\uc57c\uae30\ud558\ub2e4\uac00, \uac11\uc790\uae30 \uc218\uc900\uc744 \ub0ae\ucdb0 \uc601\ud63c\uc774 \uc2dc\ud0a4\ub294 \uac1c\ubcc4\uc801\uc778 \uc790\uc798\ud55c \ucc29\ud55c \ud589\ub3d9\ub4e4\uc744 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc5b5\uc9c0\ub85c \uac15\uc694\ud560 \ub54c\uba74 \uc660\uc9c0 \ubaa8\ub974\uac8c \uc218\uc900\uc774 \ub69d \ub5a8\uc5b4\uc9c0\uace0 \ud604\uc2e4\uacfc \uc801\ub2f9\ud788 \ud0c0\ud611\ud588\ub2e4\ub294 \uc501\uc4f8\ud568\uc774 \ub290\uaef4\uc9c0\ub294 \ubc95\uc785\ub2c8\ub2e4. \uc544\uc8fc \ud6cc\ub96d\ud55c \uc131\ud488\uc744 \ud0c0\uace0\ub09c \uc544\uc774\uc5d0\uac8c\ub294 \ucc29\ud558\uac8c \ud589\ub3d9\ud558\ub294 \ubaa8\ub4e0 \ubbf8\ub355\uc774 \uc228 \uc26c\ub294 \uac83\ucc98\ub7fc \uc790\uc5f0\uc2a4\ub7ec\uc6b4 \uc77c\uc774\uc9c0, \ud68c\ucd08\ub9ac\ub97c \ub9de\uc544\uac00\uba70 \uace0\ud1b5\uc2a4\ub7fd\uac8c \uc5b5\uc9c0\ub85c \ud6c8\ub828\ud574\uc11c \uc5bb\uc5b4\ub0b4\ub294 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uc0ac\ub78c\uc758 \uba38\ub9ac\uac00 \uc544\ub2c8\ub77c \uadf8\uc758 \ub530\ub73b\ud55c '\ub9c8\uc74c'\uc5d0 \ub300\uace0 \uc9c4\uc2ec\uc73c\ub85c \ub9d0\ud574 \ubcf4\uc2ed\uc2dc\uc624. \uadf8\ub7ec\uba74 \uadf8 \uc0ac\ub78c\uc740 \uc5b4\ub290 \uc21c\uac04 \uac11\uc790\uae30 \uc544\uc8fc \uace0\uacb0\ud558\uace0 \uc2e0\uc131\ud55c \uc0ac\ub78c\uc73c\ub85c \ubcc0\ud560 \uac83\uc785\ub2c8\ub2e4. \uc774\ucc98\ub7fc \ub530\ub73b\ud55c \uac10\uc815 \uc548\uc5d0\ub294 \uc6b0\ub9ac\uc758 \uc9c0\ub2a5\uacfc \uc0dd\uac01\uc774 \uc465\uc465 \uc790\ub77c\ub0a0 \uc218 \uc788\ub294 \uc528\uc557\uc774 \ub611\uac19\uc774 \uc228\uc5b4 \uc788\uc73c\uba70, \uc9c0\uc801\uc778 \uc131\uc7a5 \uc5ed\uc2dc \uc774 \uac10\uc815\uc758 \ubc95\uce59\uc744 \ub611\uac19\uc774 \ub530\ub985\ub2c8\ub2e4. \ub9c8\uc74c\uc18d\uc5d0 \uacb8\uc190\uacfc \uc815\uc758, \uc0ac\ub791\uacfc \ub192\uc740 \uc5f4\ub9dd\uc744 \ud488\uc744 \uc790\uaca9\uc744 \uac16\ucd98 \uc0ac\ub78c\ub4e4\uc740, \uc774\ubbf8 \uacfc\ud559\uacfc \uc608\uc220, \uc5b8\uc5b4\uc640 \uc2dc, \uc62c\ubc14\ub978 \ud589\ub3d9\uacfc \uc6b0\uc544\ud568\uc744 \uc800 \uc544\ub798\ub85c \uad7d\uc5b4\ubcf4\uba70 \uc138\uc0c1\uc744 \ud1b5\uc81c\ud558\ub294 \uac00\uc7a5 \ub192\uc740 \ubb34\ub300 \uc704\uc5d0 \ub2f9\ub2f9\ud788 \uc11c \uc788\ub294 \uac83\uc785\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc774 \ub3c4\ub355\uc801\uc778 \ucd95\ubcf5 \uc18d\uc5d0 \uba38\ubb34\ub294 \uc0ac\ub78c\uc740, \uc138\uc0c1 \uc0ac\ub78c\ub4e4\uc774 \uadf8\ud1a0\ub85d \ubd80\ub7ec\uc6cc\ud558\uace0 \ub192\uac8c \ud3c9\uac00\ud558\ub294 \ud2b9\ubcc4\ud55c \ub2a5\ub825\ub4e4\uc744 \uc544\uc8fc \ub192\uc740 \uacf3\uc5d0\uc11c \uc774\ubbf8 \ubbf8\ub9ac \ub0b4\ub2e4\ubcf4\uace0 \uc5b4\ub5bb\uac8c \ub420\uc9c0 \ud6e4\ud788 \uaff0\ub6ab\uc5b4 \uc54c\uace0 \uc788\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc0ac\ub791\uc5d0 \uae4a\uc774 \ube60\uc9c4 \uc0ac\ub78c\uc740 \ub531\ud788 \ub300\ub2e8\ud55c \uc7ac\ub2a5\uc774\ub098 \uae30\uc220\uc774 \uc5c6\uc5b4\ub3c4 \uc544\ubb34\ub7f0 \uc0c1\uad00\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \uc0ac\ub791\uc5d0 \ud479 \ube60\uc838 \ub9e4\ub8cc\ub41c \uc18c\ub140\uc758 \ub208\uc5d0\ub294, \uc124\ub839 \uadf8 \ub0a8\uc790\uac00 \ub300\ub2e8\ud55c \uc7ac\ub2a5\uc744 \uc870\uae08\ub3c4 \uac00\uc9c0\uc9c0 \ubabb\ud588\ub2e4 \ud560\uc9c0\ub77c\ub3c4 \uadf8\uac83\uc774 \uc804\ud600 \ubb38\uc81c \ub420 \uac83\uc774 \uc5c6\uc73c\ub2c8\uae4c\uc694. \uac00\uc7a5 \ub192\uace0 \uc22d\uace0\ud55c \ub9c8\uc74c(\ub300\ub839)\uc5d0 \uc790\uae30 \uc790\uc2e0\uc744 \uc628\uc804\ud788 \ub0b4\ub9e1\uae34 \uc0ac\ub78c\uc758 \uac00\uc2b4\uc740, \uadf8 \ub9c8\uc74c\uc774 \uc6b0\uc8fc\uc758 \ubaa8\ub4e0 \uc5ed\uc0ac\uc640 \ub2e8\ub2e8\ud788 \uc5f0\uacb0\ub418\uc5b4 \uc788\ub2e4\ub294 \uac83\uc744 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \uc138\uc0c1\uc758 \ud2b9\ubcc4\ud55c \uc9c0\uc2dd\uacfc \uc5c4\uccad\ub09c \ud798\uc73c\ub85c \uace7\ubc14\ub85c \ud1b5\ud558\ub294 \uac70\uce68\uc5c6\ub294 \uc655\uc758 \uae38\uc744 \uc5ec\ud589\ud558\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4. \uc774\ucc98\ub7fc \uc6b0\ub9ac \uc548\uc758 \uac00\uc7a5 \uadfc\ubcf8\uc801\uc774\uace0 \uc21c\uc218\ud55c \uac10\uc815\uc73c\ub85c \ub192\uc774 \uc19f\uc544\uc624\ub984\uc73c\ub85c\uc368, \uc6b0\ub9ac\ub294 \uc800 \uc6d0 \ub05d\uc790\ub77d\uc758 \uae4c\ub9c8\ub4dd\ud788 \uba3c \uad00\uce21\uc18c\uc5d0\uc11c\ubd80\ud130 \ub2e8\uc228\uc5d0 \uc138\uc0c1\uc758 \ud55c\uac00\uc6b4\ub370, \uc989 \ubaa8\ub4e0 \uac83\uc758 \uc6d0\uc778\uc774\uc790 \ucc9c\ucc9c\ud788 \uacb0\uacfc\ub97c \ub0b3\ub294 \uc6b0\uc8fc \uc804\uccb4\ub97c \ud55c\ub208\uc5d0 \ub0b4\ub824\ub2e4\ubcfc \uc218 \uc788\ub294 \ud558\ub098\ub2d8\uc758 \ube44\ubc00\uc2a4\ub7ec\uc6b4 \ubc29 \uc548\uc73c\ub85c \ud6cc\uca4d \ub4e4\uc5b4\uc11c\uac8c \ub41c \uac83\uc785\ub2c8\ub2e4. \uc2e0\uc131\ud55c \uc874\uc7ac\uac00 \uc6b0\ub9ac\uc5d0\uac8c \uac00\ub974\uce68\uc744 \uc8fc\ub294 \ub180\ub77c\uc6b4 \ubc29\ubc95 \uc911 \ud558\ub098\ub294, \uadf8 \uc601\ud63c\uc774 \ubc14\ub85c \ub098\uc640 \ub611\uac19\uc740 \ubaa8\uc2b5\uc73c\ub85c, \ud639\uc740 \ub0b4 \uc8fc\ubcc0\uc758 \uc218\ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc758 \ubaa8\uc2b5\uc73c\ub85c \uc9c1\uc811 \uc721\ud654\ud558\uc5ec \ub098\ud0c0\ub098\ub294 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc800\ub294 \uc774 \uc138\uc0c1 \uc18d\uc5d0\uc11c \uc0b4\uc544\uac00\uba70, \uc81c \ub9c8\uc74c\uc18d \uae4a\uc740 \uc0dd\uac01\ub4e4\uc5d0 \uc815\ub2f5\uc744 \uc54c\ub824\uc8fc\uac70\ub098 \uc81c\uac00 \ub530\ub974\uace0 \uc788\ub294 \uc704\ub300\ud55c \ubcf8\ub2a5\uc5d0 \uae30\uaebc\uc774 \uc21c\uc885\ud558\ub294 \ubaa8\uc2b5\uc744 \ubcf4\uc5ec\uc8fc\ub294 \uc218\ub9ce\uc740 \uc778\ubb3c\ub4e4\uacfc \ud568\uaed8 \ub354\ubd88\uc5b4 \uc0b4\uc544\uac00\ub294 \uac83\uc785\ub2c8\ub2e4.\n\n## \u25a0 \uc81c2\ubd80 \n\n![\uc81c2\ubd80](images/scene_ch3.png)\n\n\ub098\ub294 \uc0ac\ub78c\ub4e4 \uc18d\uc5d0\uc11c \uc601\ud63c\uc774 \uc0b4\uc544 \uc228 \uc26c\ub294 \uac83\uc744 \ubd05\ub2c8\ub2e4. \uadf8 \ubaa8\uc2b5\uc744 \ubcf4\uba70 \uc6b0\ub9ac \ubaa8\ub450\uc5d0\uac8c \ub611\uac19\uc740 \ubcf8\uc131\uc774 \ud750\ub974\uace0 \uc788\ub2e4\ub294 \uac83\uc744 \ud655\uc2e4\ud558\uac8c \ubbff\uac8c \ub418\uc8e0. \ub098\uc640 \ubd84\ub9ac\ub41c \uac83\ucc98\ub7fc \ubcf4\uc774\ub294 \ub2e4\ub978 \uc0ac\ub78c\ub4e4\uc758 \uc601\ud63c\uc740, \uc138\uc0c1 \uadf8 \uc5b4\ub5a4 \uac83\uacfc\ub3c4 \ube44\uad50\ud560 \uc218 \uc5c6\uc744 \ub9cc\ud07c \uac15\ub825\ud55c \uc790\uc11d\ucc98\ub7fc \ub098\ub97c \ub04c\uc5b4\ub2f9\uae41\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \ub0b4 \ub9c8\uc74c\uc18d\uc5d0\uc11c \uc6b0\ub9ac\uac00 \ud754\ud788 '\uaca9\uc815'\uc774\ub77c\uace0 \ubd80\ub974\ub294 \uc544\uc8fc \uac15\ub82c\ud558\uace0 \uc0c8\ub85c\uc6b4 \uac10\uc815\ub4e4, \uc989 \ub728\uac70\uc6b4 \uc0ac\ub791\uacfc \ubbf8\uc6c0, \ub450\ub824\uc6c0\uacfc \ub180\ub77c\uc6c0, \uadf8\ub9ac\uace0 \uae4a\uc740 \uc5f0\ubbfc\uc744 \ub9c8\uad6c \ubd88\ub7ec\uc77c\uc73c\ud0b5\ub2c8\ub2e4. \uc774 \uac10\uc815\ub4e4\uc774 \ubd80\ub52a\ud788\uba74\uc11c \uacb0\uad6d \uc0ac\ub78c\ub4e4 \uc0ac\uc774\uc5d0 \ub300\ud654\uc640 \uacbd\uc7c1, \uc0c1\ub300\ub97c \uc124\ub4dd\ud558\ub294 \uc77c, \ub3c4\uc2dc\uac00 \uc138\uc6cc\uc9c0\ub294 \uc77c, \uc2ec\uc9c0\uc5b4 \uce58\uc5f4\ud55c \uc804\uc7c1\uae4c\uc9c0 \uc0dd\uaca8\ub098\ub294 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub7ec\ub2c8 \uc778\uac04\uc774\ub77c\ub294 \uc874\uc7ac\uc640 \uc6b0\ub9ac\uac00 \uacaa\ub294 \uc0ac\ud68c\uc0dd\ud65c\uc740, \uc601\ud63c\uc774 \uc6b0\ub9ac\uc5d0\uac8c \uc8fc\ub294 \uadfc\ubcf8\uc801\uc778 \uac00\ub974\uce68\uc744 \ubcf4\ucda9\ud574 \uc8fc\ub294 \ud6cc\ub96d\ud55c \uc218\uc5c5\uacfc\ub3c4 \uac19\uc2b5\ub2c8\ub2e4. \uc5b4\ub9b4 \uc801 \uc80a\uc740 \uc2dc\uc808\uc5d0 \uc6b0\ub9ac\ub294 \uc0ac\ub78c\uc5d0\uac8c \uc5f4\uad11\ud569\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc720\ub144\uae30\uc640 \uccad\uc18c\ub144\uae30\uc5d0\ub294 \uc0ac\ub78c\ub4e4\uc758 \ubaa8\uc2b5 \uc18d\uc5d0\uc11c \uc138\uc0c1\uc758 \ubaa8\ub4e0 \uc758\ubbf8\ub97c \ucc3e\uc544\ub0b4\ub824 \ud558\uace4 \ud569\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc0ac\ub78c\uc774 \uc0b4\uc544\uac00\ub294 \uc774 \ub113\uace0 \uae4a\uc740 \uacbd\ud5d8\uc740, \uacb0\uad6d \uc138\uc0c1 \ubaa8\ub4e0 \uc0ac\ub78c\ub4e4\uc744 \ud1b5\ud574 \ub611\uac19\uc774 \ub4dc\ub7ec\ub098\ub294 '\ud558\ub098\uc758 \uac19\uc740 \ubcf8\uc131'\uc744 \ucc3e\uc544\ub0b4\uac8c \ub9cc\ub4ed\ub2c8\ub2e4. \uc0dd\uba85\uc774 \ub05d\uc774 \uc788\ub294 \uc720\ud55c\ud55c \uc778\uac04\uc774\ub77c\ub294 \uc874\uc7ac \uc790\uccb4\uac00, \uc624\ud788\ub824 \uc6b0\ub9ac\uc5d0\uac8c \ubaa8\uc591\ub3c4 \ud615\uccb4\ub3c4 \uc5c6\ub294 \ube44\uc778\uaca9\uc801\uc778 \uc2e0\uc131\uc744 \uae68\ub2eb\uac8c \ud574 \uc8fc\ub294 \ub180\ub77c\uc6b4 \ud1b5\ub85c\uac00 \ub418\ub294 \uac83\uc785\ub2c8\ub2e4. \ub450 \uc0ac\ub78c\uc774 \ub9c8\uc8fc \uc549\uc544 \ub098\ub204\ub294 \ubaa8\ub4e0 \ub300\ud654 \uc18d\uc5d0\ub294, \ub9c8\uce58 \ubcf4\uc774\uc9c0 \uc54a\ub294 \uc81c3\uc790\uc5d0\uac8c \ud5c8\ub77d\uc744 \uad6c\ud558\ub4ef \uc11c\ub85c \uacf5\ud1b5\ub41c \ubcf8\uc131\uc744 \uc740\uc5f0\uc911\uc5d0 \uc758\uc9c0\ud558\ub294 \uc554\ubb35\uc801\uc778 \ubc95\uce59\uc774 \uae54\ub824 \uc788\uc2b5\ub2c8\ub2e4. \uadf8 \ub300\ud654\uc5d0 \ud568\uaed8\ud558\ub294 \uc81c3\uc790, \uc989 \uacf5\ud1b5\uc758 \ubcf8\uc131\uc740 \uc0ac\ub78c\ub4e4\uc774 \ub9cc\ub4e4\uc5b4\ub0b8 \uc0ac\ud68c\uc801\uc778 \uc7a3\ub300\uac00 \uc544\ub2d9\ub2c8\ub2e4. \uadf8\uac83\uc740 \ud615\ud0dc\uac00 \uc5c6\ub294 \ube44\uc778\uaca9\uc801\uc778 \uac83, \ubc14\ub85c \ud558\ub098\ub2d8\uc774\uc2ed\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc0ac\ub78c\ub4e4\uc774 \ubaa8\uc5ec \uc9c4\uc9c0\ud558\uac8c \ud1a0\ub860\uc744 \ubc8c\uc774\ub294 \uc790\ub9ac\uc5d0\uc11c, \ud2b9\ud788\ub098 \uc778\uac04\uc758 \uc0b6\uc5d0 \ub300\ud55c \uace0\uacb0\ud558\uace0 \uae4a\uc740 \uc9c8\ubb38\ub4e4\uc5d0 \uad00\ud574 \ub300\ud654\ud560 \ub54c\uba74 \uc0ac\ub78c\ub4e4\uc740 \uc2e0\ube44\ub85c\uc6b4 \uacbd\ud5d8\uc744 \ud558\uac8c \ub429\ub2c8\ub2e4. \uc0dd\uac01\uc774\ub77c\ub294 \uac83\uc774 \uadf8\uacf3\uc5d0 \uc788\ub294 \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \uac00\uc2b4\uc18d\uc5d0\uc11c \ub2e4 \uac19\uc774 \ub611\uac19\uc740 \ub192\uc774\ub85c \ucc28\uc624\ub978\ub2e4\ub294 \uac83\uc744 \ub290\ub07c\uba70, \uc9c0\uae08 \ub9d0\uc744 \ub0b4\ubc49\ub294 \uc0ac\ub78c\ubfd0\ub9cc \uc544\ub2c8\ub77c \uadf8 \ub9d0\uc744 \ub4e3\uace0 \uc788\ub294 \ubaa8\ub4e0 \uc0ac\ub78c\uc774 \uadf8 \uc9c4\ub9ac\uc5d0 \ub300\ud574 \ub611\uac19\uc740 \uc601\uc801\uc778 \uc8fc\uc778\uc774 \ub428\uc744 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \ub300\ud654\uac00 \uae4a\uc5b4\uc9c8\uc218\ub85d \uadf8\ub4e4\uc740 \ubaa8\ub450 \uc774\uc804\ubcf4\ub2e4 \ud55c\uce35 \ub354 \uc9c0\ud61c\ub85c\uc6cc\uc9d1\ub2c8\ub2e4. \uc774\ub807\uac8c \ud558\ub098\ub85c \uc5f0\uacb0\ub41c \uc0dd\uac01\uc740 \uadf8\ub4e4 \uba38\ub9ac \uc704\uc5d0 \uac70\ub300\ud55c \uc2e0\uc804\ucc98\ub7fc \ub465\uadfc \uc544\uce58\ub97c \uadf8\ub9ac\uace0, \uadf8 \uc548\uc5d0\uc11c \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \uc2ec\uc7a5\uc740 \ub0b4 \uad8c\ub9ac\uc640 \uc758\ubb34\uc5d0 \ub300\ud55c \ub354 \ub192\uc740 \ucc45\uc784\uac10\uc73c\ub85c \ub728\uac81\uac8c \uace0\ub3d9\uce58\uba70 \ud3c9\uc18c\uc640\ub294 \ub2e4\ub978 \uc5c4\uc219\ud568\uc73c\ub85c \uc0dd\uac01\ud558\uace0 \ud589\ub3d9\ud558\uac8c \ub429\ub2c8\ub2e4. \ub300\ud654\uc5d0 \ucc38\uc5ec\ud55c \ubaa8\ub4e0 \uc0ac\ub78c\uc774 \ud3c9\uc18c\ubcf4\ub2e4 \ud6e8\uc52c \ub354 \ub192\uc740 \ucc28\uc6d0\uc758 \uc9c4\uc9dc \uc790\uc544\ub97c \ub418\ucc3e\uc558\ub2e4\ub294 \uac83\uc744 \uc2a4\uc2a4\ub85c \ub290\ub07c\uac8c \ub418\uba70, \uadf8 \ub9d1\uc740 \ube5b\uc740 \ubc29 \uc548\uc758 \ubaa8\ub4e0 \uc0ac\ub78c\uc744 \ud5a5\ud574 \ub208\ubd80\uc2dc\uac8c \ubc18\uc9dd\uc785\ub2c8\ub2e4. \uac00\uc7a5 \uc704\ub300\ud558\uace0 \ub192\uc740 \uc790\ub9ac\uc5d0 \uc788\ub294 \uc0ac\ub78c\ubd80\ud130 \uac00\uc7a5 \ud3c9\ubc94\ud558\uace0 \ub0ae\uac8c \uc5ce\ub4dc\ub9b0 \uc0ac\ub78c\uc5d0 \uc774\ub974\uae30\uae4c\uc9c0, \uc778\ub958\uc758 \ud54f\uc904\uc5d0\ub294 \uacf5\ud1b5\uc801\uc73c\ub85c \ud750\ub974\ub294 \ub180\ub77c\uc6b4 \uc9c0\ud61c\uac00 \uc788\uc2b5\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc548\ud0c0\uae5d\uac8c\ub3c4 \uc6b0\ub9ac\uc758 \ubed4\ud558\uace0 \ud3c9\ubc94\ud55c \ud559\uad50 \uad50\uc721\uc740 \uc885\uc885 \uc774 \uc9c0\ud61c\uc758 \uc785\uc744 \ud2c0\uc5b4\ub9c9\uace0 \ubc29\ud574\ud558\ub824\uace0 \uc560\ub97c \uce69\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \ub9c8\uc74c\uc740 \ubcf8\ub798 \ubfcc\ub9ac\uac00 \ud558\ub098\ub85c \uc5f0\uacb0\ub418\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub807\uae30 \ub54c\ubb38\uc5d0 \uc9c4\ub9ac \uadf8 \uc790\uccb4\ub97c \uc21c\uc218\ud558\uac8c \uc0ac\ub791\ud558\ub294 \uac00\uc7a5 \ub6f0\uc5b4\ub098\uace0 \ub9d1\uc740 \uc815\uc2e0\ub4e4\uc740, \uc774 \uc9c4\ub9ac\uac00 \uc624\uc9c1 '\ub098\ub9cc\uc758 \uac83'\uc774\ub77c\ub294 \uc584\ud30d\ud55c \uc0ac\uc801\uc778 \uc18c\uc720\uc695\uc5d0 \uc804\ud600 \uc9d1\ucc29\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \uc138\uc0c1 \uc5b4\ub514\uc5d0\uc11c \uc9c4\ub9ac\ub97c \ub9cc\ub098\ub4e0 \uadf8\uc800 \ub450 \uc190 \ubaa8\uc544 \uac10\uc0ac\ud788 \ubc1b\uc544\ub4e4\uc77c \ubfd0, \uac70\uae30\uc5d0 \uc790\uae30 \uc774\ub984\ud45c\ub97c \ubd99\uc774\uac70\ub098 \ub0b4\uac00 \ucc3e\uc544\ub0c8\ub2e4\uace0 \ub099\uc778\uc744 \ucc0d\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc9c4\ub9ac\ub780 \ud0dc\ucd08\ubd80\ud130, \uc989 \uc601\uc6d0\ud55c \uc2dc\uac04 \uc774\uc804\ubd80\ud130 \uc774\ubbf8 \uadf8\ub4e4\uc758 \uac83\uc774\uc5c8\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc138\uc0c1\uc758 \uc9c0\uc2dd\uc744 \ubabd\ub545 \uc678\uc6b4 \ud559\uc790\ub4e4\uc774\ub098 \ud131\uc744 \uad34\uace0 \uc0dd\uac01\uc5d0 \ube60\uc9c4 \ucca0\ud559\uc790\ub4e4\ub9cc\uc774 \uc9c0\ud61c\ub97c \ud63c\uc790 \ubabd\ub545 \ub3c5\ucc28\uc9c0\ud558\uace0 \uc788\ub294 \uac83\uc740 \uc808\ub300 \uc544\ub2d9\ub2c8\ub2e4. \uc624\ud788\ub824 \uadf8\ub4e4\uc774 \uac00\uc9c4 \uc881\uc740 \uc2dc\uc57c\uc640 \uc4f8\ub370\uc5c6\uc774 \ub0a0\uce74\ub86d\uace0 \ubfb0\uc871\ud55c \uace0\uc9d1\ub4e4\uc740, \ub54c\ub54c\ub85c \uadf8\ub4e4\uc774 \uc9c4\uc2e4\ud558\uac8c \uc6b0\uc8fc\ub97c \ubc14\ub77c\ubcf4\uace0 \uc0dd\uac01\ud560 \uc790\uaca9 \uc790\uccb4\ub97c \ube7c\uc557\uc544\ubc84\ub9ac\uae30\uae4c\uc9c0 \ud569\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc624\ud788\ub824 \ub531\ud788 \ub611\ub611\ud574 \ubcf4\uc774\uc9c0\ub3c4 \uc54a\uace0 \uae4a\uc5b4 \ubcf4\uc774\uc9c0\ub3c4 \uc54a\ub294 \ud3c9\ubc94\ud55c \uc774\uc6c3 \uc0ac\ub78c\ub4e4\uc5d0\uac8c\uc11c, \uc778\uc0dd\uc758 \uac00\uce58 \uc788\ub294 \ud1b5\ucc30\uacfc \uae68\ub2ec\uc74c\uc744 \uc5c4\uccad\ub098\uac8c \ub9ce\uc774 \ube5a\uc9c0\uba70 \uc0b4\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \uc6b0\ub9ac\uac00 \uadf8\ud1a0\ub85d \uc560\ud0c0\uac8c \uc6d0\ud558\uace0 \uc624\ub7ab\ub3d9\uc548 \ud5db\uace0\uc0dd\ud558\uba70 \ucc3e\uc544 \ud5e4\ub9e4\ub358 \ubc14\ub85c \uadf8 \uc815\ub2f5\uc744, \ub9c8\uce58 \uc544\ubb34 \uc77c\ub3c4 \uc544\ub2c8\ub77c\ub294 \ub4ef\uc774 \uc544\ubb34\ub7f0 \ub178\ub825 \uc5c6\uc774 \ud22d \ub358\uc9c0\ub4ef \ub9d0\ud558\uace4 \ud558\ub2c8\uae4c\uc694. \uc601\ud63c\uc774 \uc77c\ud558\ub294 \ubc29\uc2dd\uc740 \uc2dc\ub044\ub7ec\uc6b4 \ub300\ud654 \uc18d\uc5d0\uc11c \uc785 \ubc16\uc73c\ub85c \ub0b4\ubc49\uc740 \ub9d0\ub4e4\ubcf4\ub2e4\ub294, \uc624\ud788\ub824 \uac00\uc2b4 \ucc21\ud558\uac8c \ub290\uaef4\uc9c0\uba74\uc11c\ub3c4 \ucc28\ub9c8 \ub9d0\ub85c \ud45c\ud604\ub418\uc9c0 \ubabb\ud55c \ucc44 \uc785\uac00\uc5d0 \ub9f4\ub3c4\ub294 \uce68\ubb35 \uc18d\uc5d0\uc11c \ud6e8\uc52c \ub354 \uc790\uc8fc \uc77c\uc5b4\ub098\ub294 \ubc95\uc7
