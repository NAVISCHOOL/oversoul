85\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc6b0\ub9ac\uac00 \uc0b4\uc544\uac00\ub294 \uc774 \ubaa8\ub4e0 \uc0ac\ud68c\uc758 \uc9c0\ubd95 \uc704\ub97c \ub530\ub73b\ud558\uac8c \ub36e\uace0 \ud488\uace0 \uc788\uc73c\uba70, \uc0ac\ub78c\ub4e4\uc740 \ub204\uad6c\ub098 \ubb34\uc758\uc2dd\uc801\uc73c\ub85c \uc11c\ub85c\uc758 \ub208\ube5b \uc18d\uc5d0\uc11c \uadf8 \uc601\ud63c\uc744 \ucc3e\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc0ac\uc2e4 \uc6b0\ub9ac\ub294 \uc6b0\ub9ac\uac00 \uac89\uc73c\ub85c \ud589\ub3d9\ud558\ub294 \uac83\ubcf4\ub2e4 \ud6e8\uc52c \ub354 \uc138\uc0c1\uc758 \uc774\uce58\ub97c \uc798 \uc54c\uace0 \uc788\uc2b5\ub2c8\ub2e4. \ube44\ub85d \uc6b0\ub9ac\uac00 \uc544\uc9c1 \ub0b4 \ub9c8\uc74c \ud558\ub098 \ub0b4 \ub73b\ub300\ub85c \ub2e4\uc2a4\ub9ac\uc9c0 \ubabb\ud558\uc9c0\ub9cc, \ub3d9\uc2dc\uc5d0 \uc6b0\ub9ac\ub294 \uae4a\uc740 \uacf3\uc5d0\uc11c \uc6b0\ub9ac\uac00 \uc9c0\uae08 \uc774 \uac89\ubaa8\uc2b5\ubcf4\ub2e4 \ud6e8\uc52c \ub354 \uac70\ub300\ud558\uace0 \uc704\ub300\ud55c \uc874\uc7ac\ub77c\ub294 \uac83\uc744 \ud655\uc2e4\ud788 \uc54c\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc800\ub294 \ub9e4\uc77c \uc774\uc6c3\ub4e4\uacfc \ub098\ub204\ub294 \uc2dc\uc2dc\ucf5c\ucf5c\ud558\uace0 \uc0ac\uc18c\ud55c \uc218\ub2e4 \uc18d\uc5d0\uc11c\ub3c4 \uc774\uc640 \ub611\uac19\uc740 \uc9c4\ub9ac\ub97c \uc5bc\ub9c8\ub098 \uc790\uc8fc \ub290\ub07c\uba70 \uc18c\ub984 \ub3cb\ub294\uc9c0 \ubaa8\ub985\ub2c8\ub2e4. \uc6b0\ub9ac \uac01\uc790\uc758 \ub9c8\uc74c\uc18d\uc5d0 \uc790\ub9ac\ud55c \ub354 \ub192\uace0 \uac70\ub300\ud55c \ubb34\uc5b8\uac00\uac00, \uc6b0\ub9ac\uac00 \ub9e4\uc77c \ubc25 \uba39\uace0 \uc778\uc0ac\ud558\ub294 \uc774 \uc77c\uc0c1\uc758 \ubed4\ud55c \uc5f0\uadf9\uc744 \uc870\uc6a9\ud788 \ub192\uc740 \uacf3\uc5d0\uc11c \ub0b4\ub824\ub2e4\ubcf4\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc989, \uc6b0\ub9ac \uac01\uc790\uc758 \ub4f1 \ub4a4\uc5d0\uc11c \ub098\uc758 \uc8fc\ud53c\ud130 \uc2e0\uc774 \ub2f9\uc2e0\uc758 \uc8fc\ud53c\ud130 \uc2e0\uc744 \ud5a5\ud574 \uac00\ub9cc\ud788 \uace0\uac1c\ub97c \ub044\ub355\uc774\uba70 \uc778\uc0ac\ub97c \ub098\ub204\uace0 \uc788\ub294 \uac83\uc785\ub2c8\ub2e4. \uc0ac\ub78c\ub4e4\uc740 \uc885\uc885 \uc11c\ub85c \uc5b4\uc6b8\ub9ac\uae30 \uc704\ud574 \uc790\uc2e0\uc758 \ub192\uc740 \uc601\ud63c\uc744 \uae4e\uc544\ub0b4\ub9ac\uba70 \uc2a4\uc2a4\ub85c \ubc11\ubc14\ub2e5\uc73c\ub85c \ub0b4\ub824\uac00\uace4 \ud569\ub2c8\ub2e4. \ud0dc\uc5b4\ub0a0 \ub54c\ubd80\ud130 \uac00\uc9c0\uace0 \uc788\ub358 \uace0\uadc0\ud55c \uc131\ud488\uc744 \ubc84\ub9ac\uace0 \uc138\uc0c1\uc744 \ud5a5\ud574 \uc5b5\uc9c0\ub85c \uad7d\uc2e0\uac70\ub9ac\uba70 \ube44\ub8e8\ud55c \ubd09\uc0ac\ub97c \ud560 \ub54c, \uadf8\ub4e4\uc758 \ubaa8\uc2b5\uc740 \ucc38\uc73c\ub85c \ubb18\ud569\ub2c8\ub2e4. \ub9c8\uce58 \uad8c\ub825\uc790\uc758 \ud0d0\uc695\uc2a4\ub7ec\uc6b4 \uc2dc\uc120\uc744 \ud53c\ud558\ub824\uace0 \uac89\uc73c\ub85c\ub294 \uc544\uc8fc \ucd08\ub77c\ud558\uace0 \uc4f0\ub7ec\uc838 \uac00\ub294 \uc624\ub450\ub9c9\uc5d0 \uc0b4\uba70 \uac00\ub09c\ud55c \ucc99 \uc5f0\uae30\ub97c \ud558\ub2e4\uac00, \ubb34\uc7a5\ud55c \uacbd\ube44\ubcd1\ub4e4\uc774 \uc9c0\ud0a4\uace0 \uc788\ub294 \uc740\ubc00\ud55c \uc548\ubc29 \uae4a\uc219\ud55c \uacf3\uc5d0\ub9cc \uc790\uc2e0\uc758 \uc5c4\uccad\ub09c \uae08\uc740\ubcf4\ud654\ub97c \uc228\uaca8\ub450\ub294 \uad50\ud65c\ud55c \uc544\ub78d\uc758 \ubd80\uc790\ub4e4\uacfc \ub108\ubb34\ub3c4 \ub2ee\uc544 \uc788\uc2b5\ub2c8\ub2e4.\n\n\uc704\ub300\ud55c \uc601\ud63c\uc774 \uc138\uc0c1 \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \ub9c8\uc74c\uc18d\uc5d0 \ub611\uac19\uc774 \uc228 \uc26c\uace0 \uc788\ub4ef\uc774, \uc774 \uc601\ud63c\uc740 \uc6b0\ub9ac\uac00 \uc544\uae30\uc77c \ub54c\ub098 \ub178\uc778\uc77c \ub54c\ub098 \uc0b6\uc758 \ubaa8\ub4e0 \uc2dc\uae30\uc5d0 1%\uc758 \ucc28\uc774\ub3c4 \uc5c6\uc774 \ub611\uac19\uc774 \uc874\uc7ac\ud569\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc138\uc0c1\uc5d0 \uac13 \ud0dc\uc5b4\ub09c \ud54f\ub369\uc774 \uc544\uae30\uc758 \ub9c8\uc74c\uc18d\uc5d0\uc11c\ub3c4 \uc774\ubbf8 100% \uc644\ubcbd\ud558\uac8c \ud6cc\uca4d \ub2e4 \uc131\uc219\ud574 \uc788\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc81c\uac00 \uc800\uc758 \uc544\uc774\ub97c \uac00\ub974\uce58\uace0 \ub300\ud560 \ub54c, \uc81c\uac00 \uba38\ub9bf\uc18d\uc5d0 \uad6c\uaca8 \ub123\uc740 \uc5b4\ub824\uc6b4 \uc678\uad6d\uc5b4 \uc9c0\uc2dd, \uc138\uc0c1\uc5d0\uc11c \uc774\ub8ec \uc798\ub09c \uc5c5\uc801\uc774\ub098 \ud1b5\uc7a5\uc758 \uc7ac\uc0b0\uc740 \uc0ac\uc2e4 \uc544\uc774\ub97c \ud0a4\uc6b0\ub294 \ub370 \ub2e8 1\ub3c4 \ub3c4\uc6c0\uc774 \ub418\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc81c\uac00 \uc544\uc774\uc5d0\uac8c \uc601\ud5a5\uc744 \uc904 \uc218 \uc788\ub294 \uac74 \uc624\uc9c1 \uc81c\uac00 \ub2e6\uc544\ub193\uc740 \ub0b4\uba74\uc758 '\uc601\ud63c\uc758 \ud06c\uae30'\ub9cc\ud07c\uc77c \ubfd0\uc785\ub2c8\ub2e4. \ub9cc\uc57d \uc81c\uac00 \uc5b4\ub978\uc774\ub77c\ub294 \uc774\uc720\ub85c \uc595\uc740 \uace0\uc9d1\uc744 \ubd80\ub9b0\ub2e4\uba74, \uc544\uc774 \uc5ed\uc2dc \ub611\uac19\uc774 \uc77c\ub300\uc77c\ub85c \uc790\uae30\uc758 \uc5b5\uc9c0\ub97c \uc81c \uace0\uc9d1\uc5d0 \ub4e4\uc774\ubc1b\uc73c\uba70 \ub9de\uc124 \uac83\uc785\ub2c8\ub2e4. \ub9cc\uc57d \uc81c\uac00 \uc5b5\uc9c0\ub85c \ub369\uce58\uc640 \ud798\uc73c\ub85c \uc544\uc774\ub97c \ucc0d\uc5b4 \ub204\ub978\ub2e4\uba74, \uadf8\uac83\uc740 \uc11c\ub85c\uc5d0\uac8c \uad74\uc695\uc801\uc774\uace0 \ube44\ucc38\ud55c \uc0c1\ucc98\ub9cc \ub0a8\uaca8\ub458 \ubfd0\uc785\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc81c\uac00 \uadf8 \uc4f8\ub370\uc5c6\ub294 \uace0\uc9d1\uacfc \uc790\uc874\uc2ec\uc744 \uc2f9 \ub0b4\ub824\ub193\uace0 \uc624\uc9c1 \ub300\ub839(\uc704\ub300\ud55c \uc601\ud63c)\uc744 \uc704\ud574\uc11c\ub9cc \ud589\ub3d9\ud558\uba70, \uadf8 \uc704\ub300\ud55c \uc601\ud63c\uc744 \uc6b0\ub9ac \ub450 \uc0ac\ub78c \uc0ac\uc774\uc758 \uacf5\uc815\ud55c \uc2ec\ud310\uad00\uc73c\ub85c \ubaa8\uc2e0\ub2e4\uba74 \uc5b4\ub5a8\uae4c\uc694? \uc544\uc774\uc758 \uc21c\uc218\ud558\uace0 \uc5b4\ub9b0 \ub208\ub9dd\uc6b8 \uc18d\uc5d0\uc11c \ubc14\ub85c \uadf8 \ub611\uac19\uc740 \uc601\ud63c\uc774 \uc800\ub97c \ud5a5\ud574 \ub9d1\uac8c \ubc16\uc744 \ub0b4\ub2e4\ubcf4\ub294 \uae30\uc801\uc774 \uc77c\uc5b4\ub0a9\ub2c8\ub2e4. \uadf8\ub7ec\uba74 \uc544\uc774\ub294 \uc800\uc5d0\uac8c \ubc18\ud56d\ud558\ub294 \ub300\uc2e0, \uc800\uc640 \ub098\ub780\ud788 \uc190\uc744 \uc7a1\uace0 \uc6b0\uc8fc\uc801\uc778 \ub300\ub839\uc744 \uc874\uacbd\ud558\uace0 \uc0ac\ub791\ud558\uac8c \ub418\ub294 \uac83\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc9c4\ub9ac\ub97c \uc2a4\uc2a4\ub85c \uc54c\uc544\ucc44\ub294 \uc790\uc774\uba74\uc11c \ub3d9\uc2dc\uc5d0 \ubc16\uc73c\ub85c \ub4dc\ub7ec\ub0b4\ub294 \ube5b\uc785\ub2c8\ub2e4. \uc758\uc2ec \ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc774\ub098 \uc090\ub531\ud558\uac8c \uc870\ub871\ud558\ub294 \uc0ac\ub78c\ub4e4\uc774 \uc790\uae30\ub4e4 \uba4b\ub300\ub85c \ubb34\uc5b4\ub77c \ub5a0\ub4e4\uace0 \ub2e4\ub2c8\ub4e0 \uac04\uc5d0, \uc6b0\ub9ac\ub294 \uc9c4\uc9dc \uc9c4\ub9ac\ub97c \ub9c8\uc8fc\ud558\ub294 \uadf8 \uc9e7\uc740 \uc21c\uac04 \ub0b4\uba74 \uae4a\uc740 \uacf3\uc5d0\uc11c \"\uc544, \uc774\uac83\uc774 \uc9c4\uc9dc\uad6c\ub098!\" \ud558\uace0 \uc9c1\uac10\uc801\uc73c\ub85c \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uc9c0\ud61c\uac00 \ubd80\uc871\ud55c \uc5b4\ub9ac\uc11d\uc740 \uc0ac\ub78c\ub4e4\uc740 \uc790\uae30\uac00 \ub4e3\uae30 \uc2eb\uc740 \ubf08\uc544\ud508 \uc9c4\uc2e4\uc744 \ub2f9\uc2e0\uc774 \ub9d0\ud574\uc904 \ub54c, \ubc1c\ub048\ud558\uba70 \uc774\ub807\uac8c \uc3d8\uc544\ubd99\uc774\uace4 \ud569\ub2c8\ub2e4. '\uadf8\uac8c \ub2f9\uc2e0\uc758 \ucc29\uac01\uc774\ub098 \uace0\uc9d1\uc774 \uc544\ub2c8\ub77c 100% \uc9c4\uc9dc \uc9c4\ub9ac\ub77c\ub294 \uac78 \ub3c4\ub300\uccb4 \ubb34\uc2a8 \uadfc\uac70\ub85c \ud655\uc2e0\ud55c\ub2e8 \ub9d0\uc774\uc624?' \ud558\uc9c0\ub9cc \uc6b0\ub9ac\uac00 \uc544\uce68\uc5d0 \ub208\uc744 \ub728\uace0 \uc7a0\uc5d0\uc11c \uae7c\uc744 \ub54c \"\uc544, \ub0b4\uac00 \ud655\uc2e4\ud788 \uae68\uc5b4\uc788\uad6c\ub098\"\ub77c\ub294 \uac78 \uad73\uc774 \uc99d\uba85\ud558\uc9c0 \uc54a\uc544\ub3c4 \uc2a4\uc2a4\ub85c \uba85\ubc31\ud788 \uc54c\ub4ef\uc774, \uc6b0\ub9ac\ub294 \uc704\ub300\ud55c \uc9c4\ub9ac\ub97c \ubcf4\ub294 \uc21c\uac04 \uadf8\uac83\uc774 \uc595\uc740 \uac1c\uc778\uc758 \ub1cc\ud53c\uc15c\uacfc\ub294 \uc544\uc608 \ucc28\uc6d0\uc774 \ub2e4\ub978 \uac83\uc774\ub77c\ub294 \uc0ac\uc2e4\uc744 \ub2e8\ubc15\uc5d0 \uc54c\uc544\ucc28\ub9ac\ub294 \ubc95\uc785\ub2c8\ub2e4. \uc774 \ubb38\uc7a5 \ud55c \uc904\ub9cc\uc73c\ub85c\ub3c4 \uadf8\uac00 \uc138\uc0c1\uc744 \uc5bc\ub9c8\ub098 \ub300\ub2e8\ud558\uac8c \uaff0\ub6ab\uc5b4 \ubcf4\uc558\ub294\uc9c0 \ub2a5\ud788 \uc99d\uba85\ud574 \uc8fc\ub294 \uc2a4\ubca0\ub374\ubcf4\ub9ac\uc758 \uc7a5\uc5c4\ud55c \uba85\uc5b8\uc774 \uc788\uc2b5\ub2c8\ub2e4. \"\uc790\uae30\uac00 \ubbff\uace0 \uc2f6\uc740 \uac83\uc744 \uadf8\ub7f4\uc2f8\ud558\uac8c \ud3ec\uc7a5\ud574\uc11c \uc99d\uba85\ud574 \ub0b4\ub294 \uc7ac\uc8fc \ub530\uc704\ub294 \uc778\uac04 \uc9c0\uc131\uc758 \uc9c4\uc9dc \uc99d\uac70\uac00 \ub418\uc9c0 \ubabb\ud55c\ub2e4. \uadf8\ub7ec\ub098 \ucc38\ub41c \uac83\uc744 \ubcf4\uace0 '\ucc38\ub418\ub2e4'\uace0 \uc54c\uc544\ubcf4\uace0, \uac70\uc9d3\ub41c \uac83\uc744 \ubcf4\uace0 '\uac70\uc9d3\uc774\ub2e4'\ub77c\uace0 \ub2e8\ubc88\uc5d0 \uad6c\ubcc4\ud574 \ub0b4\ub294 \ub2a5\ub825, \uc624\uc9c1 \uc774\uac83\ub9cc\uc774 \uc778\uac04 \uc9c0\uc131\uc758 \uc9c4\uc9dc \uc0b4\uc544\uc788\ub294 \uc99d\uac70\uc774\uc790 \uc131\uaca9\uc774\ub2e4.\" \uc81c\uac00 \uc77d\ub294 \ud6cc\ub96d\ud55c \ucc45 \uc18d\uc5d0\uc11c \ub9cc\ub098\ub294 \uace0\uacb0\ud55c \uc0dd\uac01\ub4e4\uc740, \uc138\uc0c1 \ubaa8\ub4e0 \uc9c4\ub9ac\uac00 \ub298 \uadf8\ub7ec\ud558\ub4ef \ub0b4 \ub9c8\uc74c\uc744 \uc6b8\ub9ac\uace0 \uc804\uccb4 \uc601\ud63c\uc758 \uc544\ub984\ub2e4\uc6b4 \ubaa8\uc2b5\uc774 \ub418\uc5b4 \uc81c\uac8c \uba54\uc544\ub9ac\ucc98\ub7fc \ub418\ub3cc\uc544\uc635\ub2c8\ub2e4. \ubc18\ub300\ub85c \ucc45\uc744 \uc77d\ub2e4\uac00 \ub9c8\uc8fc\uce58\ub294 \uc5b5\uc9c0\uc2a4\ub7fd\uace0 \uadf8\ub987\ub41c \uc0dd\uac01\ub4e4\uc5d0 \ub300\ud574\uc11c\ub294, \uc81c \uc548\uc758 \uc601\ud63c\uc774 \uac00\uc9dc\ub97c \uc54c\uc544\ubcf4\uace0 \ubd84\ub9ac\ud574 \ub0b4\ub294 \uc544\uc8fc \uc608\ub9ac\ud558\uace0 \ub0a0\uce74\ub85c\uc6b4 \uce7c\ub0a0\uc774 \ub418\uc5b4\uc11c \uadf8\uac83\ub4e4\uc744 \uc4f0\ub808\uae30\ud1b5\uc5d0 \uae68\ub057\uc774 \uc798\ub77c\ub0b4 \ubc84\ub9bd\ub2c8\ub2e4. \uc6b0\ub9ac \uc778\uac04\uc740 \uc2a4\uc2a4\ub85c \"\ub098\ub294 \uc774 \uc815\ub3c4 \uc54c\uc544\"\ub77c\uace0 \ubbff\ub294 \uac83\ubcf4\ub2e4 \uc2e4\uc81c\ub85c\ub294 \ud6e8\uc52c \ub354 \ub611\ub611\ud558\uace0 \ud604\uba85\ud569\ub2c8\ub2e4. \ub9cc\uc57d \uc6b0\ub9ac\uac00 \uc5b5\uc9c0\ub85c \uba38\ub9ac\ub97c \uad74\ub9ac\uba70 \ub0b4 \uc0dd\uac01\uc744 \ubc29\ud574\ud558\uc9c0 \uc54a\uace0 \uc790\uc5f0\uc2a4\ub7fd\uac8c \ud589\ub3d9\ud558\uac70\ub098, \uc138\uc0c1 \ub9cc\ubb3c\uc774 \ud558\ub098\ub2d8 \uc548\uc5d0\uc11c \uc5b4\ub5bb\uac8c \uc81c\uc790\ub9ac\uc5d0 \ub193\uc5ec \uc870\ud654\ub86d\uac8c \ub3cc\uc544\uac00\ub294\uc9c0\ub97c \uc870\uc6a9\ud788 \uc9c0\ucf1c\ubcfc \uc218 \uc788\ub2e4\uba74, \uc6b0\ub9ac\ub294 \ub208\uc55e\uc758 \ud2b9\ubcc4\ud55c \uc0ac\ubb3c \ud558\ub098\ubfd0\ub9cc \uc544\ub2c8\ub77c \uc628 \uc138\uc0c1\uc758 \ubaa8\ub4e0 \uc0ac\ubb3c\uacfc \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \ub9c8\uc74c\uae4c\uc9c0 \ud22c\uba85\ud558\uac8c \uae68\ub2ec\uc544 \uc54c\uac8c \ub429\ub2c8\ub2e4. \uc138\uc0c1 \ub9cc\ubb3c\uc744 \ub9cc\ub4dc\uc2e0 \ubd84\uc774\uc790 \ubaa8\ub4e0 \uc0ac\ub78c\uc744 \ucc3d\uc870\ud558\uc2e0 \uc870\ubb3c\uc8fc\uaed8\uc11c \ubc14\ub85c \uc6b0\ub9ac \ub4f1 \ub4a4\uc5d0 \ub4e0\ub4e0\ud558\uac8c \uc11c \uacc4\uc2dc\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uadf8\ubd84\uc740 \uc6b0\ub9ac \ubab8\uc744 \ub9c8\uce58 \ud22c\uba85\ud55c \ucc3d\ubb38\ucc98\ub7fc \ud1b5\uacfc\ud558\uc5ec \uc138\uc0c1 \ubaa8\ub4e0 \uc0ac\ubb3c\ub4e4 \uc704\ub85c, \ub2f9\uc2e0\uc758 \ubaa8\ub4e0 \uac83\uc744 \uc544\uc2dc\ub294 \uc6c5\uc7a5\ud55c \ube5b\uc744 \uc3df\uc544\ubd93\uace0 \uacc4\uc2ed\ub2c8\ub2e4.\n\n\ud558\uc9c0\ub9cc \uc6b0\ub9ac\uac00 \uc0b4\uba74\uc11c \uacaa\ub294 \uc5b4\ub5a4 \uad6c\uccb4\uc801\uc778 \uacbd\ud5d8\uc758 \ud55c \uc870\uac01 \uc18d\uc5d0\uc11c \uc601\ud63c\uc774 \uc790\uae30 \uac83\uc744 \uc790\ub3d9\uc73c\ub85c \ub531 \uc54c\uc544\ubcf4\ub294 \uc774\ub7f0 \ud3c9\ubc94\ud55c \uae68\ub2ec\uc74c\uc744 \ub118\uc5b4\uc11c\uc11c, \uc601\ud63c\uc740 \uc9c4\ub9ac \uadf8 \uc790\uccb4\ub97c \uc6b0\ub9ac\uc5d0\uac8c \ub300\ub193\uace0 \uc9c1\uc811 \ubcf4\uc5ec\uc8fc\uae30\ub3c4 \ud569\ub2c8\ub2e4. \uadf8\ub807\uae30 \ub54c\ubb38\uc5d0 \uc6b0\ub9ac\ub294 \uc601\ud63c\uc774 \uc9c1\uc811 \uc6b0\ub9ac\ub97c \ucc3e\uc544\uc624\ub294 \ubc14\ub85c \uadf8 \uc5c4\uccad\ub09c \uc21c\uac04\uc744 \ud1b5\ud574 \uc6b0\ub9ac \uc790\uc2e0\uc744 \ub354\uc6b1 \uac15\ud558\uace0 \uad73\uc138\uac8c \ub9cc\ub4e4\uc5b4\uc57c \ud569\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \uc601\ud63c\uc774 \uc6b0\ub9ac \ub9c8\uc74c\uc5d0 \ub3c4\ucc29\ud558\ub294 \uc774 \uc2e0\uc131\ud55c \uc0ac\uac74\uc5d0 \ub300\ud574 \ud55c\uce35 \ub354 \uac00\uce58 \uc788\uace0 \ub192\uace0 \uc22d\uace0\ud55c \ubaa9\uc18c\ub9ac\ub85c \ub9d0\ud558\ub3c4\ub85d \ud798\uc368\uc57c \ub9c8\ub545\ud569\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \ub300\ub839\uc774 \uc6b0\ub9ac\uc5d0\uac8c \uc9c1\uc811 \uc9c4\ub9ac\ub97c \uc804\ud574\uc8fc\ub294 \uc774 \uc0ac\uac74\uc774\uc57c\ub9d0\ub85c \ub300\uc790\uc5f0\uc5d0\uc11c \uc77c\uc5b4\ub098\ub294 \uac00\uc7a5 \uac70\ub300\ud558\uace0 \uc22d\uace0\ud55c \ub300\uc0ac\uac74\uc774\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uadf8\ub54c \uc601\ud63c\uc740 \uadf8\uc800 \uc790\uae30 \uc9c0\uc2dd\uc758 \uc77c\ubd80\ub97c \uc870\uae08 \ub5bc\uc5b4 \uc8fc\ub294 \uc2dc\uc2dc\ud55c \uc77c\uc744 \ud558\ub294 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc790\uae30 \uc790\uc2e0\uc744 \ud1b5\uc9f8\ub85c \uc6b0\ub9ac\uc5d0\uac8c \ub0b4\uc5b4\uc8fc\uac70\ub098, \ud639\uc740 \uc9c4\ub9ac\ub97c \uae68\uc6b0\uccd0 \uc8fc\ub294 \uadf8 \uc0ac\ub78c\uc758 \ub9c8\uc74c\uc18d\uc73c\ub85c \ucf78\ucf78 \ud758\ub7ec \ub4e4\uc5b4\uac00\uc11c \ub9c8\uce68\ub0b4 \uadf8 \uc0ac\ub78c \uc790\uccb4\uac00 \ub418\uc5b4\ubc84\ub9ac\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \ub2e4\uc2dc \ub9d0\ud574, \uc0ac\ub78c\uc774 \ub9c8\uc74c\uc744 \uc5f4\uace0 \uc9c4\ub9ac\ub97c \ubc1b\uc544\ub4e4\uc774\ub294 \uadf8 \ubd84\ub7c9\uc5d0 \uc815\ud655\ud788 \ube44\ub840\ud574\uc11c, \uc601\ud63c\uc774 \uadf8 \uc0ac\ub78c\uc744 \ud479 \uc548\uc544\uc11c \uc790\uae30 \uc790\uc2e0\uc5d0\uac8c\ub85c \uc3d9 \uac70\ub450\uc5b4\ub4e4\uc774\ub294 \uac83\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc601\ud63c\uc774 \uc774\ucc98\ub7fc \ud655\uc2e4\ud558\uac8c \uc120\uc5b8\ud558\ub294 \uac83, \uc989 \uc601\ud63c \uace0\uc720\uc758 \ube5b\ub098\ub294 \ubcf8\uc131\uc744 \uba85\ubc31\ud558\uac8c \ubc16\uc73c\ub85c \ub4dc\ub7ec\ub0b4\ub294 \uc774 \uc5c4\uccad\ub09c \ud604\uc0c1\uc744 \ub2e4\ub978 \uac83\ub4e4\uacfc \ub69c\ub837\uc774 \uad6c\ubcc4\ud558\uc5ec \uc544\uc8fc \uace0\uacb0\ud558\uac8c '\uacc4\uc2dc(Revelation)'\ub77c\ub294 \uc774\ub984\uc73c\ub85c \ubd80\ub985\ub2c8\ub2e4. \uc774\ub7f0 \uc9c4\uc9dc \uacc4\uc2dc\uac00 \ucc3e\uc544\uc62c \ub54c\ub294 \uc5b8\uc81c\ub098 \uac00\uc2b4 \ubc85\ucc28\uc624\ub974\ub294 \uc22d\uace0\ud568\uc758 \uac10\uc815\uc774 \uc544\uc8fc \uc5c4\uc219\ud558\uac8c \ud568\uaed8 \ub530\ub77c\uc624\uae30 \ub9c8\ub828\uc785\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc774 \uac70\ub8e9\ud558\uace0 \uc2e0\uc131\ud55c \uc18c\ud1b5\uc740 \ub2e4\ub984 \uc544\ub2cc \ud558\ub098\ub2d8\uc758 \ub9c8\uc74c\uc774 \ub310\uc774 \ud130\uc9c4 \uac83\ucc98\ub7fc \uc6b0\ub9ac\uc758 \uc881\uc740 \ub9c8\uc74c\uc18d\uc73c\ub85c \uac70\uce68\uc5c6\uc774 \ubc00\ub824\ub4dc\ub294 \uc5c4\uccad\ub09c \uc720\uc785\uc774\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc774\uac83\uc740 \ub9c8\uce58 \ub3c4\ub3c4\ud558\uac8c \ubc00\ub824\uc624\ub294 \uac70\ub300\ud55c \uc0dd\uba85\uc758 \ubc14\ub2f7\ubb3c \uc55e\uc5d0\uc11c, \uc721\uc9c0\uc5d0 \ud750\ub974\ub358 \ucabc\uadf8\ub9cc \uc2dc\ub0c7\ubb3c\uc774 \uc370\ubb3c\ucc98\ub7fc \ud754\uc801\ub3c4 \uc5c6\uc774 \uc644\uc804\ud788 \ube60\uc838\ub098\uac00\uba70 \uc0bc\ucf1c\uc9c0\ub294 \uac83\uacfc \ub611\uac19\uc740 \ud615\uad6d\uc785\ub2c8\ub2e4.\n\n\uc6b0\ub9ac\uc758 \ub9c8\uc74c\uacfc \uc9c0\ub2a5 \uc18d\uc73c\ub85c \uc601\ud63c\uc758 \uc9c4\ub9ac\uac00 \ud758\ub7ec \ub4e4\uc5b4\uc624\ub294 \uc774 \uc7a5\uc5c4\ud55c \uc0ac\uac74\uc740 \uc778\uac04\uc5d0\uac8c \uae4a\uc740 \uc6b8\ub9bc\uacfc \uae68\ub2ec\uc74c\uc744 \uc120\uc0ac\ud569\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc584\ud30d\ud55c \uc5d0\uace0\uc758 \ud55c\uacc4\ub97c \ubc97\uc5b4\ub098 \uc800 \uad11\ud65c\ud55c \ub300\ub839\uc758 \uc601\uc5ed\uc73c\ub85c \ub098\uc544\uac08 \ub54c, \uc6b0\ub9ac\ub294 \ube44\ub85c\uc18c \uc0b4\uc544\uc788\ub294 \uc2e4\uc7ac\ub97c \ub9cc\ub098\uac8c \ub429\ub2c8\ub2e4. \n\n\uc6b0\uc8fc\uc758 \uc911\uc2ec\uc774 \ub418\ub294 \uc774 \uc601\uc801\uc778 \uac00\ub974\uce68\uc744 \uba38\ub9ac\uac00 \uc544\ub2cc \uac00\uc2b4\uc73c\ub85c \uba85\ud655\ud788 \uae68\ub2ec\uc744 \ub54c\ub9c8\ub2e4, \uc778\uac04\uc740 \uc5c4\uccad\ub09c \uacbd\uc678\uc2ec\uacfc \ub354\uc5c6\uc774 \uc9c0\uadf9\ud55c \uae30\uc068\uc73c\ub85c \uaca9\ub82c\ud558\uac8c \ub4a4\ud754\ub4e4\ub9ac\uac8c \ub429\ub2c8\ub2e4. \uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc9c4\ub9ac\ub97c \uac00\uc2b4\uc73c\ub85c \uc601\uc811\ud558\uac70\ub098, \ud639\uc740 \ub300\uc790\uc5f0\uc758 \ub728\uac70\uc6b4 \uc2ec\uc7a5\ubd80\ub85c\ubd80\ud130 \uc6b0\ub7ec\ub098\uc624\ub294 \uc704\ub300\ud55c \ud589\ub3d9\uc744 \uc6a9\uae30 \uc788\uac8c \ud574\ub0bc \ub54c, \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \uac00\uc2b4\uc18d \uae4a\uc740 \uacf3\uc5d0\ub294 \uc544\uc8fc \uac15\ub82c\ud558\uace0 \uc9dc\ub9bf\ud55c \uc804\uc728\uc774 \uc804\ud574\uc9d1\ub2c8\ub2e4. \uc774 \uac70\ub8e9\ud558\uace0 \uc2e0\uc131\ud55c \uc18c\ud1b5 \uc18d\uc5d0\uc11c\ub294, \uc9c4\ub9ac\ub97c \uc54c\uc544\ubcf4\ub294 \ube5b\ub098\ub294 \ub208\uacfc \uadf8\uac83\uc744 \ub2f9\uc7a5 \ud589\ub3d9\uc73c\ub85c \uc62e\uae30\uace0\uc790 \ud558\ub294 \ub728\uac70\uc6b4 \uc758\uc9c0\uac00 \uacb0\ucf54 \ub450 \uac1c\ub85c \ubd84\ub9ac\ub418\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \ud1b5\ucc30\uc740 \uc624\uc9c1 \uc601\ud63c\uc5d0 \ub300\ud55c 100% \uc628\uc804\ud55c \uc21c\uc885\uc5d0\uc11c\ub9cc \uc19f\uc544\ub098\uace0, \uadf8 \uc21c\uc885\uc740 \ub2e4\uc2dc\uae08 \uae30\uc068\uc73c\ub85c \uaf49 \ucc2c \uc601\uc801 \uae68\ub2ec\uc74c\uc5d0\uc11c \ud758\ub7ec\ub098\uc624\ub294 \ubc95\uc785\ub2c8\ub2e4. \uac1c\uc778\uc774 \uc2a4\uc2a4\ub85c \uc800 \uc704\ub300\ud55c \uc2e0\uc131\ud55c \ube5b\uc5d0 \uc758\ud574 \uc644\uc804\ud788 \uc810\ub839\ub2f9\ud558\uace0 \uc788\ub2e4\uace0 \uc18c\ub984 \ub3cb\uac8c \ub290\ub07c\ub294 \ub9e4 \uc21c\uac04\uc740, \ud3c9\uc0dd\ud1a0\ub85d \uc601\uc6d0\ud788 \uae30\uc5b5\uc5d0 \ub0a8\uc744 \uae30\ub150\ube44\uc801\uc778 \ucc30\ub098\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\ub77c\ub294 \uc874\uc7ac\uac00 \ub9cc\ub4e4\uc5b4\uc9c4 \uad6c\uc870\uc758 \ud2b9\uc131\uc0c1, \uac1c\uc778\uc774 \uc800 \uac70\ub8e9\ud55c \ud558\ub098\ub2d8\uc758 \uc784\uc7ac\ub97c \uc758\uc2dd\ud560 \ub54c\uc5d0\ub294 \uc5b4\ub5a4 \uc2dd\uc73c\ub85c\ub4e0 \uc124\uba85\ud560 \uc218 \uc5c6\ub294 \uc544\uc8fc \uac70\ub8e9\ud55c \uc5f4\uad11\uc774 \ud544\uc5f0\uc801\uc73c\ub85c \ub4a4\ub530\ub77c\uc624\uae30 \ub9c8\ub828\uc785\ub2c8\ub2e4. \uc774 \uac70\ub8e9\ud55c \uc5f4\uad11\uc758 \uc0c9\uae54\uacfc \uc9c0\uc18d\ub418\ub294 \uc2dc\uac04\uc740 \uac1c\uc778\uc758 \uc601\uc801\uc778 \uc0c1\ud0dc\uc5d0 \ub530\ub77c \uc81c\uac01\uac01 \ub2e4\ub974\uac8c \ub098\ud0c0\ub0a9\ub2c8\ub2e4. \uc5b4\ub5a4 \uc0ac\ub78c\uc5d0\uac8c\ub294 \ub4dc\ubb3c\uac8c \ub098\ud0c0\ub098\ub294 \uc5c4\uccad\ub09c \ud669\ud640\uacbd\uacfc \uc608\uc5b8\uc790\uc801\uc778 \uc601\uac10\uc73c\ub85c \ub098\ud0c0\ub098\uae30\ub3c4 \ud558\uc9c0\ub9cc, \ud3c9\ubc94\ud55c \uc6b0\ub9ac\uc5d0\uac8c\ub294 \uac00\uc7a5 \ud76c\ubbf8\ud558\uac8c \ube5b\ub098\ub294 '\ub530\ub73b\ud558\uace0 \ub355\uc131\uc2a4\ub7ec\uc6b4 \uac10\uc815\uc758 \ub178\uc744'\ub85c \ub098\ud0c0\ub098\uae30\ub3c4 \ud569\ub2c8\ub2e4. \uc774 \ud6c4\uc790\uc758 \ud615\ud0dc\ub85c \ub098\ud0c0\ub0a0 \ub54c, \uadf8\uac83\uc740 \ub9c8\uce58 \uc6b0\ub9ac \uc9d1 \uac70\uc2e4\uc758 \ub09c\ub85c\ucc98\ub7fc \uc778\ub958\uc758 \ubaa8\ub4e0 \uac00\uc871\uacfc \uc774\uc6c3\ub4e4\uc744 \ub530\uc2a4\ud558\uac8c \ub36e\ud600\uc8fc\uace0 \ub9c8\uce68\ub0b4 \uc544\ub984\ub2e4\uc6b4 \uc0ac\ud68c\ub97c \ub9cc\ub4e4 \uc218 \uc788\uac8c \ud574\uc90d\ub2c8\ub2e4. \uc778\uac04\uc758 \uc5ed\uc0ac\uc5d0\uc11c \uc885\uad50\uc801\uc778 \uac10\uac01\uc774 \ucc98\uc74c \ub208\ub730 \ub54c\uc5d0\ub294 \uc5b8\uc81c\ub098 \ubbf8\uce5c \uac83 \uac19\uc740 \uc57d\uac04\uc758 \uad11\uae30\ub97c \ud5a5\ud574 \ub2ec\ub824\uac00\ub294 \ubb18\ud55c \uacbd\ud5a5\uc774 \ub3d9\ubc18\ub418\uace4 \ud588\uc2b5\ub2c8\ub2e4. \uc774\ub294 \ub9c8\uce58 \uadf8\ub4e4\uc774 \ub108\ubb34\ub098 \ub208\ubd80\uc2e0 \ube5b\uc744 \uc815\uba74\uc73c\ub85c \uccd0\ub2e4\ubd10\uc11c \ub208\uc774 \uba40\uc5b4\ubc84\ub9b0 \uac83\uacfc \uac19\uc2b5\ub2c8\ub2e4. \uc18c\ud06c\ub77c\ud14c\uc2a4\uac00 \uae4a\uc740 \ubabd\ud658\uc5d0 \ube60\uc84c\ub358 \uac83, \ud50c\ub85c\ud2f0\ub178\uc2a4(Plotinus)\uac00 \uccb4\ud5d8\ud55c '\ud569\uc77c(\u5408\u4e00)', \ud3ec\ub974\ud53c\ub9ac\uc624\uc2a4(Porphyry)\uc758 \uc2e0\ube44\ub85c\uc6b4 \ube44\uc804, \uc0ac\ub3c4 \ubc14\uc6b8\uc774 \ub2e4\ub9c8\uc2a4\ucfe0\uc2a4 \uae38\uc5d0\uc11c \uacaa\uc740 \uadf9\uc801\uc778 \ud68c\uc2ec, \uc57c\ucf65 \ubd48\uba54(Jacob B\u00f6hme)\uc758 \ub0b4\uba74\uc5d0\uc11c \ud130\uc838 \ub098\uc628 \uc601\uc801\uc778 \uc5ec\uba85, \uc870\uc9c0 \ud3ed\uc2a4(George Fox)\uc640 \uadf8\uc758 \ud018\uc774\ucee4 \uad50\ub3c4\ub4e4\uc5d0\uac8c \ucc3e\uc544\uc628 \uaca9\ub82c\ud55c \uacbd\ub828, \uc2a4\ubca0\ub374\ubcf4\ub9ac(Swedenborg)\uc5d0\uac8c \ub0b4\ub824\uc9c4 \uc555\ub3c4\uc801\uc778 \uc601\uc801 \uc870\uba85 \ub4f1 \uc5ed\uc0ac \uc18d \uc778\ubb3c\ub4e4\uc758 \uc2e0\ube44\ud55c \uccb4\ud5d8\uc774 \ubaa8\ub450 \uc774\uc640 \ub611\uac19\uc740 \uc885\ub958\uc5d0 \uc18d\ud569\ub2c8\ub2e4. \uc774 \ube44\ubc94\ud558\uace0 \uc720\uba85\ud55c \uc778\ubb3c\ub4e4\uc5d0\uac8c\ub294 \uc5c4\uccad\ub098\uac8c \ud669\ud640\ud558\uace0 \uc601\ud63c\uc744 \ube7c\uc557\uae30\ub294 \ud604\uc0c1\uc73c\ub85c \ub098\ud0c0\ub0ac\ub358 \uc77c\ub4e4\uc774, \ud3c9\ubc94\ud55c \uc77c\uc0c1\uc744 \uc0b4\uc544\uac00\ub294 \uc6b0\ub9ac\uc758 \uc218\ub9ce\uc740 \uc0ac\ub840 \uc18d\uc5d0\uc11c\ub3c4 \ub2e8\uc9c0 \uadf8\ub807\uac8c\uae4c\uc9c0 \uadf9\uc801\uc774\uc9c0 \uc54a\uc740 \ubc29\uc2dd\uc73c\ub85c \ub04a\uc784\uc5c6\uc774 \uc6b0\ub9ac \uc55e\uc5d0 \ubaa8\uc2b5\uc744 \ub4dc\ub7ec\ub0b4 \uc654\uc2b5\ub2c8\ub2e4. \uc885\uad50\uc758 \uc5ed\uc0ac\ub97c \ub4a4\uc838\ubcf4\uba74 \uc5b4\ub514\uc5d0\uc11c\ub098 \uc774 \uac70\ub8e9\ud55c \uc5f4\uad11\uc744 \ucad3\uc544\uac00\ub294 \uacbd\ud5a5\uc774 \uba85\ubc31\ud788 \ub4dc\ub7ec\ub098\uace0 \uc788\uc2b5\ub2c8\ub2e4. \ubaa8\ub77c\ube44\uc548 \uad50\ub3c4\ub4e4\uacfc \ud034\uc5d0\ud2f0\uc2a4\ud2b8(Quietist)\ub4e4\uc758 \ud669\ud640\uacbd, \uc2e0\uc608\ub8e8\uc0b4\ub818 \uad50\ud68c(New Jerusalem Church)\uac00 \ub9d0\ud558\ub294 '\ub9d0\uc500\uc758 \ub0b4\uc801 \uac10\uac01'\uc758 \uac1c\ubc29, \uce7c\ubc45\uc8fc\uc758 \uad50\ud68c\ub4e4\uc758 \ubd80\ud765 \uc6b4\ub3d9, \uac10\ub9ac\uad50(Methodist) \uc2e0\uc790\ub4e4\uc758 \ub728\uac70\uc6b4 \uc601\uc801 \uccb4\ud5d8 \ub4f1, \uc218\ub9ce\uc740 \uc601\uc801 \uccb4\ud5d8\uc740 \uacb0\uad6d \ucabc\uac1c\uc838 \uc788\ub358 \uac1c\uc778\uc758 \uc601\ud63c\uc774 \ubcf4\ud3b8\uc801\uc778 \uac70\ub300\ud55c \uc601\ud63c\uacfc \uc628\uc804\ud788 \ud558\ub098\ub85c \uc735\ud569\ub420 \ub54c \uc5b4\uae40\uc5c6\uc774 \ub530\ub77c\uc624\ub294 \uc800 \uac70\ub8e9\ud55c \uacbd\uc678\uc640 \uc9c0\ubcf5\uc758 \ub5a8\ub9bc\uc774 \uc2dc\ub300\ub9c8\ub2e4 \ub2e4\uc591\ud558\uac8c \ubaa8\uc2b5\ub9cc \ubc14\uafd4 \ub098\ud0c0\ub09c \uac83\uc5d0 \ub2e4\ub984 \uc544\ub2d9\ub2c8\ub2e4.\n\n\uac89\ubaa8\uc2b5\uc740 \ub2ec\ub77c\ub3c4 \uc774\ub7f0 \uacc4\uc2dc\ub4e4\uc758 \uc9c4\uc9dc \ubcf8\uc9c8\uc740 \uc5b8\uc81c\ub098 \ub531 \ud558\ub098\ub85c \ub611\uac19\uc2b5\ub2c8\ub2e4. \uadf8\uac83\ub4e4\uc740 \ub2e4\ub984 \uc544\ub2cc \uc808\ub300\ub85c \ubcc0\ud558\uc9c0 \uc54a\ub294 \uc6b0\uc8fc\uc758 \uc808\ub300 \ubc95\uce59\uc744 \ud5a5\ud55c '\uc601\uc801\uc778 \uae68\ub2ec\uc74c'\uc785\ub2c8\ub2e4. \uadf8\uac83\ub4e4\uc740 \uc601\ud63c\uc774 \uc2a4\uc2a4\ub85c \uc790\uc2e0\uc5d0\uac8c \ub358\uc9c4 \uae4a\uc740 \uc9c8\ubb38\uc5d0 \ub300\ud55c \uc601\ud63c \uc2a4\uc2a4\ub85c\uc758 \ud574\ub2f5\uc774\uba70, \uc584\ud30d\ud55c \uc138\uc18d\uc801 \uc9c0\uc2dd\uc774 \ubb3b\ub294 \uacc4\uc0b0\uc801\uc778 \uc9c8\ubb38\uc5d0\ub294 \uacb0\ucf54 \uc785\uc744 \uc5f4\uc5b4 \ub300\ub2f5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \ub300\ub839\uc740 \uacb0\ucf54 \uc870\uc7a1\ud558\uace0 \uac00\ubcbc\uc6b4 \ub9d0 \ud55c\ub9c8\ub514\ub85c \ud22d \ub300\ub2f5\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \ub300\ub839\uc740 \uc624\uc9c1 \uc9c8\ubb38\uc758 \ub300\uc0c1\uc774 \ub41c \ubcf8\uc9c8\uc801\uc778 \uadf8 \uc2e4\uccb4 \uc790\uccb4\ub97c \ub208\uc55e\uc5d0 \ub4e4\uc774\ubc00\uc5b4 \ubcf4\uc5ec\uc90c\uc73c\ub85c\uc368 \uc751\ub2f5\ud558\ub294 \ubc95\uc785\ub2c8\ub2e4. \uacc4\uc2dc\ub780 \uc624\uc9c1 \uc6b0\ub9ac \uc548\uc758 \uc601\ud63c\uc774 \uac00\uc9c4 \uc2e0\uc131\ud55c \uc18d\ub9c8\uc74c\uc744 \uc0b4\uba70\uc2dc \ub4dc\ub7ec\ub0b4 \ubcf4\uc5ec\uc8fc\ub294 \uac83\uc774\uac74\ub9cc, \uc138\uc0c1 \ub300\uc911\ub4e4\uc774 \ucc29\uac01\ud558\uace0 \uc788\ub294 \uacc4\uc2dc\ub77c\ub294 \uac83\uc740 \uace0\uc791 \ub0b4\uc77c \ube44\uac00 \uc62c\uc9c0 \ub9d0\uc9c0 \uae38\ud749\ud654\ubcf5\uc744 \uc810\uce58\ub294 \uc2f8\uad6c\ub824 \uc6b4\uc138 \ud480\uc774\uc5d0 \uc9c0\ub098\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc544\uc8fc \uc624\ub798\uc804, \uc601\ud63c\uc774 \ub0b4\ub824\uc900 \uc2e0\ud0c1 \uc55e\uc5d0\uc11c \uc584\ud30d\ud55c \uc778\uac04\uc758 \uba38\ub9ac\ub294 \uc624\uc9c1 \uc721\uccb4\uc801\uc774\uace0 \uc138\uc18d\uc801\uc778 \uc9c8\ubb38\uc5d0 \ub300\ud55c \ud574\ub2f5\ub9cc\uc744 \uc5bb\uc5b4\ub0b4\ub824 \ub5bc\ub97c \uc37c\uc2b5\ub2c8\ub2e4. \ud558\ub098\ub2d8\uc744 \ud551\uacc4 \uc0bc\uc544 \uc778\uac04\uc774 \uba87 \uc0b4\uae4c\uc9c0 \uc0b4\uc9c0, \ub3c8\uc744 \uc5bc\ub9c8\ub098 \ubc8c\uc9c0, \ub204\uad6c\uc640 \uacb0\ud63c\ud560\uc9c0\ub97c \uac10\ud788 \uc810\uce58\ub824 \ub4e4\uc5c8\uace0, \uac70\uae30\uc5d0 \uc774\ub984\uacfc \ub0a0\uc9dc\uc640 \uc7a5\uc18c\uae4c\uc9c0 \uaf2c\uce58\uaf2c\uce58 \ub530\uc838 \ubb3c\uc5c8\uc2b5\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc6b0\ub9ac\ub294 \ud568\ubd80\ub85c \uc2e0\uc131\uc758 \uac70\ub8e9\ud55c \uc790\ubb3c\uc1e0\ub97c \uc5b5\uc9c0\ub85c \ub530\ub824\uace0 \ub364\ubcbc\uc11c\ub294 \uc548 \ub429\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc774 \ucc9c\ubc15\ud558\uace0 \uc584\ud30d\ud55c \ud638\uae30\uc2ec\uc744 \ubc18\ub4dc\uc2dc \uafb9 \ub20c\ub7ec \ucc38\uc544\uc57c\ub9cc \ud569\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc778\uac04\uc758 \ub9d0\ub85c \uc774\ub8e8\uc5b4\uc9c4 \ub300\ub2f5\uc774\ub780 \uc5b8\uc81c\ub098 \uc6b0\ub9ac\ub97c \ubbf8\ud639\ud558\uace0 \ud5f7\uac08\ub9ac\uac8c \ud558\ub294 \uac83\uc5d0 \ubd88\uacfc\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uadf8\ub7f0 \uac00\ubcbc\uc6b4 \ub300\ub2f5\uc740, \uc815\uc791 \ub2f9\uc2e0\uc758 \uc601\ud63c\uc774 \uac04\uc808\ud788 \ubb3b\uace0 \uc788\ub294 \ubcf8\uc9c8\uc801\uc778 \uc9c8\ubb38\uc5d0\ub294 \uc0ac\uc2e4\uc0c1 \uc544\ubb34\ub7f0 \ub2f5\ubcc0\ub3c4 \ub418\uc9c0 \ubabb\ud569\ub2c8\ub2e4. \uc9c0\uae08 \ub2f9\uc2e0\uc774 \ubc30\uc5d0 \ub3db\uc744 \uc62c\ub9ac\uace0 \ubaa9\uc801\uc9c0\ub97c \ud5a5\ud574 \ud56d\ud574\ud574 \uac00\uace0 \uc788\ub294 \uc800 \uc2e0\ube44\ub85c\uc6b4 \ubbf8\uc9c0\uc758 \ub098\ub77c\ub4e4\uc5d0 \ub300\ud574, \ubbf8\ub9ac\ubd80\ud130 \uac70\uae30\uac00 \uc5b4\ub5a4 \uacf3\uc778\uc9c0 \uc0c1\uc138\ud788 \ubb18\uc0ac\ud574 \ub2ec\ub77c\uace0 \uc694\uad6c\ud558\uc9c0 \ub9c8\uc2ed\uc2dc\uc624. \uc138\uc0c1\uc758 \uadf8 \uc5b4\ub5a4 \uc5b8\uc5b4\uc640 \ubb18\uc0ac\ub3c4 \uadf8\uac83\uc744 \ub2f9\uc2e0\uc5d0\uac8c 100% \uc628\uc804\ud788 \uc124\uba85\ud574 \uc904 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4. \ub0b4\uc77c \ub2f9\uc2e0\uc774 \uadf8\uacf3\uc5d0 \ubb34\uc0ac\ud788 \ub3c4\ucc29\ud574\uc11c \ub450 \ubc1c\ub85c \uac77\uace0 \uc9c1\uc811 \ubab8\uc73c\ub85c \ubd80\ub52a\ud788\uba70 \uc0b4\uc544\ubd04\uc73c\ub85c\uc368 \ube44\ub85c\uc18c \uc628\uc804\ud788 \uc54c\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4.\n\n\uc0ac\ub78c\ub4e4\uc740 \uc601\ud63c\uc774 \uc601\uc6d0\ud788 \uc8fd\uc9c0 \uc54a\ub294\uc9c0, \ub098\uc911\uc5d0 \ucc9c\uad6d\uc5d0 \uac00\uba74 \uc815\ud655\ud788 \ubb34\uc2a8 \uc77c\uc744 \ud558\uac8c \ub420\uc9c0, \uc8c4\ub97c \uc9c0\uc740 \uc0ac\ub78c\ub4e4\uc740 \uc8fd\uc740 \ub4a4\uc5d0 \uc5b4\ub5a4 \ubc8c\uc744 \ubc1b\uac8c \ub420\uc9c0 \ub4f1\uc5d0 \uad00\ud574 \uc9d1\uc694\ud558\uac8c \uaf2c\uce58\uaf2c\uce58 \ubb3b\uace4 \ud569\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \uc2ec\uc9c0\uc5b4 \uc608\uc218\ub2d8\uaed8\uc11c \ub9c8\uce58 \uc2dc\ud5d8 \ubb38\uc81c\uc758 \uc815\ub2f5\uc744 \ub0a8\uaca8\uc8fc\ub4ef \uc815\ud655\ud788 \uc774\ub7f0 \uc584\ud30d\ud55c \uc9c8\ubb38\ub4e4\uc5d0 \ub300\ud574 \uce5c\uc808\ud55c \ub2f5\ubcc0\uc744 \ub0a8\uaca8\ub450\uc168\ub2e4\uace0 \ud5db\ub41c \ub9dd\uc0c1\uc744 \uafb8\uae30\uae4c\uc9c0 \ud569\ub2c8\ub2e4. \uadf8\ub7ec\ub098 \uc800 \uc7a5\uc5c4\ud558\uace0 \uc22d\uace0\ud55c \uc815\uc2e0\uc744 \uac00\uc9c0\uc2e0 \uc608\uc218\ub2d8\uc740, \ub2e8 \ud55c \uc21c\uac04\ub3c4 \uadf8\ub4e4\uc774 \uc4f0\ub294 \uc800\uae09\ud55c \uc0ac\ud22c\ub9ac\ub098 \uc584\ud30d\ud55c \ubc29\uc5b8\uc73c\ub85c \ub300\ub2f5\ud558\uc2e0 \uc801\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \uc9c4\ub9ac\uc640 \uc815\uc758, \uadf8\ub9ac\uace0 \uc0ac\ub791\uc774\ub77c\ub294 \uc601\ud63c\uc758 \uac70\ub8e9\ud55c \uc18d\uc131\ub4e4\uc5d0\ub294 '\uc808\ub300 \ubcc0\ud558\uc9c0 \uc54a\uc74c'\uc774\ub77c\ub294 \uc5c4\uccad\ub09c \uad00\ub150\uc774 \ubcf8\uc9c8\uc801\uc73c\ub85c \ub531 \ub2ec\ub77c\ubd99\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \ub0b4\uc77c \ub2f9\uc7a5 \ub3c8\uc744 \ubc8c\uc9c0 \ub9d0\uc9c0 \ud558\ub294 \uac10\uac01\uc801\uc778 \uae38\ud749\ud654\ubcf5 \ub530\uc704\uc5d0\ub294 \uc804\ud600 \uc2e0\uacbd \uc4f0\uc9c0 \uc54a\uc740 \ucc44 \uc624\uc9c1 \uc774 \uc22d\uace0\ud55c \ub3c4\ub355\uc801 \uac10\uc815 \uc18d\uc5d0\ub9cc \ud48d\ub369 \ube60\uc838 \uc0b4\uc558\ub358 \uc608\uc218\ub2d8\uc740, '\uc601\uc6d0\ud558\ub2e4'\ub294 \uac1c\ub150\uc744 \ub3c4\ub355\uc801\uc778 \uc18d\uc131\uc758 \ubcf8\uc9c8\uc5d0\uc11c \uc5b5\uc9c0\ub85c \ub5bc\uc5b4\ub0b4\uc5b4 \uc0dd\uac01\ud558\uc9c0 \uc54a\uc558\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc815\uc791 \uc601\ud63c\uc774 \uc5bc\ub9c8\ub098 \uc624\ub798 \uc0ac\ub294\uc9c0\uc5d0 \uad00\ud574\uc11c\ub294 \ub2e8 \ud55c \uc74c\uc808\ub3c4 \uc785 \ubc16\uc5d0 \ub0b4\uc9c0 \uc54a\uc73c\uc168\uc2b5\ub2c8\ub2e4. '\uacc4\uc18d \uc9c0\uc18d\ub41c\ub2e4'\ub294 \uc584\ud30d\ud55c \uac1c\ub150\uc744 \uc22d\uace0\ud55c \ub3c4\ub355\uc5d0\uc11c \uc5b5\uc9c0\ub85c \ub5bc\uc5b4\ub0b8 \ub4a4, \uc601\ud63c\uc774 \ubd88\uba78\ud55c\ub2e4\ub294 \uac83\uc744 \ub9c8\uce58 \ubb34\uc2a8 \ub531\ub531\ud55c \uad50\ub9ac\ucc98\ub7fc \uac00\ub974\uce58\uba70 \uc678\uc801\uc778 \uc99d\uac70\ub4e4\uc744 \uae01\uc5b4\ubaa8\uc544 \uace0\uc9d1\uc2a4\ub7fd\uac8c \uc639\ud638\ud558\ub824 \ub4e0 \uac83\uc740 \ub2e4\ub984 \uc544\ub2cc \uc608\uc218\ub2d8\uc758 \uc81c\uc790\ub4e4\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \uc601\uc6d0\ud788 \uc0b0\ub2e4\ub294 \ubd88\uba78\uc758 \uad50\ub9ac\uac00, \uc62c\ubc14\ub974\uac8c \uc0b0\ub2e4\ub294 \ub3c4\ub355\uc801\uc778 \uc0b6\uc5d0\uc11c \ub69d \ub5a8\uc5b4\uc838 \ub098\uc640 \ub9c8\uce58 \uc785\uc2dc \ud559\uc6d0\ucc98\ub7fc \ubcc4\uac1c\ub85c \uac00\ub974\uccd0\uc9c0\ub294 \ubc14\ub85c \uadf8 \uc21c\uac04, \uc778\uac04\uc740 \uc774\ubbf8 \uc601\uc131\uc801\uc73c\ub85c \uc2ec\uac01\ud558\uac8c \ud0c0\ub77d\ud55c \uc0c1\ud0dc\uc5d0 \ucc98\ud558\uac8c \ub418\ub294 \uac83\uc785\ub2c8\ub2e4. \uc0ac\ub791\uc758 \uac15\ubb3c\uc774 \ub3c4\ub3c4\ud788 \ud750\ub974\uace0 \uacb8\uc190\ud55c \uc608\ubc30\uc640 \uacbd\ubc30\uac00 \ub9e4\uc77c \uc77c\uc5b4\ub098\ub294 \ub9d1\uace0 \uccad\uc815\ud55c \uc601\ud63c\uc758 \uc0c1\ud0dc \uc18d\uc5d0\uc11c\ub294, \uc560\ucd08\uc5d0 \uc6b0\ub9ac\uac00 \uacc4\uc18d \uc0b4 \uc218 \uc788\uc744\uae4c \uac19\uc740 \uc9c0\uc18d\uc131\uc5d0 \ub300\ud55c \uc584\ud30d\ud55c \uc9c8\ubb38 \ub530\uc704\ub294 \uba38\ub9bf\uc18d\uc5d0 \ub5a0\uc624\ub974\uc9c0\ub3c4 \uc54a\ub294 \ubc95\uc785\ub2c8\ub2e4. \ud558\ub298\uc758 \uc2e0\ub839\ud55c \uc601\uac10\uc744 \ub2e8 \ud55c \ubaa8\uae08\uc774\ub77c\ub3c4 \ub9c8\uc2e0 \uc0ac\ub78c\uc740 \uc808\ub300\ub85c \uc774\ub534 \uc9c8\ubb38\uc744 \ub358\uc9c0\uc9c0 \uc54a\uc73c\uba70, \uc601\uc6d0\ud788 \uc0b0\ub2e4\ub294 \uac83\uc744 \uc99d\uba85\ud558\uaca0\ub2f5\uc2dc\uace0 \ub208\uc5d0 \ubcf4\uc774\ub294 \uc678\uc801\uc778 \uc99d\uac70\ub4e4\uc744 \uc90d\uace0 \ub2e4\ub2c8\ub294 \ube44\ucc9c\ud55c \ud589\ub3d9\uc5d0 \ud5c8\ub9ac\ub97c \uad7d\ud788\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc601\ud63c\uc740 \uc804\uc801\uc73c\ub85c \uc790\uae30 \uc790\uc2e0\uc5d0\uac8c 100% \ucda9\uc2e4\ud558\uae30 \ub54c\ubb38\uc5d0, \uc601\ud63c\uc774 \uba38\ub9ac\ub05d\uae4c\uc9c0 \uaf49 \ucc28\uc624\ub978 \uc0ac\ub78c\uc740 \uc774\ubbf8 \ubb34\ud55c\ud568 \uadf8 \uc790\uccb4\uc778 \uc601\uc6d0\ud55c '\ud604\uc7ac'\uc5d0 \ud479 \ube60\uc838 \uc788\uc73c\ubbc0\ub85c, \uad73\uc774 \uc720\ud55c\ud568\uc5d0 \ubd88\uacfc\ud55c '\ubbf8\ub798'\ub77c\ub294 \uc601\uc5ed\uc73c\ub85c \uae30\uc6c3\uac70\ub9ac\uba70 \ud5e4\ub9ec \uc774\uc720\uac00 \uc5c6\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4.\n\n\uc6b0\ub9ac\uac00 \uad73\uc774 \uc55e\uc73c\ub85c \uc62c \ubbf8\ub798\uc5d0 \uad00\ud574 \ubb3b\uace0 \uc2f6\uc5b4\uc11c \uc548\ub2ec\ud558\ub294 \uc774 \uc138\uc18d\uc801\uc778 \uc9c8\ubb38\ub4e4\uc740, \uc0ac\uc2e4 \uae4c\ub193\uace0 \ubcf4\uba74 \uc6b0\ub9ac \ub9c8\uc74c\uc18d\uc5d0 \ub450\ub824\uc6c0\uacfc \uc8c4\uac00 \uc788\ub2e4\ub294 \uac83\uc744 \uc2a4\uc2a4\ub85c \uc790\ubc31\ud558\ub294 \uace0\ubc31\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \ud558\ub098\ub2d8\uc740 \uadf8\ub7f0 \uc584\ud30d\ud55c \uc9c8\ubb38\ub4e4\uc5d0 \ub300\ud55c \ub2f5\ubcc0 \ub9ac\uc2a4\ud2b8\ub97c \uc560\ucd08\uc5d0 \uac00\uc9c0\uace0 \uacc4\uc2dc\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc870\uc7a1\ud558\uace0 \uc595\uc740 \ub9d0\ub4e4\ub85c \uc774\ub8e8\uc5b4\uc9c4 \ub300\ub2f5\uc774\ub780 \uac83\uc740, \ubcf4\uc774\uc9c0 \uc54a\ub294 \uae4a\uc740 \ubcf8\uc9c8\uc744 \ubb3b\ub294 \uc9c8\ubb38\uc5d0 \uacb0\ucf54 \uc81c\ub300\ub85c \ub300\ub2f5\ud560 \uc218 \uc5c6\ub294 \ubc95\uc774\ub2c8\uae4c\uc694. \ub2f9\uc7a5 \ub0b4\uc77c \uc77c\uc5b4\ub0a0 \uc77c\ub4e4 \uc704\ub85c \ub450\uaebc\uc6b4 \ucee4\ud2bc\uc774 \ucf85 \ub2eb\ud600\uc11c \uc55e\uc744 \uac00\ub824\ubc84\ub9ac\ub294 \uac83\uc740, \ud558\ub098\ub2d8\uc774 \uc6b0\ub9ac\ub97c \uace8\ud0d5 \uba39\uc774\ub824\uace0 \ub0b4\ub9b0 \uc2ec\uc220\uad82\uc740 \ubc95\ub839 \ub54c\ubb38\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uadf8\uac83\uc740 \uc624\uc9c1 \uc6d0\uc778\uacfc \uacb0\uacfc\ub77c\ub294 \ub300\uc790\uc5f0\uc758 \uc21c\uc218\ud55c \uc131\ud488 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc704\ub300\ud55c \uc601\ud63c\uc740 \uc6b0\ub9ac\ub85c \ud558\uc5ec\uae08 '\uc778\uacfc\uc751\ubcf4(\uc6d0\uc778\uc774 \uc788\uc73c\uba74 \uacb0\uacfc\uac00 \uc788\ub2e4)'\ub77c\ub294 \uc544\uc8fc \uc5c4\uc5f0\ud558\uace0 \ub69c\ub837\ud55c \uc2e0\uc758 \uc554\ud638 \uc774\uc678\uc5d0\ub294, \uadf8 \uc5b4\ub5a4 \ub2e4\ub978 \uc794\uba38\ub9ac\ub098 \uaf3c\uc218\ub3c4 \ud568\ubd80\ub85c \uc77d\uc9c0 \ubabb\ud558\uac8c \ub2e8\ub2e8\ud788 \ub9c9\uc544\ub193\uc558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \ubbf8\ub798\uc5d0 \uc77c\uc5b4\ub0a0 \uc77c\ub4e4\uc744 \uce84\uce84\ud558\uac8c \uac00\ub824\uc8fc\ub294 \uc774 \uc740\ud61c\ub85c\uc6b4 \ucee4\ud2bc\uc744 \ud1b5\ud558\uc5ec, \uc601\ud63c\uc740 \uc778\ub958\uc758 \ubaa8\ub4e0 \uc790\ub140\ub4e4\uc5d0\uac8c \uc624\uc9c1 \uc2e0\uc131\ud55c '\uc624\ub298 \uc774 \ud558\ub8e8' \uc18d\uc5d0 \uc628\uc804\ud788 \uba38\ubb3c\uba70 \uc0b4\uc544\uac00\ub77c\uace0 \uc544\uc8fc \uc5c4\uc219\ud558\uac8c \ud68c\ucd08\ub9ac\ub97c \ub4e4\uace0 \ud6c8\uc721\ud558\uace0 \uacc4\uc2ed\ub2c8\ub2e4. \uc6b0\ub9ac\uc758 \uc595\uc740 \uac10\uac01\uc774 \uc274 \uc0c8 \uc5c6\uc774 \ub358\uc9c0\ub294 \uc774 \ucc9c\ubc15\ud55c \uc9c8\ubb38\ub4e4\uc5d0 \ub300\ud55c \ub2f5\uc744 \uc5bb\uc5b4\ub0b4\ub294 \uc720\uc77c\ud55c \ubc29\ubc95\uc740 \ub531 \ud558\ub098\ubfd0\uc785\ub2c8\ub2e4. \uc624\uc9c1 \uc774 \ubaa8\ub4e0 \uc800\uae09\ud55c \ud638\uae30\uc2ec\uc744 \uae68\ub057\ud558\uac8c \ud3ec\uae30\ud574 \ubc84\ub9ac\uace0, \uc6b0\ub9ac\ub97c \ub300\uc790\uc5f0\uc758 \uc740\ubc00\ud55c \ube44\ubc00 \ucc3d\uace0 \uc18d\uc73c\ub85c \uc774\ub04c\uc5b4 \uc8fc\ub294 '\uac70\ub300\ud55c \uc874\uc7ac\uc758 \ud750\ub984'\uc5d0 \ud29c\ube0c\ub97c \ud0c0\ub4ef \uc628\ubab8\uc744 \ub9e1\uae34 \ucc44 \uadf8\uc800 \ubb35\ubb35\ud788 \uc77c\ud558\uace0 \uc0b4\uc544\uac00\ub294 \uac83\ubfd0\uc785\ub2c8\ub2e4. \uadf8\ub807\uac8c \uc870\uc6a9\ud788 \uc624\ub298\uc744 \uc0b4\uc544\ub0b4\ub2e4 \ubcf4\uba74, \uc5b4\ub290\uc0c8 \ud6cc\uca4d \uc804\uc9c4\ud55c \uc601\ud63c\uc740 \uc790\uc2e0\ub3c4 \uc804\ud600 \ubaa8\ub974\ub294 \uc0ac\uc774\uc5d0 \uc790\uae30 \uc790\uc2e0\uc744 \uc704\ud55c \uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc601\uc801 \uc0c1\ud0dc\ub97c \ud2bc\ud2bc\ud558\uac8c \ub9cc\ub4e4\uc5b4 \ub0b4\uace0, \ub9c8\uce68\ub0b4 \ub0b4 \uc9c8\ubb38\uacfc \uc6b0\uc8fc\uc758 \ub300\ub2f5\uc774 \uc644\ubcbd\ud558\uac8c \ud558\ub098\uac00 \ub418\uc5b4\ubc84\ub9ac\ub294 \uc9c0\ub3c5\ud55c \ud589\ubcf5\uc5d0 \ub3c4\ub2ec\ud558\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4.\n\n\uc138\uc0c1 \ub9cc\ubb3c\uc744 \ube5b\uc758 \ubc14\ub2e4 \ubb3c\uacb0 \uc18d\uc73c\ub85c \ub179\uc5ec\ubc84\ub9b4 \ub54c\uae4c\uc9c0 \uaebc\uc9c0\uc9c0 \uc54a\ub294 \ubc14\ub85c \uadf8 \uc2e0\uc131\ud558\uace0 \uac70\ub8e9\ud55c \ubd88\uaf43, \uadf8 \uc0dd\uba85\ub825 \ub118\uce58\uace0 \ubaa8\ub4e0 \uac83\uc744 \ucd95\uc131\ud558\ub294 \ud558\ub298\uc758 \ubd88\uaf43 \ub355\ubd84\uc5d0 \uc6b0\ub9ac\ub294 \uc11c\ub85c\ub97c \ud22c\uba85\ud558\uac8c \uc54c\uc544\ubcfc \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc77c\uc0c1\uc801\uc778 \ub9d0\uacfc \ud589\ub3d9 \uc18d\uc5d0\uc11c, \uadf8\ub9ac\uace0 \uc544\uc8fc \uc7a0\uae50 \uc2a4\uccd0 \uc9c0\ub098\uac00\ub294 \ud589\ub3d9\uc774\ub098 \uae30\ubd84 \uc18d\uc5d0\uc11c\ub3c4 \uc774\ubbf8 \uc11c\ub85c\uc758 \uc9c4\uc9dc \ubcf8\ubaa8\uc2b5\uc744 \uaff0\ub6ab\uc5b4 \ubcf4\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc544\ub294 \ubaa8\ub4e0 \uc0ac\ub78c\uc5d0 \ub300\ud574, \uadf8\uac00 \uac00\uc9c4 \uc9c0\ud61c\uc640 \uadf8\uc758 \uc758\uc9c0\uac00 \ubcf4\uc5ec\uc8fc\ub294 \uad73\uc13c \ud798\uc774 \uacfc\uc5f0 10\uc810 \ub9cc\uc810\uc5d0 \uba87 \uc810\uc774\ub098 \ub418\ub294\uc9c0 \uc6b0\ub9ac\ub294 \uc774\ubbf8 \uc740\ubc00\ud558\uac8c \ub4f1\uae09\uc744 \ub9e4\uaca8\ub450\uace0 \uc788\uc2b5\ub2c8\ub2e4. \ube44\ub85d \uc6b0\ub9ac\uac00 \uadf8 \uc810\uc218\ub97c \ub9d0\uc774\ub098 \uc22b\uc790\ub85c \uac89\uc73c\ub85c \ub0b4\ubc49\uc9c0\ub294 \uc54a\ub354\ub77c\ub3c4, \uc6b0\ub9ac\ub294 \uc774\ubbf8 \uc11c\ub85c\uc5d0 \ub300\ud574 \ub108\ubb34\ub098 \uc798 \uc54c\uace0 \uc788\uc73c\uba70, \uac01\uc790\uac00 \uc0c1\ub300\ubc29\uc744 \uc18d\uc73c\ub85c \uc5b4\ub5bb\uac8c \uc0dd\uac01\ud558\ub294\uc9c0\uc870\ucc28 \uc544\uc8fc \ube64\ud788 \ub4e4\uc5ec\ub2e4\ubcf4\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc138\uc0c1\uc5d0\uc11c \ud55c \ubc88\ub3c4 \ub098\uc05c \uc9d3\uc744 \ud55c \uc801\uc774 \uc5c6\ub294 \ucc29\ud55c \uc0ac\ub78c\uc774\ub77c\ub3c4 \uc660\uc9c0 \ubaa8\ub974\uac8c \ub3c4\ubb34\uc9c0 \ubbff\uc74c\uc774 \uac00\uc9c0 \uc54a\ub294 \uc0ac\ub78c\uc744 \uac00\ub054 \ub9cc\ub0a9\ub2c8\ub2e4. \ubc18\uba74, \uae38\uc5d0\uc11c \uac70\uc758 \ub9c8\uc8fc\uce5c \uc801\uc870\ucc28 \uc5c6\ub294 \uc0ac\ub78c\uc778\ub370\ub3c4 \uc660\uc9c0 '\uc800 \uc0ac\ub78c\uc774\ub77c\uba74 \ub0b4 \ub4f1\uc744 \ub9e1\uaca8\ub3c4 \ub418\uaca0\ub2e4'\ub294 \ud655\uc2e4\ud55c \uc2e0\ub8b0\uc758 \ub290\ub08c\uc744 \ub2e8\ubc15\uc5d0 \ubc1b\uae30\ub3c4 \ud569\ub2c8\ub2e4. \uc0ac\uc2e4 \uc6b0\ub9ac\uac00 \uc0ac\ub78c\ub4e4\uc744 \ub9cc\ub098\uc11c \uacaa\ub294 \uc628\uac16 \uc0ac\ud68c\uc0dd\ud65c\uacfc \ubb3c\uac74\uc744 \uc0ac\uace0\ud30c\ub294 \uc0c1\uac70\ub798 \uad00\uacc4, \ub204\uad70\uac00\uc640 \uc6b0\uc815\uc744 \ub098\ub204\uac70\ub098 \uce58\uc5f4\ud558\uac8c \ub2e4\ud22c\ub294 \uadf8 \ubaa8\ub4e0 \uc77c\ub4e4\uc740, \uacb0\uad6d \uc778\uac04\uc758 \uc228\uaca8\uc9c4 \uc778\uaca9\uc744 \ub0b1\ub0b1\uc774 \ud30c\ud5e4\uce58\ub294 \uc544\uc8fc \uc5c4\uc219\ud558\uace0 \uac70\ub300\ud55c \uc0ac\ubc95\uc801 \uc7ac\ud310\uc774\ub098 \ub2e4\ub984\uc5c6\uc2b5\ub2c8\ub2e4. \uc0ac\ub78c\ub4e4\uc740 \uc790\uae30\uac00 \uba38\ub9ac\ub97c \uc544\ubb34\ub9ac \uc774\ub9ac\uc800\ub9ac \uad74\ub824\ubd10\ub3c4 \uc790\uc2e0\uc758 \uc758\uc9c0\uc640\ub294 \uc804\ud600 \uc0c1\uad00\uc5c6\uc774, \uc790\uae30\ub3c4 \ubaa8\ub974\ub294 \uc0ac\uc774\uc5d0 \ub0a8\ub4e4\uc5d0\uac8c \uc790\uc2e0\uc758 \uc9c4\uc9dc \uc778\uaca9\uc744 \uc220\uc220 \uc77d\ud788\uac8c \ub9cc\ub4dc\ub294 \uc0ac\uc18c\ud55c \ub2e8\uc11c\uc640 \ud754\uc801\ub4e4\uc744 \ub04a\uc784\uc5c6\uc774 \uc904\uc904 \ud758\ub9ac\uace0 \ub2e4\ub2d9\ub2c8\ub2e4. \uadf8\ub807\ub2e4\uba74 \ub3c4\ub300\uccb4 \ub204\uac00 \ub0a8\ub4e4\uc758 \uadf8 \ubed4\ud55c \uc18d\uc744 \uc7ac\ud310\ud558\uba70, \ubb34\uc5c7\uc774 \uadf8\ub4e4\uc758 \uc778\uaca9\uc744 \uc2ec\ud310\ud55c\ub2e4\ub294 \ub9d0\uc785\ub2c8\uae4c? \uc6b0\ub9ac\uc758 \uc595\uc740 \uc9c0\uc2dd \ub530\uc704\uac00 \ub2e4\ub978 \uc0ac\ub78c\uc744 \ud3c9\uac00\ud558\ub294 \uacb0\ub860\uc744 \ub0b4\ub9b0 \uc801\ub3c4 \uc5c6\uace0, \uc9c0\uc2dd\uc774 \uc774 \uae4a\uc740 \ube44\ubc00\uc744 \uc5ff\ub4e4\uc740 \uc801\ub3c4 \uc5c6\uc2b5\ub2c8\ub2e4. \uc9c4\uc9dc\ub85c \ud604\uba85\ud55c \uc0ac\ub78c\uc740 \uacb0\ucf54 \ub204\uad70\uac00\uc758 \uc778\uaca9\uc744 \uc0ac\uc0ac\ub85c\uc774 \uc77d\uace0 \ud3c9\uac00\ud558\ub824 \ub4e4\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uadf8\uc800 \uadf8\ub4e4\uc758 \uc778\uaca9\uc774 \uc2a4\uc2a4\ub85c \uc790\uc2e0\uc758 \uc218\uc900\uc744 \ub4dc\ub7ec\ub0b4\uace0 \ud310\uacb0\ubb38\uc744 \uc4f0\ub3c4\ub85d \uc870\uc6a9\ud788 \ub0b4\ubc84\ub824 \ub458 \ubfd0\uc785\ub2c8\ub2e4.\n\n\uadf8\ub7ec\ub2c8 \uc5b4\ub5a4 \uc778\uc704\uc801\uc778 \uc5b5\uc9c0 \uc5f0\uae30\ub3c4 \ub2e4 \uc9d1\uc5b4\uce58\uc6b0\uc2ed\uc2dc\uc624. \ub2f9\uc2e0 \ub0b4\uba74\uc5d0 \uc228\uaca8\uc9c4 \ub180\ub77c\uc6b4 \ucc9c\uc7ac\uc131\uc740 \ub2f9\uc2e0\uc758 \ubab8\uc744 \ube4c\ub824 \uc2a4\uc2a4\ub85c \ub9d0\ud560 \uac83\uc774\uace0, \uc81c\uac00 \uac00\uc9c4 \ucc9c\uc7ac\uc131 \uc5ed\uc2dc \uc800\ub97c \ud1b5\ud574 \uc2a4\uc2a4\ub85c \ubc16\uc73c\ub85c \ud130\uc838 \ub098\uc62c \uac83\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uacb0\ucf54 \uc5f4\uc5b4\ub193\uc740 \uc801 \uc5c6\ub294 \ud1b5\ub85c\ub97c \ud1b5\ud574 \uc0dd\uac01\uc774 \uc6b0\ub9ac \uc548\uc73c\ub85c \ubc00\ub824 \ub4e4\uc5b4\uc624\uace0, \uc6b0\ub9ac\uac00 \uacb0\ucf54 \uc790\ubc1c\uc801\uc73c\ub85c \uc5f4\uc5b4\uc900 \uc801 \uc5c6\ub294 \ud1b5\ub85c\ub97c \ud1b5\ud574 \uc0dd\uac01\uc774 \uc6b0\ub9ac \ubc16\uc73c\ub85c \ube60\uc838\ub098\uac11\ub2c8\ub2e4. \uadf8 \uc9c4\uc815\ud55c \uc778\uaca9\uc774\ub780 \uc584\ud30d\ud55c \uc6b0\ub9ac \uba38\ub9bf\uc18d \uc9c0\uc2dd\uc744 \ud6cc\uca4d \ub6f0\uc5b4\ub118\uc5b4 \uc800 \ub192\uc740 \uacf3\uc5d0\uc11c \uc0ac\ub78c\ub4e4\uc744 \uac00\ub974\uce58\ub294 \ubc95\uc785\ub2c8\ub2e4. \uadf8 \uc0ac\ub78c\uc758 \uc601\ud63c\uc774 \ud6cc\ub96d\ud558\uac8c \uc790\ub77c\ub0ac\ub294\uc9c0 \ud639\uc740 \ud0c0\ub77d\ud558\uace0 \uba54\ub9d0\ub790\ub294\uc9c0\ub97c \uc54c \uc218 \uc788\ub294 \uac00\uc7a5 \ud655\uc2e4\ud55c \uc99d\uac70\ub294, \ubc14\ub85c \uc6b0\ub9ac\uac00 \ud3c9\uc18c \ubb34\uc2ec\ucf54 \ub0b4\ubc49\ub294 \ub9c8\uc74c\uc758 '\uc5b4\uc870(\ub9d0\ud22c\uc640 \ubd84\uc704\uae30)'\uc5d0\uc11c \uc5ec\uc2e4\ud788 \ub4dc\ub7ec\ub0a9\ub2c8\ub2e4. \uc0ac\ub78c\uc774 \uac89\ubcf4\uae30\uc5d0 \uc81c\uc544\ubb34\ub9ac \uace0\uc0c1\ud55c \ucc99, \ucc29\ud55c \ucc99 \uafb8\ubbf8\uace0 \ub2e4\ub2cc\ub2e4 \ud560\uc9c0\ub77c\ub3c4, \ub9cc\uc77c \uadf8\uc758 \uc601\ud63c\uc774 \ud558\ub098\ub2d8 \ud488 \uc548\uc5d0 \ud3b8\uc548\ud788 \uc548\ucc29\ud558\uc9c0 \ubabb\ud588\ub2e4\uba74 \uadf8\uc758 \ubee3\ubee3\ud55c \ub9e4\ub108\uc640 \ubd88\uc548\ud55c \ub9d0\ud22c\uac00 \uc774\ubbf8 \uc6b0\uc8fc\uc758 \uc911\uc2ec\uc744 \uc783\uc5b4\ubc84\ub838\uc74c\uc744 \ub9cc\ucc9c\ud558\uc5d0 \uace0\ubc31\ud558\uace0 \ub9d9\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc9c4\uc815\ud55c \uc601\ud63c\uc758 \uc911\uc2ec\uc744 \ucc3e\uc740 \uc0ac\ub78c\uc740, \ube44\ub85d \uc138\uc0c1 \uacf5\ubd80\ub97c \ubabb\ud574 \ubb34\uc9c0\ud560\uc9c0\ub77c\ub3c4 \uadf8 \uc548\uc758 \uc2e0\uc131\uc774 \uaecd\ub370\uae30\ub97c \ub6ab\uace0 \ub098\uc640 \ub208\ubd80\uc2dc\uac8c \ube5b\ub0a9\ub2c8\ub2e4. \uc9c4\ub9ac\ub97c \uc560\ud0c0\uac8c \ucc3e\uc544 \ud5e4\ub9e4\uba70 \ub3d9\ub0e5\ud558\ub294 \uc0ac\ub78c\uc758 \ubaa9\uc18c\ub9ac\uc640, \uc774\ubbf8 \uc9c4\ub9ac\ub97c \uaf49 \uc950\uace0 \uc18c\uc720\ud55c \uc0ac\ub78c\uc758 \ubaa9\uc18c\ub9ac\ub294 \uc644\uc804\ud788 \ucc28\uc6d0\uc774 \ub2e4\ub985\ub2c8\ub2e4. \uc774\uac83\uc774 \ubc14\ub85c \uc9c4\uc9dc \ud6cc\ub96d\ud55c \uc2a4\uc2b9\uacfc \uac00\uc9dc \uac15\uc5f0\uc790\ub4e4\uc744 \uad6c\ubcc4\ud574 \ub0b4\ub294 \uacb0\uc815\uc801\uc778 \ucc28\uc774\uc810\uc785\ub2c8\ub2e4. \uc2dc\uc778\uc73c\ub85c \uce58\uc790\uba74 \ud5c8\ubc84\ud2b8(Herbert) \uac19\uc740 \uc0ac\ub78c\uacfc \ud3ec\ud504(Pope) \uac19\uc740 \uc0ac\ub78c\uc758 \ucc28\uc774\uc774\uace0, \ucca0\ud559\uc790\ub85c \uce58\uc790\uba74 \uc2a4\ud53c\ub178\uc790(Spinoza), \uce78\ud2b8(Kant), \ucf5c\ub9ac\uc9c0(Coleridge) \uac19\uc740 \uc0ac\ub78c\uacfc \ub85c\ud06c(Locke), \ud398\uc77c\ub9ac(Paley), \ub9e4\ud0a8\ud1a0\uc2dc(Mackintosh), \uc2a4\ud29c\uc5b4\ud2b8(Stewart) \uac19\uc740 \uc0ac\ub78c\uc758 \ucc28\uc774\uc785\ub2c8\ub2e4. \ucc38\ub41c \uc2a4\uc2b9\ub4e4\uc740 \uc0ac\ubb3c\uc758 \uac00\uc7a5 \uae4a\uc740 \uc18d\ub208\uae38\ub85c\ubd80\ud130, \ud639\uc740 \ubcf8\uc778 \uc2a4\uc2a4\ub85c \ub208\ubb3c\uacfc \ub540\uc73c\ub85c \uacaa\uc5b4\ub0b4\uc5b4 \uc9c4\uc9dc \ub0b4 \uac83\uc73c\ub85c \uc18c\uc720\ud55c \uc9c4\ub9ac\ub9cc\uc744 \uc544\uc8fc \ub2f9\ub2f9\ud558\uac8c \ub9d0\ud569\ub2c8\ub2e4. \ubc18\uba74 \ub204\uad70\uac00\ub97c \uac00\ub974\uce60 \uc790\uaca9\uc870\ucc28 \uc5c6\ub294 \uac70\uc9d3 \uc2a4\uc2b9\ub4e4\uc740 \ube59\ube59 \uac89\ub9cc \uad6c\uacbd\ud558\ub2e4\uac00 \ucc45\uc5d0\uc11c \uc8fc\uc6cc\ub4e4\uc740 \uae00\uadc0\ub97c \uae30\uc5b5\uc5d0\ub9cc \uc758\uc874\ud574 \uc575\ubb34\uc0c8\ucc98\ub7fc \ub2ec\ub2ec \ub5a0\ub4e4 \ubfd0\uc785\ub2c8\ub2e4. \uc81c\ubc1c \ubc14\uae65\uc138\uc0c1\uc5d0\uc11c \uc8fc\uc6cc\ub4e4\uc740 \uc584\ud30d\ud55c \uc774\uc57c\uae30\ub85c \uc800\ub97c \ud6c8\uacc4\ud558\ub824 \ub4e4\uc9c0 \ub9c8\uc2ed\uc2dc\uc624. \ub2f9\uc2e0\uc774 \ud558\ub294 \uadf8 \uc815\ub3c4\uc758 \uc678\uc801\uc778 \uc124\uad50\ub77c\uba74 \uc800 \ud63c\uc790\uc11c\ub3c4 \ucda9\ubd84\ud788 \uc9c0\uc5b4\ub0bc \uc218 \uc788\uc73c\ub2c8\uae4c\uc694. \uc6b0\ub9ac\uc5d0\uac8c \uac00\ub974\uce68\uc744 \uc8fc\uc2dc\ub824\uac70\ub4e0 \uc608\uc218\ub2d8\ucc98\ub7fc \uc5b8\uc81c\ub098 \ub2f9\uc2e0\uc758 \uac00\uc7a5 \uae4a\uc740 \uc601\ud63c\uc758 \uc6b0\ubb3c\uc5d0\uc11c \uae38\uc5b4 \uc62c\ub9b0 \ub9d0\uc500\ub9cc \ud558\uc2ed\uc2dc\uc624. \ubc14\ub85c \uadf8\uacf3\uc5d0 \ub180\ub77c\uc6b4 \uae30\uc801\uc774 \uc228\uc5b4 \uc788\uc2b5\ub2c8\ub2e4. \ub9cc\uc57d \uc5b4\ub5a4 \uc0ac\ub78c\uc774 \uac00\uc7a5 \uac70\ub8e9\ud55c \ub9c8\uc74c\uc758 \ud55c\uac00\uc6b4\ub370, \uc989 \ub0b4\uac00 \ubc49\uc740 '\ub9d0\uc500'\uacfc \uadf8 \ub9d0\uc500\uc774 \uac00\ub9ac\ud0a4\ub294 '\uc9c4\ub9ac'\uac00 100% \ub611\uac19\uc774 \uc77c\uce58\ud558\ub294 \ubc14\ub85c \uadf8 \uc9c0\uc810\uc5d0\uc11c \ub9d0\ud558\uace0 \uc788\ub294 \uac83\uc774 \uc544\ub2c8\ub77c\uba74, \uadf8\ub294 \ucc28\ub77c\ub9ac \uc785\uc744 \ub2e4\ubb3c\uace0 \uc790\uc2e0\uc758 \ubb34\uc2dd\ud568\uc744 \ubd80\ub044\ub7fd\uac8c \uace0\ubc31\ud558\ub294 \ud3b8\uc774 \ub0ab\uc2b5\ub2c8\ub2e4.\n\n## \u25a0 \uc81c3\ubd80\n\n![\uc81c3\ubd80](images/scene_ch4.png)\n\n\ub611\uac19\uc740 \uc804\uc9c0\uc804\ub2a5\ud568\uc774 \uc6b0\ub9ac\uc758 \uc9c0\ub2a5 \uc18d\uc73c\ub85c \uc2a4\ub974\ub974 \ud758\ub7ec \ub4e4\uc5b4\uc640, \uc6b0\ub9ac\uac00 \uc138\uc0c1\uc5d0\uc11c '\ucc9c\uc7ac\uc131'\uc774\ub77c \ubd80\ub974\ub294 \uc5c4\uccad\ub09c \uae30\uc801\uc744 \ub9cc\ub4e4\uc5b4 \ub0c5\ub2c8\ub2e4. \uc138\uc0c1 \uc0ac\ub78c\ub4e4\uc774 \uc704\ub300\ud558\ub2e4\uace0 \uce58\ucf1c\uc138\uc6b0\ub294 \ub300\ubd80\ubd84\uc758 \ub611\ub611\ud55c \uc9c0\ud61c\ub294 \uc0ac\uc2e4 \uc544\ubb34\ub7f0 \uc601\uc801\uc778 \uae4a\uc774\uac00 \uc5c6\uc2b5\ub2c8\ub2e4. \uac00\uc7a5 \uac70\ub8e9\ud55c \ube5b\uc744 \ubc1b\uc740 \uc9c4\uc9dc \uc704\uc778\ub4e4\uc740 \uc720\uba85\ud55c \uc791\uac00\uac00 \ub418\ub294 \uac83 \ub530\uc704\uc5d4 \uc804\ud600 \uad00\uc2ec\uc774 \uc5c6\uc73c\uba70, \uc544\uc608 \uae00\uc744 \uc4f0\ub824 \ud558\uc9c0\ub3c4 \uc54a\uc2b5\ub2c8\ub2e4. \uc138\uc0c1\uc5d0 \ub110\ub9b0 \uc218\ub9ce\uc740 \ud559\uc790\ub098 \uc774\ub984\ub09c \ubca0\uc2a4\ud2b8\uc140\ub7ec \uc791\uac00\ub4e4 \uc0ac\uc774\uc5d0\uc11c \uc6b0\ub9ac\ub294 \uadf8 \uc5b4\ub5a4 \uac70\ub8e9\ud568\ub3c4 \ub290\ub07c\uc9c0 \ubabb\ud569\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uadf8\ub4e4\uc5d0\uac8c\uc11c \uc2e0\uc131\ud55c \uc601\uac10\uc744 \uc5bb\uae30\ubcf4\ub2e4\ub294 \uadf8\uc800 \uc138\uc0c1\uc744 \uc58d\uc0bd\ud558\uac8c \uc0b4\uc544\uac00\ub294 \uc694\ub839\uacfc \uae00 \uc4f0\ub294 \uaf3c\uc218\ub9cc\uc744 \ubc1c\uacac\ud560 \ubfd0\uc785\ub2c8\ub2e4. \uadf8\ub4e4\uc758 \uc9c0\uc2dd\uacfc \uc7ac\ub2a5\uc740 \ub9c8\uce58 \uc5b4\ub290 \ud55c\ucabd \ud314\ub9cc \uae30\ud615\uc801\uc73c\ub85c \ube44\ub300\ud558\uac8c \uc790\ub77c\ub09c \uac83\ucc98\ub7fc \ud749\uce21\ud558\uac8c \ubd88\uade0\ud615\ud574\uc11c, \uc624\ud788\ub824 \uadf8 \uc798\ub09c \uc7ac\ub2a5\uc774 \uadf8 \uc0ac\ub78c\uc744 \ubcd1\ub4e4\uac8c \ub9cc\ub4dc\ub294 \uc9c8\ubcd1\uc774 \ub418\uc5b4\ubc84\ub9bd\ub2c8\ub2e4. \uc774\ub4e4\uc758 \ucc28\uac00\uc6b4 \uc9c0\uc2dd\uc740 \uc0ac\ub78c\ub4e4\uc5d0\uac8c \uc874\uacbd\uc2ec\ubcf4\ub2e4\ub294 \uc624\ud788\ub824 \uc7ac\uc218 \uc5c6\ub2e4\ub294 \ubd88\ucf8c\uac10\uc744 \uc8fc\uba70, \uadf8\ub4e4\uc774 \uc9c4\ub9ac\ub85c \ub098\uc544\uac00\ub294 \uae38\uc744 \uaf49 \ud2c0\uc5b4\ub9c9\ub294 \uac70\ub300\ud55c \uc7a5\uc560\ubb3c\uc774 \ub418\uace0 \ub9d9\ub2c8\ub2e4. \uadf8\ub7ec\ub098 \ucc38\ub41c '\ucc9c\uc7ac\uc131'\uc740 \uc624\ub85c\uc9c0 \uc885\uad50\uc801\uc774\uace0 \ub530\ub73b\ud558\uba70 \uac70\ub8e9\ud55c \uac83\uc785\ub2c8\ub2e4. \ucc38\ub41c \ucc9c\uc7ac\uc131\uc740 \ucf67\ub300 \ub192\uac8c \ub0a8\uc744 \ubb34\uc2dc\ud558\ub294 \uc720\ubcc4\ub09c \uc0c1\ud0dc\uac00 \uc544\ub2c8\ub77c, \uc624\ud788\ub824 \uac00\uc7a5 \ud3c9\ubc94\ud55c \uc0ac\ub78c\ub4e4\uacfc \ub048\ub048\ud558\uac8c \ud558\ub098\ub85c \uc5f0\uacb0\ub41c \uc9c0\ub3c5\ud788\ub3c4 \ub530\ub73b\ud55c \uc0c1\ud0dc\uc785\ub2c8\ub2e4. \ubaa8\ub4e0 \uc704\ub300\ud55c \uc2dc\uc778\ub4e4\uc758 \ub0b4\uba74\uc5d0\ub294 \uadf8\ub4e4 \uac1c\uc778\uc774 \uac00\uc9c4 \uae00\uc7ac\uc8fc \ub530\uc704\ub97c \uc544\ub4dd\ud558\uac8c \ub6f0\uc5b4\ub118\ub294 \uac70\ub300\ud55c '\uc778\ub958\uc560\uc801\uc778 \uc9c0\ud61c'\uac00 \uc228 \uc26c\uace0 \uc788\uc2b5\ub2c8\ub2e4. \ubca0\uc2a4\ud2b8\uc140\ub7ec \uc800\uc220\uac00, \uc7ac\uce58 \uc788\ub294 \ub18d\ub2f4\uc744 \ub358\uc9c0\ub294 \uc790, \uc790\uae30\ud3b8\ub9cc \uac10\uc2f8\ub294 \ub2f9\ud30c\uc8fc\uc758\uc790, \uac89\uc637\ub9cc \ubc88\uc9c0\ub974\ub974\ud558\uac8c \ucc28\ub824\uc785\uc740 \uc2e0\uc0ac \uac19\uc740 \uaecd\ub370\uae30\ub4e4\uc774 \uac10\ud788 \uc6b0\uc8fc\uc801\uc778 '\uc9c4\uc9dc \uc778\uac04'\uc758 \uc790\ub9ac\ub97c \ube8f\uc5b4 \ub300\uccb4\ud560 \uc218\ub294 \uc5c6\uc2b5\ub2c8\ub2e4. \ud638\uba54\ub85c\uc2a4\uc640 \ucd08\uc11c(Chaucer), \uc2a4\ud39c\uc11c(Spenser), \uc170\uc775\uc2a4\ud53c\uc5b4, \ubc00\ud134 \uac19\uc740 \uc5ed\uc0ac\uc801\uc778 \uac70\uc7a5\ub4e4\uc5d0\uac8c\uc11c\ub294 \uc774 \uc778\ub958 \ubcf8\uc5f0\uc758 \ub208\ubd80\uc2e0 \uc2e0\uc131\uc774 \ucc2c\ub780\ud558\uac8c \ube5b\ub0a9\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \uc624\uc9c1 \uc9c4\ub9ac \ud558\ub098\ub9cc\uc73c\ub85c \ubc30\ubd88\ub7ec \ud588\ub358 \ub300\ub2e8\ud55c \uc0ac\ub78c\ub4e4\uc785\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \ud654\ub824\ud55c \uc218\uc2dd\uc5b4\ub098 \uc591\ub150 \uc5c6\uc774 \uc624\uc9c1 \ud22c\uba85\ud55c \uc9c4\ub9ac \ud558\ub098\ub9cc\uc744 \ud22d \ub358\uc9c0\ub4ef \ub9d0\ud558\uae30 \ub54c\ubb38\uc5d0, \uc870\ubbf8\ub8cc \ud30d\ud30d \ub4e4\uc5b4\uac04 \uc790\uadf9\uc801\uc778 \uae00\ub9db\uc5d0 \uc911\ub3c5\ub41c \ud604\ub300\uc778\ub4e4\uc758 \ub208\uc5d0\ub294 \ub2e4\uc18c \ucc28\uac11\uace0 \ubb34\ub69d\ub69d\ud558\uac8c \ubcf4\uc77c\uc9c0\ub3c4 \ubaa8\ub985\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \ub300\ub839\uc740 \ubc14\ub85c \uadf8 \uc704\ub300\ud55c \uc2dc\uc778\ub4e4\uc758 \ub208\uc744 \ud1b5\ud574 \uc138\uc0c1\uc744 \ub530\uc2a4\ud558\uac8c \ubc14\ub77c\ubcf4\uace0 \ub2f9\uc2e0\uc774 \ucc3d\uc870\ud55c \ub9cc\ubb3c\ub4e4\uc744 \ubab8\uc18c \ucd95\ubcf5\ud558\uc2dc\ub294 \uac83\uc785\ub2c8\ub2e4. \uc704\ub300\ud55c \uc601\ud63c\uc740 \uc790\uae30\uac00 \uc54c\uace0 \uc788\ub294 \uc54c\ub7c9\ud55c \uc9c0\uc2dd\ubcf4\ub2e4 \ud6e8\uc52c \ud06c\uba70, \uc790\uc2e0\uc774 \ub9cc\ub4e4\uc5b4\ub0b8 \uadf8 \uc5b4\ub5a4 \uc704\ub300\ud55c \ucc9c\uc7ac\uc801 \uac78\uc791\ubcf4\ub2e4\ub3c4 \uc218\ucc9c \ubc30\ub294 \ub354 \uc9c0\ud61c\ub86d\uc2b5\ub2c8\ub2e4. \uc704\ub300\ud55c \uc2dc\uc778\uc740 \uadf8\uac00 \uc368\ub0b8 \uc2dc \uc790\uccb4\ubcf4\ub2e4\ub3c4, \uc2dc\ub97c \uc77d\ub294 \uc6b0\ub9ac \ub9c8\uc74c\uc18d\uc5d0 \ubb34\ud55c\ud55c \uc6b0\uc8fc\uc758 \ud48d\uc694\ub85c\uc6c0\uc744 \ub9db\ubcf4\uac8c \ud574\uc900\ub2e4\ub294 \uc810\uc5d0\uc11c \ud6e8\uc52c \ub354 \uc18c\uc911\ud569\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc6b0\ub9ac\ub294 \uc815\uc791 \uadf8\uac00 \uc4f4 \uc791\ud488 \uc790\uccb4\ub294 \uc870\uae08 \ub35c \uc911\uc694\ud558\uac8c \uc5ec\uae30\uac8c \ub418\uae30\ub3c4 \ud569\ub2c8\ub2e4. \uc2dc\uc778\uc774 \uc6b0\ub9ac\uc5d0\uac8c \uac74\ub124\ub294 \uac00\uc7a5 \ud6cc\ub96d\ud55c \uac00\ub974\uce68\uc740, \uadf8 \uc704\ub300\ud55c \uc2dc\uc778\uc774 \ud3c9\uc0dd \uc774\ub8e9\ud574 \ub0b8 \ubaa8\ub4e0 \uc704\ub300\ud55c \uc5c5\uc801\uc870\ucc28 \uc6b0\ub9ac \ub208\uc5d0 \ud55c\uc5c6\uc774 \ucd08\ub77c\ud558\uac8c \ubcf4\uc77c \ub9cc\ud07c \uc6b0\ub9ac \ub0b4\uba74\uc758 \uc601\ud63c\uc744 \uae4c\ub9c8\ub4dd\ud788 \ub192\uc740 \uacf3\uc73c\ub85c \ub04c\uc5b4\uc62c\ub824 \uc8fc\ub294 \ub370 \uc788\uc2b5\ub2c8\ub2e4. \uc170\uc775\uc2a4\ud53c\uc5b4\ub294 \uc6b0\ub9ac\ub97c \ub611\ub611\ud568\uc758 \uac00\uc7a5 \ub192\uc740 \uacbd\uc9c0\ub85c \ub370\ub824\ub2e4 \ub193\uc73c\uba74\uc11c\ub3c4, \uc815\uc791 \uc170\uc775\uc2a4\ud53c\uc5b4 \ubcf8\uc778\uc774 \uc4f4 \uc218\ub9ce\uc740 \uba85\uc791\ub4e4\uc870\ucc28 \ube48\uc57d\ud558\uace0 \uc584\ud30d\ud574 \ubcf4\uc77c \ub9cc\ud07c \uc6b0\ub9ac \ub0b4\uba74\uc5d0 \uc228\uaca8\uc838 \uc788\ub358 \uac70\ub300\ud55c \uc601\ud63c\uc758 \uc6b0\uc8fc\ub97c \uc2ac\uca4d \ubcf4\uc5ec\uc90d\ub2c8\ub2e4. \uadf8\ub798\uc11c \ud584\ub9bf\uacfc \ub9ac\uc5b4\uc655 \uac19\uc740 \uc804\uc124\uc801\uc778 \uba85\uc791\ub4e4\uc870\ucc28\ub3c4 \uc800 \uac70\ub300\ud55c \ub300\uc790\uc5f0\uc758 \uc2e4\uccb4 \uc55e\uc5d0\uc11c\ub294 \ubc14\uc704 \uc704\ub97c \uc2a4\uccd0 \uc9c0\ub098\uac00\ub294 \ub098\uadf8\ub124\uc758 \uadf8\ub9bc\uc790\ucc98\ub7fc \ub367\uc5c6\uac8c \ub290\uaef4\uc9c0\ub294 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub7f0 \ud584\ub9bf\uacfc \ub9ac\uc5b4\uc655\uc744 \ub0b3\uc740 \uac70\ub300\ud55c \uc601\uac10\uc758 \uc6b0\ubb3c\uc740, \ub9c8\uc74c\ub9cc \uba39\uc73c\uba74 \ub9e4\uc77c\uac19\uc774 \uc601\uc6d0\ud1a0\ub85d \uadf8\ub9cc\ud07c \ub180\ub77c\uc6b4 \uac83\ub4e4\uc744 \ucc0d\uc5b4\ub0bc \uc218 \uc788\uc2b5\ub2c8\ub2e4. \ud584\ub9bf\uc744 \ud0c4\uc0dd\uc2dc\ud0a8 \ubc14\ub85c \uadf8 \uc6d0\ucc9c\uc778 \ub300\ub839\uc744 \uc6b0\ub9ac \uc790\uc2e0\ub3c4 \uc774\ubbf8 \uc18c\uc720\ud558\uace0 \uc788\ub294\ub370, \ub3c4\ub300\uccb4 \ubb63 \ud558\ub7ec \uc170\uc775\uc2a4\ud53c\uc5b4\uc758 \uc791\ud488 \ucabc\uac00\ub9ac \uac19\uc740 \uac83\uc5d0 \uadf8\ud1a0\ub85d \ubaa9\uc744 \ub9e4\uace0 \ubd80\ub7ec\uc6cc\ud55c\ub2e8 \ub9d0\uc785\ub2c8\uae4c?\n\n\uc774 \uac70\ub8e9\ud55c \uc5d0\ub108\uc9c0\ub294 \uc624\uc9c1 \ud558\ub098, '\ub300\ub839\uc5d0\uac8c \ub098 \uc790\uc2e0\uc744 100% \uc628\uc804\ud788 \ub0b4\ub2e4 \ubc14\uce5c\ub2e4'\ub294 \uc5c4\uccad\ub098\uac8c \uc5c4\uaca9\ud55c \uc870\uac74 \uc704\uc5d0\uc11c\ub9cc \uc6b0\ub9ac \uac1c\uc778\uc758 \uc0b6\uc5d0 \uc0ac\ubfd0\ud788 \ub0b4\ub824\uc549\uc2b5\ub2c8\ub2e4. \uadf8\uac83\uc740 \ub9c8\uc74c\uc774 \uacb8\uc190\ud558\uace0 \ub0ae\uc544\uc9c4 \ud3c9\ubc94\ud55c \uc0ac\ub78c\uc5d0\uac8c \ucc3e\uc544\uc624\uba70, \uc624\ub9cc\ud55c \ub9c8\uc74c\uacfc \uac89\uce58\ub808\ub97c \uc4f0\ub808\uae30\ud1b5\uc5d0 \ub0b4\ubc84\ub9b4 \uc900\ube44\uac00 \ub41c \ubaa8\ub4e0 \uc774\uc5d0\uac8c \uc2e0\uc131\ud55c \uae68\ub2ec\uc74c\uacfc \uace0\uc694\ud55c \ud3c9\ud654, \uadf8\ub9ac\uace0 \uc7a5\uc5c4\ud55c \uae30\uc6b4\uc73c\ub85c \ubc00\ub824\uc635\ub2c8\ub2e4. \uc704\ub300\ud55c \uc601\ud63c\uc774 \uae43\ub4e0 \uc0ac\ub78c\uc744 \ub208\uc55e\uc5d0\uc11c \ub9c8\uc8fc\ud560 \ub54c, \uc6b0\ub9ac\ub294 \uc778\uac04\uc774 \ub3c4\ub2ec\ud560 \uc218 \uc788\ub294 \uc704\ub300\ud568\uc758 \uc9c0\ud3c9\uc120\uc774 \ub05d\uc774 \uc5c6\uc74c\uc744 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uae4a\uc740 \uc601\uac10\uc5d0 \ud655 \uc0ac\ub85c\uc7a1\ud788\uace0 \ub3cc\uc544\uc628 \uc0ac\ub78c\uc740 \ub9d0\ud22c\uc640 \ud0dc\ub3c4\ubd80\ud130 \uc804\ud600 \ub2e4\ub974\uac8c \ubcc0\ud569\ub2c8\ub2e4. \uadf8\ub294 \ub354 \uc774\uc0c1 \ub0a8\ub4e4\uc774 \uc790\uae30\ub97c \uc5b4\ub5bb\uac8c \uc0dd\uac01\ud560\uc9c0 \ub208\uce58 \ubcf4\ub290\ub77c \ucb48\ubf1b\ub300\uc9c0 \uc54a\uace0 \uc138\uc0c1\uc758 \ubcf8\uc9c8\uc744 \uac70\uce68\uc5c6\uc774 \uaff0\ub6ab\uc5b4 \ubd05\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc6b0\ub9ac\uc5d0\uac8c \ub208\uce58 \ubcf4\uc9c0 \uc54a\ub294 100% \uc194\uc9c1\ud568\ub9cc\uc744 \uc694\uad6c\ud558\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \ubc18\uba74 \ud5c8\uc601\uc2ec\uc5d0 \uac00\ub4dd \ucc2c \uc5ec\ud589\uc790\ub294 \uadc0\uc871\uc774\ub098 \uc9c0\uccb4 \ub192\uc740 \uc0ac\ub78c\uc774 \uc790\uae30\uc5d0\uac8c \ub358\uc9c4 \uc0ac\uc18c\ud55c \ub9d0 \ud55c\ub9c8\ub514\ub97c \uc5c4\uccad\ub098\uac8c \ubd80\ud480\ub824\uc11c \uc790\uae30 \uc0b6\uc744 \ud3ec\uc7a5\ud558\ub824 \ub4ed\ub2c8\ub2e4. \uc18d\ubb3c\uc801\uc778 \uc0ac\ub78c\ub4e4\uc740 \uba85\ud488 \ubc18\uc9c0\ub098 \ubaa9\uac78\uc774, \uadf8\ub9ac\uace0 \ub0a8\ub4e4\uc774 \uac74\ub124\ub294 \ub2ec\ucf64\ud55c \uce6d\ucc2c\ub4e4\uc744 \uc560\uc9c0\uc911\uc9c0 \ubaa8\uc544\ub450\uae30\uc5d0 \ubc14\uc069\ub2c8\ub2e4. \uc2ec\uc9c0\uc5b4 \uc790\uc2e0\uc740 \uc880 \ub2e4\ub974\ub2e4\uba70 \uad50\uc591\uc744 \ucc28\ub9ac\ub294 \uc790\ub4e4\ub3c4, \uc720\ub7fd \uc5ec\ud589\uc774\ub098 \uc720\uba85\ud55c \ucc9c\uc7ac\uc640\uc758 \ub9cc\ub0a8 \uac19\uc740 \ub0ad\ub9cc\uc801\uc778 \uacbd\ud5d8\ub9cc \uc3d9\uc3d9 \uace8\ub77c \uc790\ub791\ud558\uba70 \uc790\uae30 \uc0b6\uc5d0 \ud654\ub824\ud55c \uc0c9\uce60\uc744 \ud558\ub824 \uc560\uc501\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc704\ub300\ud55c \ub300\ub839\uc744 \uc608\ubc30\ud558\uae30 \uc704\ud574 \ub4dc\ub192\uc774 \ub0a0\uc544\uc624\ub974\ub294 \uc9c4\uc9dc \uc601\ud63c\uc740 \ubf1b\uc18d\uae4c\uc9c0 \uc18c\ubc15\ud558\uace0 \ubb35\ubb35\ud558\uac8c \uc9c4\uc2e4\ud560 \ubfd0\uc785\ub2c8\ub2e4. \uadf8\uc5d0\uac8c\ub294 \uc7a5\ubc0b\ube5b \ud658\uc0c1\ub3c4, \ud654\ub824\ud55c \uc778\ub9e5\ub3c4, \uadf9\uc801\uc778 \ubaa8\ud5d8\uc870\ucc28 \ud544\uc694\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \ud0c0\uc778\uc758 \uce6d\ucc2c\uacfc \ubc15\uc218\uac08\ucc44 \ub530\uc704\ub294 \uc544\uc608 \ubc14\ub77c\uc9c0\ub3c4 \uc54a\uc2b5\ub2c8\ub2e4. \uadf8\ub294 \uc624\uc9c1 '\uc9c0\uae08 \uc774 \uc21c\uac04'\uc5d0 \uc628\uc804\ud788 \uae68\uc5b4\uc11c \ud3c9\ubc94\ud55c \ucc30\ub098\ub97c \uac00\uc7a5 \uc5c4\uc219\ud558\uac8c \uc0b4\uc544\uac11\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \ub108\ubb34\ub098 \uc18c\ubc15\ud574\uc11c \uc9c0\ub098\uce58\uae30 \uc26c\uc6b4 \uc544\uc8fc \uc0ac\uc18c\ud55c \uc77c\uc0c1\uc870\ucc28\ub3c4, \uc2e4\uc740 \uc774\ubbf8 \ubb34\ud55c\ud55c \uc6b0\uc8fc\uc758 \uac70\ub300\ud55c \ube5b\uc744 \ub0a8\uae40\uc5c6\uc774 \ub4ec\ubfcd \uba38\uae08\uace0 \uc788\ub2e4\ub294 \uac83\uc744 \uc798 \uc54c\uace0 \uc788\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc774\ub7f0 \uc7a5\uc5c4\ud558\ub9ac\ub9cc\uce58 \uc18c\ubc15\ud55c \uc815\uc2e0\uc744 \uac00\uc9c4 \uc790\uc640 \uba87 \ub9c8\ub514 \ub300\ud654\ud558\uace0 \ub098\uba74, \uc11c\uc810\uc5d0 \ub110\ub9b0 \uace0\uc0c1\ud55c \ubb38\ud559 \ucc45\ub4e4\uc774 \ub9c8\uce58 \uc560\ub4e4 \uc7a5\ub09c\uc774\ub098 \uc2dc\uc2dc\ud55c \ub9d0\uc7a5\ub09c\ucc98\ub7fc \ub290\uaef4\uc9d1\ub2c8\ub2e4. \ud654\uc7a5\uae30 \ud558\ub098 \uc5c6\ub294 \uac00\uc7a5 \ud22c\uba85\ud558\uace0 \ub2e8\uc21c\ud55c \ub9d0\uc774 \ucd5c\uace0\ub85c \uc704\ub300\ud55c \ubc95\uc774\ub2c8\uae4c\uc694. \uadf8\ub7ec\ub098 \ub300\ub839\uc774 \uac00\uc9c4 \ubb34\ud55c\ud55c \ud48d\uc694\ub85c\uc6c0 \uc55e\uc5d0\uc11c\ub294 \uadf8 \ub2e8\uc21c\ud55c \ub9d0\ub4e4\uc870\ucc28 \ub108\ubb34\ub3c4 \ud754\ud558\uace0 \ub2f9\uc5f0\ud55c \uae30\ubcf8\uc5d0 \ubd88\uacfc\ud569\ub2c8\ub2e4. \uc628 \uc9c0\uad6c\uc640 \ud558\ub298\uc774 \ud1b5\uc9f8\ub85c \uc6b0\ub9ac \uac83\uc778\ub370, \ub3c4\ub300\uccb4 \uc65c \ub545\ubc14\ub2e5\uc5d0 \ub5a8\uc5b4\uc9c4 \uc870\uc57d\ub3cc \uba87 \uac1c\ub098 \ube48 \uc720\ub9ac\ubcd1\uc5d0 \ub2f4\uae34 \uacf5\uae30\ub97c \ucc28\uc9c0\ud558\uaca0\ub2e4\uace0 \uadf8\ud1a0\ub85d \uc544\ub4f1\ubc14\ub4f1 \uc9d1\ucc29\ud558\uaca0\uc2b5\ub2c8\uae4c?\n\n\ub2f9\uc2e0\uc744 \ud3ec\uc7a5\ud558\uace0 \uc788\ub294 \ubaa8\ub4e0 \uac00\uc2dd\uc801\uc778 \uc7a5\uc2dd\ub4e4\uc744 \uae68\ub057\uc774 \ub358\uc838\ubc84\ub9ac\uace0, \ubc8c\uac70\ubc97\uc740 \uc9c4\uc2e4 \uc18d\uc5d0\uc11c \uc0ac\ub78c \ub300 \uc0ac\ub78c\uc73c\ub85c \ud22c\uba85\ud558\uac8c \ub9c8\uc8fc\ud558\ub824 \ud558\uc9c0 \uc54a\ub294\ub2e4\uba74, \uacb0\ub2e8\ucf54 \uc2e0\uc131\uc758 \uac70\ub8e9\ud55c \ubb38\uc9c0\ubc29\uc744 \ub118\uc744 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. \uace0\uacb0\ud55c \uc601\ud63c\ub4e4\uc740 \ub9c8\uce58 \uc2e0\ub4e4\uc774 \uac70\ub2d0\ub4ef \uc608\uc758 \ubc14\ub974\uac8c \ub2f9\uc2e0 \uacc1\uc744 \uc9c0\ub0a9\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \ub2f9\uc2e0\uc758 \ub6f0\uc5b4\ub09c \uc7ac\uce58\ub098 \ucc9c\uc0ac \uac19\uc740 \ucc29\ud55c \ud589\uc2e4\uc870\ucc28 \ubcc4\ub2e4\ub978 \uce6d\ucc2c \ud558\ub098 \uc5c6\uc774 \uc544\uc8fc \ub364\ub364\ud558\uac8c \ubc1b\uc544\ub4e4\uc785\ub2c8\uae4c? \uc65c \uadf8\ub7f4\uae4c\uc694? \uadf8\uac83\uc744 \ub2f9\uc2e0\uc774 \ub2f9\uc5f0\ud788 \ubfdc\uc5b4\ub0b4\uc57c \ud560 \uc228 \uc26c\ub294 \uac83\uacfc \ub611\uac19\uc740 \uae30\ubcf8 \uc758\ubb34\ub85c \uce58\ubd80\ud574 \ubc84\ub9ac\uba70, \ub2f9\uc2e0\uc758 \ubcf8\uc9c8 \uc5ed\uc2dc \uc790\uc2e0\ub4e4\ub9cc\ud07c\uc774\ub098 \uc655 \uc911\uc758 \uc655\uc774\uba70 \uc6b0\uc8fc \ucd5c\uace0\ub85c \uace0\uadc0\ud55c \uc874\uc7ac\ub77c\uace0 \ucfe8\ud558\uac8c \uc778\uc815\ud574\ubc84\ub9ac\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc774 \uc18c\ubc15\ud558\uace0 \ub048\ub048\ud55c \ud615\uc81c\uc560 \ub118\uce58\ub294 \ud0dc\ub3c4\ub294, \uc11c\ub85c\ub97c \uc704\ub85c\ud55c\ub2f5\uc2dc\uace0 \uac00\uc9dc \uc544\ucca8\uc744 \uc8fc\uace0\ubc1b\uc73c\uba70 \uc815\uc791 \uc2a4\uc2a4\ub85c\uc758 \uc601\ud63c\uc744 \uac09\uc544\uba39\ub294 \uc694\uc998 \uc138\ud0dc\uc5d0 \uc5bc\ub9c8\ub098 \ubb35\uc9c1\ud558\uace0 \uc900\uc5c4\ud55c \uac00\ub974\uce68\uc785\ub2c8\uae4c! \ucc38\ub41c \uc601\ud63c\ub4e4\uc740 \uacb0\ucf54 \ub0a8\uc5d0\uac8c \uc544\ubd80\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc800\ub294 \uc774 \ucc38\ub41c \uc601\ud63c\ub4e4\uc774 \uc5b4\ub290 \ub0a0 \ud06c\ub86c\uc6f0(Cromwell)\uc774\ub098 \uc2a4\uc6e8\ub374\uc758 \ud06c\ub9ac\uc2a4\ud2f0\ub098 \uc5ec\uc655(Christina), \ucc30\uc2a4 2\uc138(Charles the Second), \uc81c\uc784\uc2a4 1\uc138(James the First), \ud639\uc740 \ud130\ud0a4\uc758 \ub300\uad70\uc8fc(the Grand Turk)\ub97c \ub9cc\ub098\ub7ec \uac04\ub300\ub3c4 \uc804\ud600 \uc774\uc0c1\ud558\uac8c \uc0dd\uac01\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \uc774\ubbf8 \uc790\uc2e0\uc758 \ub0b4\uba74\uc774 \uc138\uc0c1\uc758 \uc5b4\ub5a4 \uc655\uacfc\ub3c4 \uc644\ubcbd\ud558\uac8c \ub300\ub4f1\ud55c \uc704\uce58\uc5d0 \uc788\ub2e4\ub294 \uac83\uc744 \ub108\ubb34\ub098 \uc798 \uc54c\uace0 \uc788\uc73c\ub2c8\uae4c\uc694. \ucc9c\ud558\ub97c \ud638\ub839\ud558\ub294 \uad70\uc8fc \uc55e\uc5d0\uc11c\ub3c4 \uadf8\ub4e4\uc740 \uc870\uae08\ub3c4 \uad7d\uc2e0\uac70\ub9ac\uc9c0 \uc54a\uace0 \ud3c9\ub4f1\ud55c '\uc655 \ub300 \uc655'\uc73c\ub85c\uc11c \ub2f9\ub2f9\ud558\uac8c \ub9c8\uc8fc\ud569\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc774\ub4e4\uc740 \uac00\uc2dd\uc5d0 \uc9c0\uce5c \uad8c\ub825\uc790\ub4e4\uc5d0\uac8c \ub298 \ud558\ub298\uc774 \ub0b4\ub9b0 \ucd5c\uace0\uc758 \uc120\ubb3c\uc774 \ub429\ub2c8\ub2e4. \ub9e4\uc77c\ub9e4\uc77c \uac00\uc2dd\uc801\uc778 \uc544\ucca8\uafbc\ub4e4\uc758 \ube48\ub9d0\ub9cc \ub4e3\ub358 \uad70\uc8fc\uc5d0\uac8c, \ud3c9\ub4f1\ud55c \uc778\uac04\uc73c\ub85c\uc11c \uae30\uaebc\uc774 \uc800\ud56d\ud558\uba70 \uc2e0\uc120\ud55c \uc0dd\uac01\uc744 \ud6c5 \ub358\uc838\uc8fc\ub294 \uc774\ub4e4\uc758 \uc874\uc7ac\ub294 \uc18c\ub984 \ub3cb\uac8c \uc0c1\ucf8c\ud55c \ucda9\uaca9\uc785\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \ub9cc\uc778\uc9c0\uc0c1\uc758 \uc655\ub4e4\uc870\ucc28\ub3c4 \uc790\uc2e0\uc744 \ub9cc\ub098\uae30 \uc804\ubcf4\ub2e4 \ud6e8\uc52c \ub354 \ud604\uba85\ud558\uace0 \ud6cc\ub96d\ud55c \uc778\uac04\uc73c\ub85c \ub2e8\uc228\uc5d0 \uc131\uc7a5\uc2dc\ucf1c \ubc84\ub9bd\ub2c8\ub2e4. \uadf8\ub4e4\uc740 \uc584\ud30d\ud55c \ube44\uc704\ub97c \ub9de\ucd94\ub294 \uc544\ubd80 \ub530\uc704\ubcf4\ub2e4 \uc774 \uaf3f\uaf3f\ud558\uace0 \uc9c4\uc2e4\ud55c \ub2f9\ub2f9\ud568\uc774 \uc218\ub9cc \ubc30\ub294 \ub354 \uac00\uce58 \uc788\uace0 \uace0\uacb0\ud558\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uc544\uc8fc \ubf08\uc800\ub9ac\uac8c \uae68\ub2eb\uac8c \ud574\uc90d\ub2c8\ub2e4. \uc0ac\ub78c\ub4e4\uc744 \ub300\ud560 \ub54c 100% \ubb34\uc870\uac74 \uc18c\ubc15\ud558\uace0 \ud3c9\uc774\ud558\uac8c \ub300\ud558\uc2ed\uc2dc\uc624. \uac10\ud788 \ub2f9\uc2e0 \uc55e\uc5d0\uc11c \uadf8 \uc5b4\ub5a4 \uc595\uc740 \uc18d\uc784\uc218\ub098 \uc544\ucca8\uc870\ucc28 \uaebc\ub0bc \uc5c4\ub450\ub97c \ubabb \ub0b4\ub3c4\ub85d \ubb35\uc9c1\ud558\uac8c \ub2e4\uac00\uac00\uc2ed\uc2dc\uc624. \uadf8\uac83\uc774\uc57c\ub9d0\ub85c \ub2f9\uc2e0\uc774 \ud0c0\uc778\uc5d0\uac8c \ubcf4\uc5ec\uc904 \uc218 \uc788\ub294 \uc138\uc0c1 \ucd5c\uace0\uc758 \uc608\uc6b0\uc785\ub2c8\ub2e4. \uc704\ub300\ud55c \ubc00\ud134\uc774 \ub9d0\ud588\ub4ef, \"\uadf8\ub4e4\uc774 \ubcf4\ub0bc \uc218 \uc788\ub294 \ucd5c\uace0\uc758 \ucc2c\uc0ac\ub294 \uacb0\ucf54 \ub2ec\ucf64\ud55c \uc544\ucca8\uc774 \uc544\ub2c8\uba70, \uadf8\ub4e4\uc758 \uc18c\ubc15\ud558\uace0 \ud3c9\ubc94\ud55c \uc870\uc5b8 \ud55c\ub9c8\ub514\uac00 \uace7 \uac70\ub300\ud55c \ucc2c\uc591\"\uc778 \uc148\uc785\ub2c8\ub2e4.\n\n\uc601\ud63c\uc774 \uc77c\ud558\uc2dc\ub294 \uc774 \uac70\ub8e9\ud55c \uc791\uc6a9 \uc18d\uc5d0\uc11c, \uc720\ud55c\ud55c \uc778\uac04\uc758 \ub9c8\uc74c\uacfc \ubb34\ud55c\ud55c \ud558\ub098\ub2d8\uc758 \ud558\ub098 \ub428\uc740 \ub3c4\ubb34\uc9c0 \uc778\uac04\uc758 \uc5b8\uc5b4\ub85c\ub294 \ud45c\ud604\ud560 \uae38\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \uac00\uc7a5 \uc9c4\uc2e4\ud558\uac8c \ud558\ub098\ub2d8\uc744 \ub9c8\uc74c\uc5d0 \ubaa8\uc2e0 \uc18c\ubc15\ud55c \uc0ac\ub78c\uc740 \ub9c8\uce68\ub0b4 \uc790\uae30 \uc790\uc2e0\uc774 \uace7 \ud558\ub098\ub2d8\uc774 \ub429\ub2c8\ub2e4. \uc774 \ubb34\ud55c\ud55c \uc6b0\uc8fc\uc801 \uc5d0\ub108\uc9c0\uac00 \uc6b0\ub9ac \uc548\uc73c\ub85c \uac70\uce68\uc5c6\uc774 \ubc00\ub824\ub4dc\ub294 \ud604\uc0c1\uc740 \uc601\uc6d0\ud1a0\ub85d \uc0c8\ub86d\uace0 \uc2e0\ube44\ub85c\uc6b4 \uae30\uc801\uc785\ub2c8\ub2e4. \uc678\ub86d\uace0 \uace0\ub3c5\ud55c \uc2dc\uac04\ub4e4\uc744 \uaf49 \ucc44\uc6cc\uc8fc\uace0 \uc0b6\uc5d0\uc11c \ub2e4\uce5c \uc0c1\ucc98\uc640 \uc2e4\ub9dd\uc744 \ub9d0\ub054\ud788 \uc9c0\uc6cc\uc8fc\ub294 '\ub300\ub839'\uc758 \uc704\ub300\ud55c \uc0dd\uac01\uc774 \ub0b4 \ub9c8\uc74c\uc18d\uc5d0 \ubaa8\ub77d\ubaa8\ub77d \ud53c\uc5b4\ub0a0 \ub54c, \uadf8\uac83\uc774 \uc5bc\ub9c8\ub098 \ub530\uc2a4\ud558\uace0 \uac70\ub300\ud55c \uc704\uc548\uc774 \ub418\ub294\uc9c0 \ubaa8\ub985\ub2c8\ub2e4. \uc138\uc0c1\uc774 \ub9cc\ub4e4\uc5b4\ub193\uc740 \ub0a1\uc740 \uc6b0\uc0c1\ub4e4\uc744 \ubd80\uc218\uace0 \ub9d0\ubfd0\uc778 \uac70\uc9d3 \uc2e0\ub4e4\uc744 \ubbf8\ub828 \uc5c6\uc774 \ub0b4\ub2e4 \ubc84\ub9b4 \ub54c, \ube44\ub85c\uc18c \ucc38\ub418\uc2e0 \ub300\ub839\uaed8\uc11c \ub2f9\uc2e0\uc758 \uc2ec\uc7a5\uc5d0 \ub728\uac70\uc6b4 \ubd88\uc744 \uc9c0\ud53c\uc2e4 \uac83\uc785\ub2c8\ub2e4. \uadf8\uac83\uc740 \uadf8\uc800 \uc2ec\uc7a5\uc774 \ub450 \ubc30 \ucee4\uc9c0\ub294 \uc218\uc900\uc744 \uae4c\ub9c8\ub4dd\ud788 \ub118\uc5b4\uc11c\uc11c, \ubb34\ud55c\ud788 \ubaa8\ub4e0 \ubc29\ud5a5\uc73c\ub85c \ub05d\uc5c6\uc774 \ud33d\ucc3d\ud558\ub294 \uc5b4\ub9c8\uc5b4\ub9c8\ud55c \uad8c\ub2a5\uc785\ub2c8\ub2e4. \ub300\ub839\uc740 \uc6b0\ub9ac \ub9c8\uc74c\uc5d0 \uadf8 \ubb34\uc5c7\uc5d0\ub3c4 \ud754\ub4e4\ub9ac\uc9c0 \uc54a\ub294 \uad73\uac74\ud55c \uc2e0\ub8b0\ub97c \ubfcc\ub9ac \uae4a\uac8c \uc2ec\uc5b4\uc90d\ub2c8\ub2e4. \uc774 \ub4e0\ub4e0\ud55c \uc2e0\ub8b0 \ub355\ubd84\uc5d0 \uc6b0\ub9ac\ub294 \uc790\uc798\ud55c \uac71\uc815\uacfc \ub450\ub824\uc6c0\uc744 \ud6cc\ud6cc \ud138\uc5b4\ubc84\ub9ac\uace0, \ub2f9\uc7a5 \ub2f5\uc774 \uc548 \ubcf4\uc774\ub294 \ub0b4 \uc778\uc0dd\uc758 \uce84\uce84\ud55c \uc218\uc218\uaed8\ub07c\ub3c4 \uc2dc\uac04\uc774 \ud750\ub974\uba74 \uc790\uc5f0\uc2a4\ub808 \ub2e4 \uc54c\uc544\uc11c \ud480\ub9ac\ub3c4\ub85d \uc5ec\uc720\ub86d\uac8c \uae30\ub2e4\ub9b4 \uc218 \uc788\uac8c \ub429\ub2c8\ub2e4. \uadf8\ub294 \uc774 \uac70\ub300\ud55c \uc6b0\uc8fc\uc758 \uc911\uc2ec\uc5d0\uc11c \uc138\uc0c1 \ubaa8\ub4e0 \uc77c\ub4e4\uc774 \uc9c0\uae08 \uc544\uc8fc \uc62c\ubc14\ub978 \ubc29\ud5a5\uc73c\ub85c \uc21c\ub9ac\ub300\ub85c \ud758\ub7ec\uac00\uace0 \uc788\uc74c\uc744 100% \ud655\uc2e0\ud569\ub2c8\ub2e4. \uc774 \ubcf4\ud3b8\uc801\uc774\uace0 \uac70\ub300\ud55c \uc2e0\ub8b0\ub77c\ub294 \uc5c4\uccad\ub09c \ud64d\uc218 \uc18d\uc5d0 \ud479 \ube60\uc9c0\uac8c \ub418\uba74, \uadf8\ub3d9\uc548 \uadf8\ud1a0\ub85d \uaf49 \uc950\uace0 \uc9d1\ucc29\ud588\ub358 \uc218\ub9ce\uc740 \uc138\uc18d\uc801\uc778 \ud76c\ub9dd\uc774\ub098 \uc584\ud30d\ud55c \uc778\uc0dd \uacc4\ud68d\ub4e4\uc740 \ud754\uc801\ub3c4 \uc5c6\uc774 \uc2dc\uc6d0\ud558\uac8c \ub5a0\ub0b4\ub824\uac00 \ubc84\ub9bd\ub2c8\ub2e4. \uadf8\ub294 \uc9c4\uc815\uc73c\ub85c \uc790\uae30 \uc790\uc2e0\uc744 \uc704\ud574 \uc900\ube44\ub41c \uac83\ub4e4\uc740 \ub9c8\uce58 \uc790\uc11d\uc758 \uc911\ub825\ucc98\ub7fc \uc5b8\uc820\uac00 \ubc18\ub4dc\uc2dc \uc790\uae30\uc5d0\uac8c \ucc30\uc2f9 \ub04c\ub824\uc624\uac8c \ub418\uc5b4 \uc788\ub2e4\ub294 \uc6b0\uc8fc\uc758 \ubc95\uce59\uc744 \uad73\uac8c \ubbff\uc2b5\ub2c8\ub2e4. \uc57d\uc18d\ud55c \uce5c\uad6c\ub97c \ub9cc\ub098\uae30 \uc704\ud574 \ud5d0\ub808\ubc8c\ub5a1 \ub2ec\ub824\uac00\uace0 \uc788\ub2e4\uba74, \ubc1c\uc740 \uc880 \uc11c\ub450\ub97c\uc9c0\uc5b8\uc815 \ub9c8\uc74c\ub9c8\uc800 \ucff5\ucf85\uac70\ub9ac\uba70 \ucd08\uc870\ud574\ud560 \ud544\uc694\ub294 \uc804\ud600 \uc5c6\uc2b5\ub2c8\ub2e4. \ub9cc\uc57d \uc228\ucc28\uac8c \ub2ec\ub824\uac14\ub294\ub370\ub3c4 \ub05d\ub0b4 \uadf8 \uce5c\uad6c\ub97c \ub9cc\ub098\uc9c0 \ubabb\ud588\ub2e4\uba74, \uadf8\uac83\uc774 \uacb0\uad6d \ub2f9\uc2e0\uc758 \uc778\uc0dd\uc5d0\uc11c '\ucd5c\uace0\ub85c \uc88b\uc740 \uacb0\uacfc'\uc600\uc74c\uc744 \uae30\uaebc\uc774 \ubc1b\uc544\ub4e4\uc774\ub294 \uba4b\uc9c4 \ud0dc\ub3c4\ub97c \uac00\uc838\ubcf4\ub294 \uac74 \uc5b4\ub5a8\uae4c\uc694? \uc65c\ub0d0\ud558\uba74 \ub2f9\uc2e0\uc758 \ub9c8\uc74c\uc18d\uc5d0 \uc0b4\uc544 \uc788\ub294 \uadf8 \uac70\ub300\ud55c \uad8c\ub2a5\uc774 \uadf8 \uce5c\uad6c\uc758 \ub9c8\uc74c\uc18d\uc5d0\ub3c4 \ub611\uac19\uc774 \uc0b4\uc544 \uc228 \uc26c\uace0 \uc788\uc73c\ub2c8, \ub9cc\uc57d \ub450 \uc0ac\ub78c\uc774 \ub9cc\ub098\ub294 \uac8c \uc815\ub9d0\ub85c \uc6b0\uc8fc\uc801 \uad00\uc810\uc5d0\uc11c \ucd5c\uc120\uc774\uc5c8\ub2e4\uba74 \ub300\ub839\uaed8\uc11c \ubc18\ub4dc\uc2dc, \uae30\ud544\ucf54 \ub450 \uc0ac\ub78c\uc744 \ub9c8\uc8fc\uce58\uac8c \ud574\uc8fc\uc168\uc744 \uac83\uc774\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \ud639\uc2dc \ub2f9\uc2e0\uc774 \ub204\uad70\uac00\uc5d0\uac8c \uc120\uc758\ub97c \ubca0\ud480\uace0 \ubd09\uc0ac\ud558\uae30 \uc704\ud574 \ub9c8\uc74c\uc744 \uba39\uace0 \uc5f4\uc815\uc801\uc73c\ub85c \uc900\ube44\ud588\ub294\ub370, \uc6ec\uc77c\uc778\uc9c0 \ubb34\uc5b8\uac00 \uc790\uafb8 \uadf8 \uae38\uc744 \uac00\ub85c\ub9c9\ub294\ub2e4\uba74 \uae30\uaebc\uc774 \uadf8 '\uac00\ub85c\ub9c9\ud798'\uc870\ucc28\ub3c4 \ucfe8\ud558\uac8c \ubc1b\uc544\uc77c \uc900\ube44\uac00 \ub418\uc5b4 \uc788\uc2b5\ub2c8\uae4c? \ub9cc\uc57d \"\uc5ec\uae30\uc11c \uba48\ucdb0!\"\ub77c\ub294 \uc2e0\ud638 \uc55e\uc5d0\uc11c \uba48\ucdb0 \uc124 \uc900\ube44\uc870\ucc28 \ub418\uc5b4 \uc788\uc9c0 \uc54a\ub2e4\uba74, \uc560\ucd08\uc5d0 \uadf8\ub7f0 \uac70\ucc3d\ud55c \ubd09\uc0ac\uc758 \uae38\ub85c \ub098\uc544\uac08 \uc790\uaca9\uc870\ucc28 \uc5c6\ub2e4\ub294 \uc0ac\uc2e4\uc744 \uba85\uc2ec\ud558\uc2ed\uc2dc\uc624.\n\n\uc624, \ub2f9\uc2e0\uc774 \uc0b4\uc544 \uc228 \uc26c\ub294 \ud55c \uad73\uac8c, \uc544\uc8fc \uad73\uac8c \ubbff\uc73c\uc138\uc694! \uc774 \ub465\uadfc \uc9c0\uad6c\uc0c1\uc5d0\uc11c \uc6b8\ub824 \ud37c\uc9c0\ub294 \uc218\uc5b5 \uac1c\uc758 \uc18c\ub9ac \uc911\uc5d0\uc11c \ub2f9\uc2e0\uc774 \uaf2d \ub4e4\uc5b4\uc57c\ub9cc \ud558\ub294 \uc9c4\uc9dc \uc18c\ub9ac\ub294 \uae30\ud544\ucf54 \ub2f9\uc2e0\uc758 \uadd3\uac00\uc5d0 \uc640\uc11c \uc601\ub871\ud558\uac8c \uc6b8\ub9b4 \uac83\uc785\ub2c8\ub2e4! \ub2f9\uc2e0\uc5d0\uac8c \ub3c4\uc6c0\uacfc \ub530\ub73b\ud55c \uc704\uc548\uc744 \uc8fc\uae30\ub85c \uc608\uc815\ub41c \ubaa8\ub4e0 \uae00, \ubaa8\ub4e0 \ucc45, \ubaa8\ub4e0 \uc18c\uc911\ud55c \uc778\uc5f0\uc740 \uc544\ubb34\ub9ac \uad6c\ubd88\uad6c\ubd88\ud55c \ud5d8\ub09c\ud55c \uae38\uc744 \ube91\ube91 \ub3cc\uc544\uc11c\ub77c\ub3c4 \uae30\uc5b4\uc774 \ub2f9\uc2e0\uc758 \uc601\ud63c\uc744 \uc815\ud655\ud788 \ucc3e\uc544\uc62c \uac83\uc785\ub2c8\ub2e4. \ub2f9\uc2e0\uc758 \uc774\uae30\uc801\uc774\uace0 \ubcc0\ub355\uc2a4\ub7ec\uc6b4 \uc595\uc740 \ub9c8\uc74c\uc774 \uc544\ub2c8\ub77c, \ub2f9\uc2e0 \ub0b4\uba74\uc758 \uc704\ub300\ud558\uace0 \ubd80\ub4dc\ub7ec\uc6b4 \uc9c4\uc9dc \ud558\ud2b8\uac00 \uac04\uc808\ud788 \uac08\ub9dd\ud558\ub294 \ucc38\ub41c \uce5c\uad6c\ub294 \uc5b4\uae40\uc5c6\uc774 \ub2f9\uc2e0\uc744 \ucc3e\uc544\uc640 \uad73\uac8c \uc548\uc544\uc904 \uac83\uc785\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \ub2f9\uc2e0 \ub0b4\uba74\uc5d0 \uc788\ub294 \uadf8 \ud558\ud2b8\uac00 \uace7 \ub9cc\ubb3c\uc758 \ud558\ud2b8\uc774\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \ub300\uc790\uc5f0 \uadf8 \uc5b4\ub514\ub97c \ub458\ub7ec\ubd10\ub3c4 \uc11c\ub85c\ub97c \uaf49 \ub9c9\uace0 \uc788\ub294 \uc228 \ub9c9\ud788\ub294 \ucca0\ubcbd\uc774\ub098 \ucc28\ub2e8\ub9c9 \uac19\uc740 \uac83\uc740 \uc874\uc7ac\ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc628 \uc9c0\uad6c\uc758 \ubc14\ub2f7\ubb3c\uc774 \uacb0\uad6d \ucc30\ub791\uac70\ub9ac\uba70 \ud558\ub098\uc758 \uac70\ub300\ud55c \ubc14\ub2e4\ub85c \uc774\uc5b4\uc838 \uc788\ub4ef\uc774, \uc624\uc9c1 \ub2e8 \ud558\ub098\uc758 \uc2e0\uc131\ud55c \ud54f\uc904\uc774 \uadf8 \uc5b4\ub5a4 \ub2e8\uc808\ub3c4 \uc5c6\uc774 \uc774 \uc138\uc0c1 \ubaa8\ub4e0 \uc0ac\ub78c\uc758 \ub9c8\uc74c\uc744 \uad00\ud1b5\ud558\uba70 \ub3c4\ub3c4\ud558\uac8c \ud750\ub974\uace0 \uc788\uc744 \ubfd0\uc785\ub2c8\ub2e4. \uadf8\ub7ec\ubbc0\ub85c \uc6b0\ub9ac\ub294 \ub300\uc790\uc5f0\uc758 \ud48d\uacbd\uacfc \uc138\uc0c1\uc758 \ubaa8\ub4e0 \uc0dd\uac01\ub4e4\uc774 \ub0b4 \uac00\uc2b4 \ud55c\uac00\uc6b4\ub370\ub97c \ud5a5\ud574 \ub358\uc838\uc8fc\ub294 \uc774 \uc704\ub300\ud55c \uc9c4\ub9ac\ub97c \uc81c\ub300\ub85c \ubc30\uc6cc\uc57c\ub9cc \ud569\ub2c8\ub2e4. \uc989, \uc9c0\uadf9\ud788 \ub192\uc73c\uc2e0 \ub300\ub839\uaed8\uc11c \uc5b8\uc81c\ub098 \ub298 \ub098\uc640 \ud568\uaed8 \uacc4\uc2dc\uba70, \uc800 \ubc16\uc758 \ub300\uc790\uc5f0\uc744 \ub9cc\ub4e4\uc5b4\ub0b8 \ubaa8\ub4e0 \ud798\uc758 \uadfc\uc6d0\uc774 \ub2e4\ub984 \uc544\ub2cc \ub0b4 \ub9c8\uc74c\uc18d\uc5d0 \ub611\uac19\uc774 \uc0b4\uc544 \uc228 \uc26c\uace0 \uc788\ub2e4\ub294 \uadf8 \uc5c4\uc5f0\ud558\uace0\ub3c4 \uc6c5\uc7a5\ud55c \uc9c4\ub9ac\ub97c \ub9d0\uc785\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \ub9cc\uc57d \uc6b0\ub9ac\uac00 \ub300\ub839\uaed8\uc11c \ub3c4\ub300\uccb4 \ub098\uc5d0\uac8c \ubb34\uc2a8 \ub9d0\uc500\uc744 \ud558\uace0 \uc2f6\uc73c\uc2e0 \uac74\uc9c0 \uc9c4\uc9c0\ud558\uac8c \uc54c\uace0 \uc2f6\ub2e4\uba74, \uc608\uc218\ub2d8\uc774 \uac00\ub974\uccd0\uc8fc\uc168\ub358 \uac83\ucc98\ub7fc \ub9c8\ub545\ud788 \"\uc790\uae30\ub9cc\uc758 \uc740\ubc00\ud55c \ubc29\uc73c\ub85c \uc3d9 \ub4e4\uc5b4\uac00 \uc138\uc0c1\uc758 \ubb38\uc744 \uad73\uac8c \ub2eb\uc544\uac78\uc5b4\uc57c\ub9cc\" \ud569\ub2c8\ub2e4. \ub300\ub839\uc740 \uc6a9\uae30 \uc5c6\ub294 \uac81\uc7c1\uc774 \uc55e\uc5d0\ub294 \uc808\ub300\ub85c \uc790\uc2e0\uc758 \uc9c4\uc9dc \ubaa8\uc2b5\uc744 \ub4dc\ub7ec\ub0b4\uc9c0 \uc54a\uc73c\uc2ed\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \ub2e4\ub978 \uc218\ub9ce\uc740 \uc0ac\ub78c\ub4e4\uc774 \ubaa8\uc5ec\uc11c \uc6c5\uc131\uac70\ub9ac\uba70 \ubc14\uce58\ub294 \uc2dc\ub044\ub7ec\uc6b4 \uae30\ub3c4 \uc18c\ub9ac\uc5d0\uc11c \ud6cc\uca4d \ubb3c\ub7ec\ub098, \uc624\uc9c1 \ub0b4 \ub9c8\uc74c\uc18d \uae4a\uc740 \uacf3\uc5d0\uc11c \ub4e4\ub824\uc624\ub294 \uc544\uc8fc \uace0\uc694\ud55c \ubaa9\uc18c\ub9ac\uc5d0\ub9cc \uc5c4\uc219\ud558\uac8c \uadc0\ub97c \uae30\uc6b8\uc5ec\uc57c \ud569\ub2c8\ub2e4. \uc138\uc0c1\uc758 \ud3c9\ubc94\ud55c \uc885\uad50\ub4e4\uc740 \uc5b8\uc81c\ub098 \ucc9c\ubc15\ud558\uac8c\ub3c4 \uc2e0\uc790\uac00 \uba87 \uba85\uc774\ub098 \ub418\ub294\uc9c0 \uc22b\uc790\ub97c \uc138\ub294 \uac83\uc744 \uac00\uc7a5 \uc911\uc694\ud558\uac8c \uc0dd\uac01\ud569\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc0ac\ub78c\ub4e4\uc774 \uc6b0\ub974\ub974 \ubaa8\uc778 \ub2e4\uc218\ub97c \ud5a5\ud574 \ud638\uc18c\ud558\uace0 \uba38\ub9bf\uc218\ub97c \uc138\uae30 \uc2dc\uc791\ud558\ub294 \ubc14\ub85c \uadf8 \uc21c\uac04, \uadf8\uacf3\uc5d0\ub294 \ucc38\ub41c \uc885\uad50\uac00 \uc8fd\uc5b4 \uc5c6\uc5b4\uc84c\ub2e4\ub294 \uc501\uc4f8\ud55c \uc120\uace0\uac00 \ud0d5\ud0d5\ud0d5 \ub0b4\ub824\uc9d1\ub2c8\ub2e4. \ub300\ub839\uc774 \uc8fc\uc2dc\ub294 \ub2ec\ucf64\ud558\uace0 \ud3ec\uadfc\ud55c \uae68\ub2ec\uc74c\uc744 \uac00\uc2b4\uc5d0 \uc628\uc804\ud788 \ud488\uc740 \uc0ac\ub78c\uc740, \uc790\uae30\uac00 \ub2e4\ub2c8\ub294 \uc885\uad50 \ubaa8\uc784\uc5d0 \uc2e0\uc790\uac00 \uba87 \uba85\uc774\ub098 \ubaa8\uc5ec \uc549\uc544 \uc788\ub294\uc9c0 \uc138\ub294 \uc9d3 \ub530\uc704\ub294 \uacb0\ucf54 \ud558\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \ub0b4\uac00 \uac00\uc7a5 \uac70\ub8e9\ud55c \uc2e0\uc758 \ud488 \uc548\uc5d0 \uace0\uc694\ud788 \uc548\uaca8 \uc788\ub294\ub370, \uac10\ud788 \uc138\uc0c1 \uadf8 \ub204\uac00 \ud568\ubd80\ub85c \ub0b4 \uac70\ub8e9\ud55c \ubc29 \ubb38\uc744 \ucf85\ucf85 \ub450\ub4dc\ub9ac\uba70 \ub4e4\uc5b4\uc62c \uc218 \uc788\uaca0\uc2b5\ub2c8\uae4c? \ub0b4\uac00 \uac00\uc7a5 \ubc14\ub2e5\uc73c\ub85c \uc5ce\ub4dc\ub9b0 \uc644\uc804\ud55c \uacb8\uc190 \uc18d\uc5d0\uc11c \uc21c\uc218\ud55c \uc0ac\ub791\uc758 \ubd88\uaf43\uc73c\ub85c \ud65c\ud65c \ud0c0\uc624\ub974\uace0 \uc788\uc744 \ub54c, \uc138\uc0c1\uc5d0 \uc774\ub984\uc744 \ub5a8\uce5c \uadf8 \uc5b4\ub5a4 \uc704\ub300\ud55c \ucca0\ud559\uc790\uac00 \uac10\ud788 \ub0b4\uac8c \ud55c\ub9c8\ub514\ub77c\ub3c4 \ubcf4\ud0dc\ub824 \ub4e4 \uc218 \uc788\uaca0\uc2b5\ub2c8\uae4c? \uc218\ub9cc \uba85\uc758 \uc6c5\uc131\uac70\ub9ac\ub294 \ub300\uc911\uc5d0\uac8c \uc124\ua
