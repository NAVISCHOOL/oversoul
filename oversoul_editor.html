d50\ud558\ub4e0 \ub2e8 \ud55c \uc0ac\ub78c\uc5d0\uac8c \uc18d\uc0ad\uc774\ub4e0 \uac04\uc5d0, \uc704\ub300\ud55c \uc601\ud63c \uc55e\uc5d0\uc11c\ub294 \uc544\ubb34\ub7f0 \ucc28\uc774\ub3c4 \ub098\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4. \uc624\uc9c1 \ubc16\uc5d0\uc11c \ub204\uad70\uac00\uac00 \uc815\ud574\ub193\uc740 \uad8c\uc704\ub098 \ucc45\uc5d0\ub9cc \uc758\uc874\ud558\ub294 \ubbff\uc74c\uc740 \uacb0\ucf54 \uc0b4\uc544\uc788\ub294 \uc9c4\uc9dc \ubbff\uc74c\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uc774\ub807\uac8c \uc678\ubd80\uc758 \uad8c\uc704\uc5d0\ub9cc \ub9e4\ub2ec\ub9ac\ub294 \ud604\uc0c1\uc774\uc57c\ub9d0\ub85c, \uc0ac\uc2e4 \ub0b4\uba74\uc758 \uc601\ud63c\uc774 \uc644\uc804\ud788 \ubc14\uc2f9 \uba54\ub9d0\ub77c\ubc84\ub838\ub2e4\ub294 \uac83\uc744 \uc544\uc8fc \uc11c\uae00\ud504\uac8c \uc99d\uba85\ud574 \uc8fc\ub294 \ucc99\ub3c4\uc77c \ubfd0\uc785\ub2c8\ub2e4. \uc0ac\ub78c\ub4e4\uc774 \uc9c0\ub09c \uc218\ucc9c \ub144\uc758 \uc5ed\uc0ac \ub3d9\uc548 \uc608\uc218\ub2d8\uc5d0\uac8c \ubd80\uc5ec\ud574 \uc628 \uc9c0\uc704\ub294 \ub2e4\ub984 \uc544\ub2cc '\uad8c\uc704'\uc758 \uc9c0\uc704\uc785\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uadf8\uac83\uc740 \uc608\uc218\ub2d8\uc774 \uc544\ub2c8\ub77c \uadf8 \uc9c0\uc704\ub97c \ubd80\uc5ec\ud55c \uc0ac\ub78c\ub4e4 \uc790\uc2e0\uc758 \uc601\uc801 \uc0c1\ud0dc\ub97c \ubcf4\uc5ec\uc904 \ubfd0\uc774\uba70, \uc601\uc6d0\ud55c \uc9c4\ub9ac \uc790\uccb4\ub97c \ub2e8 1\ub3c4 \ubc14\uafc0 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. \uc601\ud63c\uc740 \uc628 \uc6b0\uc8fc\ub97c \ub36e\uc744 \ub9cc\ud07c \uc9c0\uadf9\ud788 \uac70\ub300\ud558\uc9c0\ub9cc \ubc18\ub300\ub85c \uc5b4\ub9b0\uc544\uc774\ucc98\ub7fc \ud55c\uc5c6\uc774 \uc18c\ubc15\ud569\ub2c8\ub2e4. \uc601\ud63c\uc740 \uacb0\ucf54 \uac15\uc790\uc5d0\uac8c \uc544\ucca8\ud558\uc9c0 \uc54a\uace0 \ubc16\uc5d0\uc11c \uac00\uc9dc \uad8c\uc704\ub97c \ucc3e\uc544 \ud5e4\ub9e4\uc9c0\ub3c4 \uc54a\uc73c\uba70, \uc624\uc9c1 \uc790\uae30 \uc790\uc2e0\ub9cc\uc744 100% \uc644\ubcbd\ud558\uac8c \uc2e0\ub8b0\ud569\ub2c8\ub2e4.\n\n\uc778\uac04\uc774\ub77c\ub294 \uc874\uc7ac\uac00 \ud488\uace0 \uc788\ub294 \ubb34\ud55c\ud55c \uc6b0\uc8fc\uc758 \uac00\ub2a5\uc131 \uc55e\uc5d0\uc11c\ub294, \uc9c0\uc0c1\uc5d0\uc11c \uc774\ub984\uc744 \ub0a0\ub838\ub358 \uc5b4\ub5a4 \uc804\uc124\uc801\uc778 \uc601\uc6c5\uc758 \uc0b6\uc774\ub098 \uc704\ub300\ud55c \uc131\uc778\uc758 \ubc18\uc9dd\uc774\ub294 \uc704\uc778\uc804\uc870\ucc28\ub3c4 \ucf69\uc54c\ub9cc \ud558\uac8c \uc544\uc8fc \uc791\uac8c \ucd95\uc18c\ub418\uc5b4 \ubc84\ub9bd\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc6b0\ub9ac\ub294 \uc5ed\uc0ac\ucc45\uc5d0 \uc9c4\uc815\uc73c\ub85c \uc704\ub300\ud588\ub358 \uc0ac\ub78c\uc774 \uac70\uc758 \uc5c6\ub2e4\uace0 \ub9d0\ud558\ub294 \uac83\uc744 \ub118\uc5b4\uc11c\uc11c, \uc808\ub300\uc801\uc774\uace0 \uc644\ubcbd\ud55c \uc758\ubbf8\uc5d0\uc11c\ub294 \ub2e8 \ud55c \uba85\ub3c4 \uc874\uc7ac\ud558\uc9c0 \uc54a\ub294\ub2e4\uace0 \uc544\uc8fc \ub2e8\ud638\ud558\uac8c \uc120\uc744 \uae0b\uc2b5\ub2c8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uae4c\ub2e4\ub86d\uace0 \uac70\ub300\ud55c \uc6b0\ub9ac\uc758 \ub9c8\uc74c\uc744 100% \uc644\ubcbd\ud558\uac8c \uaf49 \ucc44\uc6cc \ub9cc\uc871\uc2dc\ucf1c \uc8fc\ub294 \uadf8\ub7f0 \uc288\ud37c\ud788\uc5b4\ub85c\ub294 \uc138\uc0c1 \uadf8 \uc5b4\ub514\uc5d0\ub3c4 \uc874\uc7ac\ud55c \uc801\uc774 \uc5c6\uae30 \ub54c\ubb38\uc785\ub2c8\ub2e4. \uc601\ud63c\uc740 \ucca0\uc800\ud558\uac8c \ud63c\uc790 \uc788\ub294 \uc9d9\uc740 \uace0\ub3c5 \uc18d\uc5d0\uc11c \uac00\uc7a5 \ub3c5\ucc3d\uc801\uc774\uace0 \uc21c\uc218\ud55c \uc0c1\ud0dc\ub85c \uc874\uc7ac\ud569\ub2c8\ub2e4. \uc624\uc9c1 \uc774 '\uace0\ub3c5\ud558\uace0 \ub3c5\ucc3d\uc801\uc774\uba70 \uac00\uc7a5 \uc21c\uc218\ud558\uc2e0 \ubd84'\uc5d0\uac8c \ub0b4 \ubaa8\ub4e0 \uac83\uc744 \ud1b5\uc9f8\ub85c \ub0b4\uc5b4\uc904 \ub54c, \uc704\ub300\ud55c \ub300\ub839\uc740 \uae30\uaebc\uc774 \uc6b0\ub9ac \uc601\ud63c \uc548\uc73c\ub85c \ub69c\ubc85\ub69c\ubc85 \uac78\uc5b4 \ub4e4\uc5b4\uc640 \uc6b0\ub9ac\ub97c \uc774\ub044\uc2dc\uace0 \uc6b0\ub9ac\uc758 \uc785\uc220\uc744 \ud1b5\ud574 \ub9d0\uc500\ud558\uc2ed\ub2c8\ub2e4. \ubc14\ub85c \uadf8 \uc21c\uac04 \ube44\ub85c\uc18c \uc6b0\ub9ac \uc601\ud63c\uc740 \ubb35\uc740 \ub54c\ub97c \ubc97\uace0 \uc628\uc804\ud788 \uae30\ubed0\ud558\uba70, \ud48b\ud48b\ud558\uac8c \uc80a\uc5b4\uc9c0\uace0, \uc0c8\ucc98\ub7fc \ub0a0\uc544\uac08 \ub4ef \ubbfc\ucca9\ud574\uc9d1\ub2c8\ub2e4. \ube44\ub85d \uc601\ud63c\uc774 \uac89\uc73c\ub85c \ub4dc\ub7ec\ub098\ub294 \uc138\uc0c1 \uc0ac\ub78c\ub4e4\uc758 \ub208\uc73c\ub85c \ubcfc \ub54c\ub294 \uadf8\ub9ac \ub611\ub611\ud574 \ubcf4\uc774\uac70\ub098 \uc138\ub828\ub418\uc5b4 \ubcf4\uc774\uc9c0 \uc54a\uc744\uc9c0\ub77c\ub3c4, \uc601\ud63c\uc740 \uc774\ubbf8 \ubaa8\ub4e0 \uc0ac\ubb3c\uc758 \uae4a\uc740 \ubcf8\uc9c8\uc744 \ud22c\uba85\ud55c \uc720\ub9ac\uc54c\ucc98\ub7fc \uaff0\ub6ab\uc5b4 \ubcf4\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc601\ud63c\uc740 \uad73\uc774 \uc0ac\ub78c\ub4e4\uc5d0\uac8c '\ub098\ub294 \uc885\uad50\uc801\uc774\ub2e4'\ub77c\uace0 \ub5a0\ub4e4\uba70 \ubd88\ub9b4 \ud544\uc694\ub3c4 \uc5c6\uc774, \uadf8 \uc874\uc7ac \uc790\uccb4\ub9cc\uc73c\ub85c \uc644\ubcbd\ud558\uac8c \ub9d1\uace0 \ud2f0 \uc5c6\uc774 \uc21c\uc218\ud569\ub2c8\ub2e4. \uc794\uc794\ud558\uac8c \ud480\uc774 \uc465\uc465 \uc790\ub77c\ub098\uace0 \ub3cc\uba69\uc774\uac00 \ub545\uc73c\ub85c \ud22d \ub5a8\uc5b4\uc9c0\ub294 \uc2e0\uae30\ud55c \ub300\uc790\uc5f0\uc758 \ud604\uc0c1\uc870\ucc28\ub3c4, \uc790\uae30 \ub0b4\uba74\uc5d0 \ud750\ub974\ub294 \uc800 \uac70\ub300\ud55c \uc6b0\uc8fc\uc758 \ubc95\uce59\uc5d0 \ube44\ud558\uba74 \uc544\uc8fc \uc791\uace0 \ud558\ucc2e\uc740 \uc794\uac00\uc9c0 \uac19\uc740 \ubc95\uce59\uc5d0 \ubd88\uacfc\ud558\ub2e4\ub294 \uac83\uc744 \uc601\ud63c\uc740 \ubf1b\uc18d \uae4a\uc774 \ub290\ub08d\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc601\ud63c\uc740 \ub9c8\uce68\ub0b4 \ub450 \ud314\uc744 \ubc8c\ub824 \uc774\ub807\uac8c \uc6c5\uc7a5\ud558\uac8c \uc678\uce69\ub2c8\ub2e4. \"\uc624 \ubcf4\ub77c, \ub098\ub294 \uc704\ub300\ud558\uace0 \ubcf4\ud3b8\uc801\uc778 \uc6b0\uc8fc\uc758 \ub9c8\uc74c \uc548\uc5d0\uc11c \uc644\uc804\ud788 \uc0c8\ub85c\uc6b4 \uc874\uc7ac\ub85c \ud0dc\uc5b4\ub0ac\ub178\ub77c! \uc544\uc9c1 \ud55c\uc5c6\uc774 \ubd88\uc644\uc804\ud55c \ub0b4\uac00, \ub0b4 \uc548\uc5d0 \uc0b4\uc544\uacc4\uc2e0 \uc644\ubcbd\ud55c \ub300\ub839\uc5d0\uac8c \uc628\uc804\ud788 \ub098\ub97c \ubc14\uce58\uba70 \uacbd\ubc30\ud558\ub178\ub77c. \ub098\ub294 \uc138\uc0c1\uc5d0\uc11c \uac00\uc7a5 \uc704\ub300\ud55c \uc601\ud63c\uc744 \ub0b4 \uac00\uc2b4\uc5d0 \uc218\uc6a9\ud568\uc73c\ub85c\uc368 \uc800 \ub192\uace0 \ucc2c\ub780\ud55c \ud0dc\uc591\uacfc \uc218\ub9ce\uc740 \ubcc4\ub4e4\uc870\ucc28 \uc624\ud788\ub824 \uc800 \uc704\uc5d0\uc11c \ud3b8\uc548\ud788 \ub0b4\ub824\ub2e4\ubcf8\ub2e4. \uc65c\ub0d0\ud558\uba74 \uc800 \ubc18\uc9dd\uc774\ub294 \ubcc4\uc870\ucc28\ub3c4 \uc5b8\uc820\uac00\ub294 \ubcc0\ud558\uace0 \uc2dc\ub4e4\uc5b4\uc11c \uc9c0\ub098\uac00 \ubc84\ub9b4 \uc544\uc8fc \uc544\ub984\ub2e4\uc6b4 \uc6b0\uc5f0\uc5d0 \ubd88\uacfc\ud558\ub2e4\ub294 \uac83\uc744, \ub098\ub294 \uc9c0\uae08 \uba85\ud655\ud788 \ub290\ub07c\uace0 \uc788\uae30 \ub54c\ubb38\uc774\ub2e4!\"\n\n\uc601\uc6d0\ud788 \uba48\ucd94\uc9c0 \uc54a\ub294 \ub300\uc790\uc5f0\uc758 \uac70\ub300\ud55c \ud30c\ub3c4\uac00 \ub0b4 \uc548\uc73c\ub85c \ub354\uc6b1\ub354 \uc138\ucc28\uac8c \ubc00\ub824\ub4e4\uc5b4 \uc62c\uc218\ub85d, \ub098\ub294 \ubaa8\ub4e0 \uc2dc\uc120\uacfc \ud589\ub3d9 \uc18d\uc5d0\uc11c \uc778\ub958 \uc804\uccb4\ub97c \ub0b4 \ud488\uc5d0 \ub530\ub73b\ud558\uac8c \uaef4\uc548\ub294 \uac70\ub300\ud55c \uc874\uc7ac\ub85c \ubcc0\ud574\uac11\ub2c8\ub2e4. \uc774\ub9ac\ud558\uc5ec \ub098\ub294 \uacb0\ucf54 \ub299\uac70\ub098 \uc8fd\uc9c0 \uc54a\ub294 \uc601\uc6d0\ud55c \uc5d0\ub108\uc9c0\uc640 \ud558\ub098\uac00 \ub418\uc5b4 \ubd88\uba78\uc758 \uc0dd\uac01 \uc18d\uc5d0\uc11c \uc601\uc6d0\ud788 \uc0b4\uc544\uac00\uac8c \ub418\ub294 \uac83\uc785\ub2c8\ub2e4. \uc774\ucc98\ub7fc \uc601\ud63c\uc744 \uc5ce\ub4dc\ub824 \uc804\uc801\uc73c\ub85c \uacbd\uc678\ud558\uace0 \uadf8 \uc601\ud63c\uc758 \uc544\ub984\ub2e4\uc6c0\uc774 \uc2e4\ub85c \ubb34\ud55c\ud558\ub2e4\ub294 \ub180\ub77c\uc6b4 \uc0ac\uc2e4\uc744 \uc0b6 \uc18d\uc5d0\uc11c \ubf1b\uc18d \uae4a\uc774 \ubc30\uc6b8 \ub54c, \uc6b0\ub9ac\ub294 \ube44\ub85c\uc18c \uc774 \uc138\uc0c1 \uc790\uccb4\uac00, \uc544\ub2c8 \uc6b0\ub9ac\uac00 \uc228 \uc26c\ub294 \ud558\ub8e8\ud558\ub8e8\uac00 \uc601\ud63c\uc774 \ub9e4\uc77c\ub9e4\uc77c \ube5a\uc5b4\ub0b4\ub294 \ub04a\uc784\uc5c6\ub294 '\uae30\uc801'\uc774\ub77c\ub294 \uac83\uc744 \ub2e8\ubc15\uc5d0 \uae68\ub2eb\uac8c \ub429\ub2c8\ub2e4. \uadf8\ub798\uc11c \uc6b0\ub9ac\ub294 \ub354 \uc774\uc0c1 \ub208\uc55e\uc5d0\uc11c \ubc8c\uc5b4\uc9c0\ub294 \uc584\ud30d\ud55c \ub9c8\uc220\uc1fc\ub098 \uc0ac\uc18c\ud55c \uc6b0\uc5f0\uc758 \uc77c\uce58 \ub530\uc704\uc5d0 \uc785\uc744 \ub5a1 \ubc8c\ub9ac\uba70 \ub180\ub77c\uc9c0 \uc54a\uac8c \ub429\ub2c8\ub2e4. \uadf8\ub294 \uc774 \uc138\uc0c1\uc758 \uc5ed\uc0ac\uc5d0 \ud558\ucc2e\uace0 \ubc84\ub824\uc9c8 \ub9cc\ud55c \uc2dc\uac04\uc740 \ub2e8 1\ucd08\ub3c4 \uc5c6\uc73c\uba70, \uc6b0\ub9ac\uac00 \ub208\uc744 \ub728\uace0 \ub9de\uc774\ud558\ub294 \ubaa8\ub4e0 \ud558\ub8e8\ud558\ub8e8\uac00 \uc804\uc801\uc73c\ub85c \uac70\ub8e9\ud558\ub2e4\ub294 \uac83\uc744 \uac00\uc2b4\uc73c\ub85c \ubc85\ucc28\uac8c \uae68\ub2eb\uc2b5\ub2c8\ub2e4. \uc5c4\uccad\ub098\uac8c \uac70\ub300\ud55c \ubb34\ud55c\ud55c \uc6b0\uc8fc\uac00, \uc0ac\uc2e4 \uc800 \ubc14\ub2f7\uac00\uc758 \uc791\uc740 \ubaa8\ub798\uc54c \ud558\ub098 \uc18d\uc5d0, \uadf8\ub9ac\uace0 \ub2e8 1\ucd08\ub77c\ub294 \ub208 \uae5c\uc9dd\ud560 \ucc30\ub098 \uc18d\uc5d0 \uc628\uc804\ud788 \ub2e4 \ub2f4\uaca8 \uc788\ub2e4\ub294 \uac83\uc744 \uc544\uc8fc \uba85\ud655\ud558\uac8c \ubc30\uc6c1\ub2c8\ub2e4. \uadf8\ub798\uc11c \uadf8\ub294 \ub354 \uc774\uc0c1 \ub0a1\uc740 \ub204\ub354\uae30 \uc870\uac01\ub4e4\uc744 \uae30\uc6cc\uc11c \ub9cc\ub4e0 \uc637\ucc98\ub7fc \uc774\ub9ac\uc800\ub9ac \ud30c\ud3b8\ud654\ub418\uace0 \ucc22\uaca8\uc9c4 \ucd08\ub77c\ud55c \uc0b6\uc744 \uc0b4\uc9c0 \uc54a\uc744 \uac83\uc785\ub2c8\ub2e4. \uadf8 \ub300\uc2e0, \ubaa8\ub4e0 \uac83\uc774 \ud558\ub098\ub85c \uc5f0\uacb0\ub41c \uc644\ubcbd\ud55c \ud1b5\uc77c\uc131 \uc18d\uc5d0\uc11c \uc628 \uc6b0\uc8fc\ub97c \uc790\uae30 \ud488\uc5d0 \uaf49 \uaef4\uc548\uc740 \ucc44 \uac00\uc7a5 \uc704\uc5c4 \uc788\uace0 \ub2f9\ub2f9\ud558\uac8c \uc0b4\uc544\uac08 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub294 \uc790\uae30 \uc0b6 \uc18d\uc5d0 \ub355\uc9c0\ub355\uc9c0 \ubd99\uc5b4 \uc788\ub358 \ube44\ucc9c\ud558\uace0 \uacbd\ubc15\ud55c \ubaa8\ub4e0 \uc138\uc18d\uc801\uc778 \uac83\ub4e4\uc744 \ubbf8\ub828 \uc5c6\uc774 \uae68\ub057\uc774 \uadf8\ub9cc\ub458 \uac83\uc785\ub2c8\ub2e4. \uc790\uc2e0\uc774 \ud654\ub824\ud55c \uad81\uc804\uc5d0 \uc788\ub4e0 \ub0c4\uc0c8\ub098\ub294 \ub9c8\uad6c\uac04\uc5d0 \uc788\ub4e0, \ub2e4\ub978 \uc0ac\ub78c\uc5d0\uac8c \ubca0\ud480 \uc218 \uc788\ub294 \uc120\uc758\uac00 \uc544\ubb34\ub9ac \uc791\uace0 \ubbf8\ubbf8\ud558\ub4e0 \uac04\uc5d0 \ub9e4 \uc21c\uac04 \uc804\uc801\uc73c\ub85c \ub9cc\uc871\ud558\uba70 \uc9c4\uc2ec\uc73c\ub85c \uae30\ubed0\ud558\uac8c \ub420 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub294 \ud558\ub098\ub2d8\uc774 \uc5b8\uc81c\ub098 \uc790\uc2e0\uacfc \ub4e0\ub4e0\ud558\uac8c \ud568\uaed8\ud558\uc2e0\ub2e4\ub294 \ud655\uace0\ud55c \uc2e0\ub8b0\ub97c \uac00\uc2b4\uc5d0 \ud488\uace0, \ub2e4\uac00\uc62c \ub0b4\uc77c\uc758 \uc5b4\ub5a4 \ud3ed\ud48d\uc6b0\ub3c4 \ud3b8\uc548\ud558\uace0 \ub2f4\ub300\ud558\uac8c \ub9c8\uc8fc\ud560 \uac83\uc785\ub2c8\ub2e4. \uadf8\ub9ac\ud558\uc5ec \uc774\ubbf8 \uc790\uae30 \uac00\uc2b4 \uac00\uc7a5 \uae4a\uc740 \ubc14\ub2e5\uc5d0 \uc628\uc804\ud55c \ubbf8\ub798 \uc804\uccb4\ub97c \ub530\ub73b\ud558\uac8c \ud488\uc5b4 \uc548\uc740 \ucc44, \uc138\uc0c1\uc758 \uc5b4\ub5a4 \ube44\ubc14\ub78c\uc5d0\ub3c4 \ud754\ub4e4\ub9ac\uc9c0 \uc54a\ub294 \uace0\uc694\ud55c \ud3c9\uc815 \uc18d\uc5d0\uc11c \uac00\uc7a5 \ub2ec\ucf64\ud558\uac8c \uc548\uc2dd\ud560 \uac83\uc785\ub2c8\ub2e4.\n\n---\n\n# \ud83c\udf3f \ucc45\ucd94\ub0a8 \uc2ec\uce35 \ud574\uc124: \ub3c5\ub9cc\uad8c\uc11c(\u8b80\u842c\u5377\u66f8)\uc758 \ud798\uc73c\ub85c\n\n**\uc5d0\uba38\uc2a8\uacfc \ub3d9\uc11c\uc591 \uace0\uc804\uc744 \uc787\uace0, \uc624\ub298 \ub3c5\uc790 \uc5ec\ub7ec\ubd84\uc758 \uc0b6\uc5d0 \uc9c1\uc811 \uc5f0\uacb0\ud569\ub2c8\ub2e4.**\n\n![\uc2ec\uce35\ud574\uc124](images/scene_commentary.png)\n\n## \uc2ec\uce35 \ud574\uc124 01: \uc6b4(\u904b)\uc774 \uc88b\uc544\uc9c0\ub294 \uc0ac\ub78c\uc758 \ube44\ubc00\n### '\ub300\ub839(The Over-Soul)'\uc744 \ud604\ub300\uc5b4\ub85c \ubc88\uc5ed\ud558\uba74 \ubb34\uc5c7\uc778\uac00\n\n![\uc6b4\uc774\uc88b\uc544\uc9c0\ub294\ube44\ubc00](images/scene_commentary_lucky.png)\n\n**\ub3d9\uc11c\uc591 \uc9c0\ud61c\uc758 \uc218\ub834 \u2014 \uc778\ub958\ub294 \uac19\uc740 \uac83\uc744 \ub2e4\ub978 \uc774\ub984\uc73c\ub85c \ubd88\ub7ec\uc654\ub2e4**\n\n\ub3c5\uc790 \uc5ec\ub7ec\ubd84, \ucc45\ucd94\ub0a8\uc774 \uc218\uc2ed \ub144\uac04 \uc5f0\uad6c\ud55c \uacb0\uacfc\ub97c \ub9d0\uc500\ub4dc\ub9bd\ub2c8\ub2e4. \"\ub4e4\uc73c\uba74 \ub4e4\uc744\uc218\ub85d \uc6b4\uc774 \uc88b\uc544\uc9c4\ub2e4\"\ub294 \uac83, \uc800\ub294 \uc9c4\uc2ec\uc73c\ub85c \ubbff\uc2b5\ub2c8\ub2e4. \uadf8 \uc6d0\ub9ac\uac00 \ubc14\ub85c \uc5d0\uba38\uc2a8\uc758 \ub300\ub839(The Over-Soul) \uac1c\ub150\uc5d0 \uc788\uc2b5\ub2c8\ub2e4.\n\n| \ud604\ub300 \uac1c\ub150 | \ub300\ub839(The Over-Soul)\uacfc\uc758 \uc5f0\uacb0 | \ucc45\ucd94\ub0a8 \ud55c\uc904 \uc694\uc57d |\n| --- | --- | --- |\n| **\ub04c\uc5b4\ub2f9\uae40\uc758 \ubc95\uce59** | \ub300\ub839(The Over-Soul) \uc548\uc5d0\uc11c \ubaa8\ub4e0 \uac83\uc774 \uc5f0\uacb0 \u2192 \ub0b4\uac00 \ubc29\ucd9c\ud558\ub294 \uac83\uc774 \ub3cc\uc544\uc628\ub2e4 | \uc5f0\uacb0\ub418\uc5b4\uc57c \ub04c\uc5b4\ub2f9\uae34\ub2e4 |\n| **\uc735\uc758 \uc9d1\ub2e8 \ubb34\uc758\uc2dd** | \ubaa8\ub4e0 \uc778\uac04\uc774 \uacf5\uc720\ud558\ub294 \ub354 \uae4a\uc740 \ubb34\uc758\uc2dd\uc758 \uce35 | \ubcf4\uc774\uc9c0 \uc54a\ub294 \uc5f0\uacb0\ub9dd |\n| **\ud78c\ub450\uad50 \ube0c\ub77c\ud750\ub9cc** | \uac1c\ubcc4 \uc544\ud2b8\ub9cc(\uc790\uc544)\uc774 \ube0c\ub77c\ud750\ub9cc\uc758 \uc77c\ubd80\ub77c\ub294 \uad6c\uc870 | \ud30c\ub3c4\uac00 \ubc14\ub2e4\uc758 \uc77c\ubd80\uc778 \uac83\ucc98\ub7fc |\n| **\ud50c\ub85c\uc6b0 \uc0c1\ud0dc \uacbd\ud5d8** | \uc790\uc544\uac00 \uc0ac\ub77c\uc9c0\uace0 \ud589\uc704\uc640 \ud558\ub098\uac00 \ub418\ub294 \ucd5c\uc801 | \uc5f0\uacb0\uc774 \uc5f4\ub9ac\ub294 \uc21c\uac04 |\n| **\ub3c4\uad50\uc758 \ub3c4(\u9053)** | \ub9d0\ud560 \uc218 \uc5c6\ub294 \uadfc\uc6d0, \ud750\ub984\uc5d0 \ub9e1\uae30\ub294 \uc0b6 | \ub9c9\uc9c0 \ub9d0\uace0 \ud758\ub824\ub77c |\n| **\uc6b4(\u904b)\uc758 \uacfc\ud559** | \ub9ac\ucc98\ub4dc \uc640\uc774\uc988\uba3c \uc5f0\uad6c: \uc6b4\uc774 \uc88b\uc740 \uc0ac\ub78c\uc740 \ud604\uc7ac\uc5d0 \uc5f4\ub824\uc788\ub2e4 | \ud604\uc7ac\uac00 \uc5f4\ub824\uc57c \uc6b4\uc774 \ub4e4\uc5b4\uc628\ub2e4 |\n\n\ud83d\udca1 **\ucc45\ucd94\ub0a8 \uc778\uc0ac\uc774\ud2b8**\n\ub3c5\uc790 \uc5ec\ub7ec\ubd84, \uacb0\ub860\uc740 \ud558\ub098\uc785\ub2c8\ub2e4. \uc6b4\uc774 \uc88b\uc544\uc9c0\ub294 \uac83 = \ub300\ub839(The Over-Soul)\uacfc\uc758 \uc5f0\uacb0\uc774 \ud68c\ubcf5\ub418\ub294 \uac83. \uadf8 \uc5f0\uacb0\uc744 \ub9c9\ub294 \uac83\uc740 \uacfc\uac70\uc5d0 \ub300\ud55c \ud6c4\ud68c, \ubbf8\ub798\uc5d0 \ub300\ud55c \ubd88\uc548, \uc790\uc544\uc5d0 \ub300\ud55c \uacfc\uc789 \uc9d1\ucc29\uc785\ub2c8\ub2e4. \uadf8\uac83\ub4e4\uc744 \ub0b4\ub824\ub193\uc744\uc218\ub85d, \ud750\ub984\uc774 \uc0b4\uc544\ub0a9\ub2c8\ub2e4. \uc5d0\uba38\uc2a8\uc774 \uc774\uac83\uc744 1841\ub144\uc5d0 \ub9d0\ud588\uace0, \ucc45\ucd94\ub0a8\uc774 \ub9cc \uad8c \ub3c5\uc11c \ub05d\uc5d0 \uac19\uc740 \uacb0\ub860\uc744 \uc5bb\uc5c8\uc2b5\ub2c8\ub2e4.\n\n---\n\n## \uc2ec\uce35 \ud574\uc124 02: \uc5d0\uba38\uc2a8\uc774 \ub3d9\uc591 \uace0\uc804\uc744 \ub9cc\ub0a0 \ub54c\n### \ub180\ub77c\uc6b4 \ud3c9\ud589\uc120 \u2014 \ucc45\ucd94\ub0a8\uc774 \ub9cc \uad8c\uc5d0\uc11c \ubc1c\uacac\ud55c \uc218\ub834\uc810\n\n![\ub3d9\uc591\uace0\uc804](images/scene_commentary_eastwest.png)\n\n\ub3c5\uc790 \uc5ec\ub7ec\ubd84, \ucc45\ucd94\ub0a8\uc774 \ub3d9\uc591 \uace0\uc804\uacfc \uc11c\uc591 \ucca0\ud559\uc744 \uc218\uc2ed \ub144\uac04 \ud568\uaed8 \uc77d\uc73c\uba74\uc11c \ubc1c\uacac\ud55c \uac00\uc7a5 \ub180\ub77c\uc6b4 \uc0ac\uc2e4\uc774 \uc788\uc2b5\ub2c8\ub2e4. \uac00\uc7a5 \uae4a\uc774 \ud310 \uc0ac\ub78c\ub4e4\uc740 \uacb0\uad6d \uac19\uc740 \uac83\uc744 \ub9cc\ub0a9\ub2c8\ub2e4.\n\n| \uc5d0\uba38\uc2a8\uc758 \ud45c\ud604 | \ub3d9\uc591 \ucca0\ud559 | \ucc45\ucd94\ub0a8 \ud574\uc124 |\n| --- | --- | --- |\n| **\ub300\ub839(The Over-Soul)** | \ube0c\ub77c\ud750\ub9cc / \ubd88\uc131(\u4f5b\u6027) / \ub3c4(\u9053) | \ub2e4\ub978 \uc774\ub984, \uac19\uc740 \uc6d0\ucc9c |\n| **\"\uc6d0\ucc9c\uc774 \uc228\uaca8\uc9c4 \uac15\ubb3c\"** | \ubb34\uc704(\u7121\u7232) \u00b7 \uc790\uc5f0(\u81ea\u7136) | \ub9c9\uc9c0 \ub9d0\uace0 \ud750\ub974\uac8c \ud558\ub77c |\n| **\"\uc790\uc544\ub97c \ub0b4\ub824\ub193\uc544\ub77c\"** | \ubb34\uc544(\u7121\u6211) \u00b7 \uadf9\uae30\ubcf5\ub840(\u514b\u5df1\u5fa9\u79ae) | \uc5d0\uace0\uac00 \uc904\uba74 \ud750\ub984\uc774 \uc0b0\ub2e4 |\n| **\"\uc9c4\ub9ac\ub294 \ub9d0\uc774 \uc544\ub2c8\ub2e4\"** | \ub3c4\uac00\ub3c4\ube44\uc0c1\ub3c4(\u9053\u53ef\u9053\u975e\u5e38\u9053) | \uacbd\ud5d8\ub9cc\uc774 \uc9c4\uc9dc\ub2e4 |\n| **\"\ud558\ub098\uac00 \ubaa8\ub450\ub97c \ud488\ub294\ub2e4\"** | \ubc94\uc544\uc77c\uc5ec(\u68b5\u6211\uc77c\uc5ec) \u00b7 \uc77c\uc989\ub2e4(\u4e00\u537d\u591a) | \uc5f0\uacb0\uc774 \uc804\ubd80\ub2e4 |\n| **\"\ud604\uc7ac\uc5d0 \uc644\uc804\ud788 \uc788\uc5b4\ub77c\"** | \uc9c0\uad00\ud0c0\uc88c(\u53ea\u7ba1\u6253\u5750) \u00b7 \uc9c0\uae08 \uc774 \uc21c\uac04 | \ud604\uc7ac\uac00 \uc6b4\uc758 \ud1b5\ub85c\ub2e4 |\n\n\ud83d\udca1 **\ucc45\ucd94\ub0a8\uc758 \uc9c1\uc811 \uacbd\ud5d8**\n\uc800\ub294 \uc5d0\uba38\uc2a8\uc744 \ucc98\uc74c \uc77d\uace0 \ub098\uc11c \u300c\ub3c4\ub355\uacbd\u300d\uc744 \ub2e4\uc2dc \uc77d\uc5c8\uc2b5\ub2c8\ub2e4. \uadf8\uc804\uc5d0\ub294 \ub2e4\ub978 \ucc45\ucc98\ub7fc \ud3c9\ubc94\ud558\uac8c \uc77d\ud614\ub358 \ub178\uc790\uac00, \uc5d0\uba38\uc2a8\uc758 \ub208\uc73c\ub85c \ubcf4\ub2c8 \uc644\uc804\ud788 \ub2e4\ub978 \ucc45\uc774 \ub418\uc5c8\uc2b5\ub2c8\ub2e4. \ub178\uc790\uc758 \ubaa8\ub4e0 \ubb38\uc7a5\uc5d0\uc11c \uc5d0\uba38\uc2a8\uc744 \ub9cc\ub0ac\uc2b5\ub2c8\ub2e4. \uadf8 \ub2e4\uc74c\uc5d0\ub294 \u300c\uc6b0\ud30c\ub2c8\uc0e4\ub4dc\u300d\ub97c \uc77d\uc5c8\uc2b5\ub2c8\ub2e4. \ube0c\ub77c\ud750\ub9cc\uacfc \uc544\ud2b8\ub9cc\uc758 \uad00\uacc4\uac00 \uc5d0\uba38\uc2a8\uc758 Over-Soul\uacfc \uac1c\uc778 \uc601\ud63c\uc758 \uad00\uacc4\uc640 \uad6c\uc870\uc801\uc73c\ub85c \ub3d9\uc77c\ud588\uc2b5\ub2c8\ub2e4. \uadf8 \ub2e4\uc74c\uc5d0\ub294 \ubd88\uad50 \uc720\uc2dd\uc0ac\uc0c1\uc744, \uc7a5\uc790\ub97c, \uc655\uc591\uba85\uc758 \uc591\uc9c0\ub860\uc744 \uc77d\uc5c8\uc2b5\ub2c8\ub2e4. \ubaa8\ub450 \uac19\uc740 \uacf3\uc744 \uac00\ub9ac\ud0a4\uace0 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \uadf8\ub54c \ucc98\uc74c\uc73c\ub85c \ud655\uc2e0\ud588\uc2b5\ub2c8\ub2e4. \uc778\ub958\uc758 \uc9c0\ud61c\ub294 \ud558\ub098\ub2e4. \uc5d0\uba38\uc2a8\uc740 \uadf8\uac83\uc744 \ubbf8\uad6d\uc758 \uc5b8\uc5b4\ub85c \ud45c\ud604\ud55c \uc0ac\ub78c\uc785\ub2c8\ub2e4.\n\n---\n\n## \uc2ec\uce35 \ud574\uc124 03: \ube44\uc6cc\uc57c \ucc44\uc6cc\uc9c4\ub2e4\n### \ub3c5\uc790 \uc5ec\ub7ec\ubd84\uc744 \uc704\ud55c \uc2e4\uc804 \uc218\ud589\ubc95 3\uac00\uc9c0\n\n**\ube44\uc6c0\uc740 \ud3ec\uae30\uac00 \uc544\ub2c8\ub2e4 \u2014 \ub354 \ud070 \uac83\uc744 \ub2f4\uae30 \uc704\ud55c \uc900\ube44\ub2e4**\n\n\ub3c5\uc790 \uc5ec\ub7ec\ubd84, \uc774 \ud574\uc124\uc5d0\uc11c \ucc45\ucd94\ub0a8\uc774 \uc9c1\uc811 \uc2e4\ucc9c\ud558\uace0 \uac80\uc99d\ud55c 3\uac00\uc9c0 \uc218\ud589\ubc95\uc744 \ub4dc\ub9bd\ub2c8\ub2e4. \ud589\ub9cc\ub9ac\ub85c(\u884c\u842c\u91cc\u8def)\uc758 \uc815\uc2e0\uc73c\ub85c \u2014 \uc77d\ub294 \uac83\uc5d0\uc11c \uba48\ucd94\uc9c0 \ub9d0\uace0, \uc9c1\uc811 \ud574\ubcf4\uc138\uc694.\n\n1. **\uc218\ud589 1 \u2014 \ud558\ub8e8 5\ubd84 \ud604\uba85\ud55c \uce68\ubb35 (\uc5d0\uba38\uc2a8\uc758 \"wise silence\")**\n   \ub9e4\uc77c 5\ubd84, \uc544\ubb34\uac83\ub3c4 \ud558\uc9c0 \uc54a\ub294 \uc2dc\uac04\uc744 \ub9cc\ub4dc\uc138\uc694. \ud3f0\ub3c4, \uc74c\uc545\ub3c4, \uc0dd\uac01\ub3c4 \uc5c6\uc774. \ucc98\uc74c\uc5d0\ub294 \ubd88\ud3b8\ud569\ub2c8\ub2e4. \uadf8 \ubd88\ud3b8\ud568\uc774 \ub2f9\uc2e0\uc774 \uc5bc\ub9c8\ub098 \uc678\ubd80 \uc790\uadf9\uc5d0 \uc758\uc874\ud558\ub294\uc9c0\ub97c \ubcf4\uc5ec\uc90d\ub2c8\ub2e4. \n   > **\ucc45\ucd94\ub0a8 \uacbd\ud5d8:** \uc800\ub294 \uc774 \uc218\ud589\uc744 10\ub144 \ub118\uac8c \ud574\uc654\uc2b5\ub2c8\ub2e4. \uc81c\uac00 \uc4f4 \ucc45\ub4e4\uc758 \uac00\uc7a5 \uc88b\uc740 \uc544\uc774\ub514\uc5b4\ub294 \ubaa8\ub450 \uc774 \uce68\ubb35\uc758 \uc2dc\uac04\uc5d0\uc11c \ub098\uc654\uc2b5\ub2c8\ub2e4.\n\n2. **\uc218\ud589 2 \u2014 \ud655\uc2e0\uc774 \uc624\uba74 24\uc2dc\uac04 \uc548\uc5d0 \ud589\ub3d9\ud558\ub77c**\n   \ub300\ub839(The Over-Soul)\uc5d0\uc11c \uc624\ub294 \ud1b5\ucc30\uc740 \uc989\uac01\uc801\uc774\uace0 \uc9c1\uad00\uc801\uc785\ub2c8\ub2e4. \"\uc774\uac70\ub2e4!\" \uc2f6\uc740 \uc21c\uac04\uc774 \uc635\ub2c8\ub2e4. \uadf8\uac83\uc744 \ubd84\uc11d\ud558\uace0 \uc8fc\uc800\ud558\uace0 \ub0a8\uc758 \uc758\uacac\uc744 \ubaa8\uc73c\ub294 \uacfc\uc815\uc5d0\uc11c \ud76c\uc11d\ub429\ub2c8\ub2e4. \n   > **\ucc45\ucd94\ub0a8 \uacbd\ud5d8:** \uc81c\uac00 \ucc45\ucd94\ub0a8TV\ub97c \uc2dc\uc791\ud55c \uac83\ub3c4, \ub098\ube44\uc2a4\ucfe8\uc744 \ub9cc\ub4e0 \uac83\ub3c4, \ucc98\uc74c \ucc45\uc744 \uc4f4 \uac83\ub3c4 \u2014 \ubaa8\ub450 \uadf8 \uc9c1\uad00\uc744 \ub530\ub978 \uacb0\uc815\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ubd84\uc11d\uc774 \uba3c\uc800\uc600\ub2e4\uba74 \uc544\ubb34\uac83\ub3c4 \ubabb \ud588\uc744 \uac81\ub2c8\ub2e4.\n\n3. **\uc218\ud589 3 \u2014 \uacb0\uacfc\uc5d0\uc11c \ub9c8\uc74c\uc744 \ub193\uc544\ub77c (\uc5d0\uba38\uc2a8\uc758 \"negligency of trust\")**\n   \ucd5c\uc120\uc744 \ub2e4\ud558\ub418 \uacb0\uacfc\uc5d0 \uc9d1\ucc29\ud558\uc9c0 \ub9c8\uc138\uc694. \uc774\uac83\uc774 \ud78c\ub450\uad50\uc758 \ub098\uc774\uc26c\uce74\ub974\ub9c8(nishkama karma)\uc774\uace0, \uc5d0\uba38\uc2a8\uc758 \"\ud0dc\uc5f0\ud568\uc758 \uc2e0\ub8b0\"\uc785\ub2c8\ub2e4. \n   > **\ucc45\ucd94\ub0a8 \uacbd\ud5d8:** \uc601\uc0c1 \uc870\ud68c\uc218\uc5d0 \uc9d1\ucc29\ud560 \ub54c \uc544\uc774\ub514\uc5b4\uac00 \ub9c9\ud788\uace0, \ub0b4\ub824\ub193\uc73c\uba74 \uc624\ud788\ub824 \uc88b\uc740 \ucf58\ud150\uce20\uac00 \ub098\uc654\uc2b5\ub2c8\ub2e4. \ub2f9\uc2e0\uc5d0\uac8c \uc88b\uc740 \uac83\uc740 \ub2f9\uc2e0\uc5d0\uac8c\ub85c \uc635\ub2c8\ub2e4 \u2014 \ub2f9\uc2e0\uc774 \uadf8\uac83\uc744 \uc7a1\uc73c\ub824 \ud558\uc9c0 \uc54a\uc744 \ub54c\ub3c4.\n\n---\n\n## \uc2ec\uce35 \ud574\uc124 04: \ucc45\ucd94\ub0a8\uc758 \ub3c5\uc11c \uc778\uc0dd\uc744 \ubc14\uafbc \uc138 \ubb38\uc7a5\n### \ub9cc \uad8c \ub3c5\uc11c \ub05d\uc5d0 \ub0a8\uc740 \uac83\ub4e4\n\n\ud83d\udcd6 **\uccab \ubc88\uc9f8 \ubb38\uc7a5**\n> \"Man is a stream whose source is hidden.\"  \n> \uc778\uac04\uc740 \uadf8 \uc6d0\ucc9c\uc774 \uc228\uaca8\uc9c4 \uac15\ubb3c\uc774\ub2e4.\n\n\uc774 \ubb38\uc7a5\uc744 \ucc98\uc74c \uc77d\uc5c8\uc744 \ub54c, \uc800\ub294 \ucf58\ud150\uce20 \uc81c\uc791\uc790\ub85c\uc11c\uc758 \uc624\ub79c \ucf64\ud50c\ub809\uc2a4\uac00 \ud55c \uacb9 \ubc97\uaca8\uc9c0\ub294 \uacbd\ud5d8\uc744 \ud588\uc2b5\ub2c8\ub2e4. \"\ub0b4 \uc601\uc0c1\uc774 \ubd80\uc871\ud558\ub2e4\"\ub294 \uc0dd\uac01 \ub300\uc2e0 \"\ub098\ub294 \uc544\uc9c1 \uc6d0\ucc9c\uacfc \ucda9\ubd84\ud788 \uc5f0\uacb0\ub418\uc5b4 \uc788\uc9c0 \uc54a\ub2e4\"\ub294 \uad00\uc810\uc774 \uc0dd\uacbc\uc2b5\ub2c8\ub2e4. \ub2a5\ub825\uc758 \ubb38\uc81c\uac00 \uc544\ub2c8\ub77c \uc5f0\uacb0\uc758 \ubb38\uc81c\uc600\uc2b5\ub2c8\ub2e4. \uadf8 \uad00\uc810\uc758 \uc804\ud658\uc774 \ucc45\ucd94\ub0a8TV\ub97c \ubc14\uafe8\uc2b5\ub2c8\ub2e4.\n\n\ud83d\udcd6 **\ub450 \ubc88\uc9f8 \ubb38\uc7a5**\n> \"We know better than we do.\"  \n> \uc6b0\ub9ac\ub294 \uc6b0\ub9ac\uac00 \ud589\ub3d9\ud558\ub294 \uac83\ubcf4\ub2e4 \ub354 \uc798 \uc548\ub2e4.\n\n\uc774\uac83\uc740 \ucc45\ucd94\ub0a8\uc774 \ub3c5\uc790 \uc5ec\ub7ec\ubd84\uaed8 \uac00\uc7a5 \uc790\uc8fc \ub4dc\ub9ac\ub294 \ub9d0 \uc911 \ud558\ub098\uc785\ub2c8\ub2e4. \ub354 \ub9ce\uc740 \ucc45\uc744 \uc77d\uae30 \uc804\uc5d0, \uc774\ubbf8 \uc544\ub294 \uac83\uc744 \uc0ac\uc138\uc694. \ub3c5\ub9cc\uad8c\uc11c(\u8b80\u842c\u5377\u66f8)\ub294 \ud589\ub9cc\ub9ac\ub85c(\u884c\u842c\u91cc\u8def) \uc5c6\uc774 \uc808\ubc18\uc785\ub2c8\ub2e4. \uc218\ub9cc \uad8c\uc744 \uc77d\uace0 \ub098\uc11c\uc57c \u2014 \uacb0\uad6d \ub0a8\ub294 \uac83\uc740 \uba87 \uac1c\uc758 \ubb38\uc7a5\uc774\ub2e4 \u2014 \uc5d0\uba38\uc2a8\uc774 \uc774\uac83\uc744 \uc774\ubbf8 \ub9d0\ud588\uc2b5\ub2c8\ub2e4.\n\n\ud83d\udcd6 **\uc138 \ubc88\uc9f8 \ubb38\uc7a5**\n> \"Every friend whom not thy fantastic will, but the great and tender heart in thee craveth, shall lock thee in his embrace.\"  \n> \ub2f9\uc2e0 \uc548\uc758 \uc704\ub300\ud558\uace0 \ubd80\ub4dc\ub7ec\uc6b4 \ub9c8\uc74c\uc774 \uc9c4\uc815\uc73c\ub85c \uc6d0\ud558\ub294 \uce5c\uad6c\ub294, \ubc18\ub4dc\uc2dc \ub2f9\uc2e0\uc744 \uadf8\uc758 \ud488\uc5d0 \ub9de\uc544\ub4e4\uc77c \uac83\uc774\ub2e4.\n\n\ub3c5\uc790 \uc5ec\ub7ec\ubd84, \uc81c\uac00 \ucc45\ucd94\ub0a8TV\ub97c \ud1b5\ud574 \ub9cc\ub09c \uac00\uc7a5 \uc18c\uc911\ud55c \uc778\uc5f0\ub4e4\uc740 \u2014 \uad6c\ud558\uc9c0 \uc54a\uc558\uc744 \ub54c, \uadf8\ub0e5 \ub098 \uc790\uc2e0\uc73c\ub85c \uc788\uc5c8\uc744 \ub54c \uc654\uc2b5\ub2c8\ub2e4. \uc9c4\uc2ec\uc774 \uc9c4\uc2ec\uc744 \ub04c\uc5b4\ub2f9\uae41\ub2c8\ub2e4. \uc5d0\uba38\uc2a8\uc758 \ub04c\uc5b4\ub2f9\uae40\uc740 \uc774\uac83\uc785\ub2c8\ub2e4.\n\n---\n\n## \ud83e\udd8b [\ucc45\ucd94\ub0a8\uc758 \uc2ec\uce35 \ud574\uc81c] \uc5d0\uace0\uc758 \uac8c\uc784\uc5d0\uc11c \uc9c4\uc9dc \ubc31\uc870\ub85c\n\n![\ud574\uc81c](images/scene_commentary.png)\n\n\uc548\ub155\ud558\uc138\uc694, \ucc45\ucd94\ub0a8\uc785\ub2c8\ub2e4. \uc5ec\ub7ec\ubd84, \uc624\ub298 \uc6b0\ub9ac\uac00 \ud568\uaed8 \ub9cc\ub09c \uc5d0\uba38\uc2a8\uc758 \u2018\ub300\ub839(The Over-Soul)\u2019\uc740 \uc0ac\uc2e4 \uc6b0\ub9ac \uc0b6\uc758 \uac8c\uc784\uc744 \uc644\uc804\ud788 \ubc14\uafb8\ub294 \uac15\ub825\ud55c \ucd08\ub300\uc7a5\uc785\ub2c8\ub2e4.\n\n\uc6b0\ub9ac\ub294 \ud3c9\uc18c\uc5d0 \uc5b4\ub5bb\uac8c \uc0b4\uace0 \uc788\ub098\uc694? \ub298 \ub0a8\ubcf4\ub2e4 \ub4a4\ucc98\uc9c8\uae4c \ubd10 \ubd88\uc548\ud558\uace0, \ub3c8\uacfc \uba85\uc608\ub77c\ub294 \ubaa8\uc774\ub97c \ucad3\uc544\ub2e4\ub2c8\ub294 \u2018\ubbf8\uc6b4 \uc624\ub9ac \uc0c8\ub07c\u2019\uc758 \ubaa8\uc2b5\uc73c\ub85c \uc0b4\uace0 \uc788\uc9c0\ub294 \uc54a\ub098\uc694? \uc774\uac83\uc774 \ubc14\ub85c \uc81c\uac00 \ub298 \ub9d0\uc500\ub4dc\ub9ac\ub294 **\u2018\uc5d0\uace0(Ego)\uc758 \uac00\uc9dc \uac8c\uc784\u2019**\uc785\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \uc5d0\uba38\uc2a8\uc774 \ub9d0\ud558\ub294 \u2018\ub300\ub839(The Over-Soul)\u2019\uc5d0 \uc811\uc18d\ud558\ub294 \uc21c\uac04, \uc6b0\ub9ac\ub294 \ub180\ub77c\uc6b4 \uc0ac\uc2e4\uc744 \ubc1c\uacac\ud558\uac8c \ub429\ub2c8\ub2e4. \uc6b0\ub9ac\ub294 \uc6d0\ub798 \uc624\ub9ac\uac00 \uc544\ub2c8\ub77c, \ud478\ub978 \ud558\ub298\uc744 \ub0a0\uc544\uc624\ub97c \uc218 \uc788\ub294 **\u2018\ubc31\uc870\u2019**\uc600\ub2e4\ub294 \uc0ac\uc2e4\uc774\uc8e0. \n\n\uc5d0\uba38\uc2a8\uc774 \ub9d0\ud55c \ub300\ub839(The Over-Soul)\uc740 \uc6b0\ub9ac \ubaa8\ub450\uac00 \uc5f0\uacb0\ub41c \uac70\ub300\ud55c \uc6b0\uc8fc\uc758 \uc640\uc774\ud30c\uc774\uc640 \uac19\uc2b5\ub2c8\ub2e4. \uc5ec\ub7ec\ubd84\uc774 \uc560\uc368 \uc560\ubc8c\ub808\ucc98\ub7fc \ub545\uc744 \uae30\uc5b4 \ub2e4\ub2c8\uba70 \ub178\ub825\ud558\ub294 \uac83\ubcf4\ub2e4, \ub098\ube44\ub85c \ubcc0\ud0dc\ud558\uc5ec \ubc14\ub78c\uc758 \ud750\ub984\uc5d0 \ubab8\uc744 \ub9e1\uae30\ub294 \uac83\uc774 \ud6e8\uc52c \ub354 \uba40\ub9ac, \ub354 \uc544\ub984\ub2f5\uac8c \ub0a0 \uc218 \uc788\ub294 \ube44\uacb0\uc785\ub2c8\ub2e4. \uc5ec\ub7ec\ubd84 \uc548\uc5d0 \uc774\ubbf8 \uadf8 \uc704\ub300\ud55c \ub098\ube44\uc758 \ub0a0\uac1c\uac00 \uc788\ub2e4\ub294 \uac83\uc744 \ubbff\uc73c\uc138\uc694.\n\n---\n\n## \ud83c\udf0f [3\ub300 \uc601\uc131 \ub3c4\uc11c \uc785\uccb4 \ubd84\uc11d] \ub300\ub839\uc758 \ud604\ub300\uc801 \uc7ac\ud574\uc11d\n\n![\uc785\uccb4\ubd84\uc11d](images/scene_commentary_eastwest.png)\n\n\uc5d0\uba38\uc2a8\uc758 \ucd08\uc6d4\uc8fc\uc758 \uc0ac\uc0c1\uc740 \ud604\ub300 \uc601\uc131 \uac70\uc7a5\ub4e4\uc758 \uac00\ub974\uce68\uacfc\ub3c4 \uc644\ubcbd\ud558\uac8c \uacf5\uba85\ud569\ub2c8\ub2e4.\n\n### 1. \uc0ac\uc774\ud1a0 \ud788\ud1a0\ub9ac \u300a1\ud37c\uc13c\ud2b8 \ubd80\uc790\uc758 \ubc95\uce59\u300b : \ub0b4 \uc548\uc758 \uc2e0\uc131\uc744 \ubbff\ub294 \ud798\n\uc77c\ubcf8\uc758 \ub0a9\uc138 \uc655 \uc0ac\uc774\ud1a0 \ud788\ud1a0\ub9ac \uc528\ub294 \"\ubabb \ud560 \uac83\ub3c4 \uc5c6\uc9c0!\"\ub77c\uace0 \ub9d0\ud558\ub294 \uc2b5\uad00\uc774 \uc65c \uc911\uc694\ud55c\uc9c0 \uac15\uc870\ud569\ub2c8\ub2e4. \uc774\uac83\uc740 \ub2e8\uc21c\ud788 \uae0d\uc815\uc801\uc778 \uc0dd\uac01\uc744 \ud558\ub77c\ub294 \uac83\uc774 \uc544\ub2d9\ub2c8\ub2e4. \uc5d0\uba38\uc2a8\uc774 \ub9d0\ud55c \u2018\ub0b4 \uc548\uc758 \uc2e0\uc131(\ub300\ub839)\u2019\uc744 \uc804\uc801\uc73c\ub85c \ubbff\uace0, \uc6b0\uc8fc\uc758 \uac70\ub300\ud55c \uc6b4\uc744 \ub0b4 \ud3b8\uc73c\ub85c \ub9cc\ub4dc\ub294 \uae30\uc220\uc785\ub2c8\ub2e4. \uc774 \uc808\ub300\uc801 \uc2e0\ub8b0\uac00 \ubc14\ub85c \ud788\ud1a0\ub9ac \uc528\uac00 \ub9d0\ud558\ub294 '\uc6b4'\uc758 \uc2e4\uccb4\uc785\ub2c8\ub2e4.\n\n### 2. \uc6e8\uc778 \ub2e4\uc774\uc5b4 \u300a\uc778\uc2a4\ud53c\ub808\uc774\uc158\u300b : \uc601\uac10 \uc18d\uc5d0 \uc0ac\ub294 \uc0b6\n\uc6e8\uc778 \ub2e4\uc774\uc5b4 \ubc15\uc0ac\ub294 \u2018\uc601\uac10(In-Spirit)\u2019 \uc18d\uc5d0 \uc0b0\ub2e4\ub294 \uac83\uc774 \uace7 \uc6b0\uc8fc\uc758 \uadfc\uc6d0\uacfc \uc5f0\uacb0\ub418\ub294 \uac83\uc774\ub77c\uace0 \ub9d0\ud569\ub2c8\ub2e4. \uc5d0\uba38\uc2a8\uc774 \ub9d0\ud55c \u201c\uc2dc\uac04\uacfc \uacf5\uac04\uc744 \ucd08\uc6d4\ud55c \uc601\ud63c\u201d\uc774 \uc6b0\ub9ac \ubab8\uc744 \ud1b5\ud574 \ub4dc\ub7ec\ub098\ub294 \uc0c1\ud0dc\uac00 \ubc14\ub85c \uc778\uc2a4\ud53c\ub808\uc774\uc158\uc785\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uc601\uac10 \uc18d\uc5d0 \uc788\uc744 \ub54c, \uc6b0\ub9ac\ub294 \ub354 \uc774\uc0c1 \uc5d0\uace0\uac00 \uc544\ub2cc \ub300\ub839(The Over-Soul)\uc758 \ub3c4\uad6c\ub85c \uc4f0\uc774\uac8c \ub429\ub2c8\ub2e4.\n\n### 3. \uc5d0\uc774\ube0c\ub7ec\ud584 \ud789\uc2a4 \u300a\uba38\ub2c8 \ub8f0\u300b : \ud48d\uc694\ub97c \ud5c8\uc6a9\ud558\ub294 \uae30\uc220\n\uc5d0\uc774\ube0c\ub7ec\ud584\uc740 \u2018\uc9c4\ub3d9\uc801 \uc77c\uce58\u2019\ub97c \uac15\uc870\ud569\ub2c8\ub2e4. \uc6b0\ub9ac\uac00 \uacb0\ud54d\uc5d0 \uc9d1\uc911\ud558\ub294 \uac83\uc740 \ub300\ub839(The Over-Soul)\uc758 \ud750\ub984\uc744 \ub9c9\ub294 \u2018\uc800\ud56d\u2019\uc785\ub2c8\ub2e4. \uc5d0\uba38\uc2a8\uc774 \u201c\ub2f9\uc2e0\uc5d0\uac8c \uc62c \uac83\uc740 \ubc18\ub4dc\uc2dc \uc628\ub2e4\u201d\uace0 \ub9d0\ud55c \uac83\ucc98\ub7fc, \ud48d\uc694\ub294 \uc774\ubbf8 \ud750\ub974\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uadf8 \uc800\ud56d\uc744 \ub044\uace0 \ub300\ub839(The Over-Soul)\uc758 \ud48d\uc694\ub85c\uc6b4 \ud750\ub984\uc5d0 \ub098\ub97c \uc644\uc804\ud788 \ub0b4\ub9e1\uae30\ub294 \uac83\uc774 \ud48d\uc694\uc758 \ud575\uc2ec \uc6d0\ub9ac\uc785\ub2c8\ub2e4.\n\n---\n\n## \ud83d\ude80 [\uc2e4\uc804 \ub098\ube44 \ud018\uc2a4\ud2b8] \ub300\ub839\uc758 \uc8fc\ud30c\uc218\ub97c \ub9de\ucd94\ub294 3\ub2e8\uacc4 \uc5f0\uc2b5\n\n![\ub098\ube44\ud018\uc2a4\ud2b8](images/scene_commentary_lucky.png)\n\n\uc774\uc81c \uad00\ub150\uc744 \ub118\uc5b4 \uc2e4\uc804\uc73c\ub85c \ub4e4\uc5b4\uac08 \uc2dc\uac04\uc785\ub2c8\ub2e4. \uc624\ub298\ubd80\ud130 \ub531 \uc138 \uac00\uc9c0\ub9cc \uc2e4\ucc9c\ud574 \ubcf4\uc138\uc694.\n\n1. **[1\ub2e8\uacc4] \ub3d9\uc2dc\uc131(Synchronicity) \uc77c\uae30 \uc4f0\uae30**: \n   \uc624\ub298 \ud558\ub8e8, \uc6b0\uc5f0\ud788 \ub9cc\ub09c \uc0ac\ub78c\uc774\ub098 \uc6b0\uc5f0\ud788 \ub4e4\uc740 \ub178\ub798 \uac00\uc0ac \uc18d\uc5d0 \uc228\uaca8\uc9c4 \ub300\ub839(The Over-Soul)\uc758 \uba54\uc2dc\uc9c0\ub97c \ub531 \ud558\ub098\ub9cc \ucc3e\uc544 \uae30\ub85d\ud574 \ubcf4\uc138\uc694. \uc6b0\uc8fc\ub294 \ub298 \uc5ec\ub7ec\ubd84\uc5d0\uac8c \ub9d0\uc744 \uac78\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\n2. **[2\ub2e8\uacc4] \ud558\ub8e8 5\ubd84 '\ud589\uc6b4\uc758 \ub1cc\ud30c' \ub9de\ucd94\uae30**: \n   \uc544\uce68\uc5d0 \ub208\uc744 \ub728\uc790\ub9c8\uc790, \ud639\uc740 \uc7a0\ub4e4\uae30 \uc804 5\ubd84 \ub3d9\uc548 \"\ub098\ub294 \uc774\ubbf8 \ucda9\ubd84\ud558\ub2e4\"\ub294 \ud48d\uc694\uc758 \ub290\ub08c\uc5d0 \uc7a0\uaca8 \ubcf4\uc138\uc694. \uc5d0\uace0\uc758 \ubd88\uc548\ud55c \ub1cc\ud30c\ub97c \ub044\uace0 \ub300\ub839(The Over-Soul)\uc758 \ud3c9\uc628\ud55c \uc8fc\ud30c\uc218\uc5d0 \uc811\uc18d\ud558\ub294 \ud6c8\ub828\uc785\ub2c8\ub2e4.\n\n3. **[3\ub2e8\uacc4] \uc5d0\uace0 \ud544\ud130 \ub044\uae30 (\uc218\uc6a9 \uc5f0\uc2b5)**: \n   \uc624\ub298 \ub098\ub97c \ud654\ub098\uac8c \ud558\uac70\ub098 \uacc4\ud68d\uacfc \ub2e4\ub978 \uc77c\uc774 \uc0dd\uae38 \ub54c, \"\uc774\uac83 \ub610\ud55c \ub300\ub839(The Over-Soul)\uc774 \ub098\ub97c \uc704\ud574 \uc900\ube44\ud55c \uc120\ubb3c\uc774\ub2e4\"\ub77c\uace0 \ub9d0\ud558\uba70 3\ucd08\ub9cc \ubbf8\uc18c \uc9c0\uc5b4 \ubcf4\uc138\uc694. \uac00\uc9dc \uac8c\uc784\uc758 \ud544\ud130\ub97c \ub044\uace0 \uc9c4\uc9dc \uac8c\uc784\uc758 \ud750\ub984\uc744 \ud0c0\ub294 \uc5f0\uc2b5\uc785\ub2c8\ub2e4.\n\n---\n\n## \ud83e\udd8b \ub9fa\uc74c\ub9d0 : \ub3c5\uc790 \uc5ec\ub7ec\ubd84 \uc548\uc758 \ub300\ub839(The Over-Soul)\uc5d0\uac8c\n\n![\ub9fa\uc74c\ub9d0](images/scene_ch5.png)\n\n\ub3c5\uc790 \uc5ec\ub7ec\ubd84, \uc774 \ucc45\uc758 \ub9c8\uc9c0\ub9c9 \ud398\uc774\uc9c0\uc5d0 \uc654\uc2b5\ub2c8\ub2e4. \n1841\ub144\uc758 \uc5d0\uba38\uc2a8\uc774 2026\ub144\uc758 \ub2f9\uc2e0\uc5d0\uac8c \ub9d0\uc744 \uac78\uc5b4\uc654\ub2e4\uba74 \u2014 \uadf8\uac83 \uc790\uccb4\uac00 \ub300\ub839(The Over-Soul)\uc758 \uc99d\uac70\uc785\ub2c8\ub2e4. \uc2dc\uac04\uc758 \ubcbd\uc744 \ubb34\ub108\ub728\ub9ac\ub294 \uadf8 \uacbd\ud5d8, \ucc45\ucd94\ub0a8\uc774 \uc218\uc2ed \ub144 \ub3c5\uc11c\uc5d0\uc11c \uac00\uc7a5 \uc790\uc8fc \ub9cc\ub09c \uadf8 \uacbd\ud5d8\uc774 \ubc14\ub85c \uc5d0\uba38\uc2a8\uc774 \ub9d0\ud55c \ub300\ub839(The Over-Soul)\uc785\ub2c8\ub2e4.\n\n> \"\ub2f9\uc2e0 \uc548\uc5d0 \uc774\ubbf8 \ubaa8\ub4e0 \uac83\uc774 \uc788\uc2b5\ub2c8\ub2e4.  \n> \ub2f9\uc2e0\uc740 \uadf8 \uc6d0\ucc9c\uc774 \uc228\uaca8\uc9c4 \uac15\ubb3c\uc785\ub2c8\ub2e4.  \n> \uadf8 \uc6d0\ucc9c\uc740 \uacb0\ucf54 \ub9c8\ub974\uc9c0 \uc54a\uc2b5\ub2c8\ub2e4.  \n> \u2014 \ub2e4\ub9cc \uc5f0\uacb0\uc774 \ub04a\uc5b4\uc9c8 \ubfd0\uc785\ub2c8\ub2e4.\"\n\n\ub3c5\ub9cc\uad8c\uc11c(\u8b80\u842c\u5377\u66f8) \ud589\ub9cc\ub9ac\ub85c(\u884c\u842c\u91cc\u8def). \ub9cc \uad8c\uc744 \uc77d\uc5b4\ub3c4 \uacb0\uad6d \uc774 \ud558\ub098\uc758 \uc9c4\uc2e4\ub85c \ub3cc\uc544\uc635\ub2c8\ub2e4. \ub2f9\uc2e0 \uc548\uc758 \uc6d0\ucc9c\uacfc \uc5f0\uacb0\ub418\uc138\uc694. \uadf8 \uc5f0\uacb0\uc774 \uc6b4\uc744 \ubc14\uafb8\uace0, \uad00\uacc4\ub97c \ubc14\uafb8\uace0, \uc0b6\uc744 \ubc14\uafc9\ub2c8\ub2e4.\n\n\uc774 \ucc45\uc774 \uadf8 \uc5f0\uacb0\uc758 \uc791\uc740 \uacc4\uae30\uac00 \ub418\uc5c8\uae30\ub97c \uc9c4\uc2ec\uc73c\ub85c \ubc14\ub78d\ub2c8\ub2e4. \ub3c5\uc790 \uc5ec\ub7ec\ubd84, \uac10\uc0ac\ud569\ub2c8\ub2e4.\n\n\u2014 \ucc45\ucd94\ub0a8  \n**\ucc45\ucd94\ub0a8TV \u00b7 \ub3c5\ub9cc\uad8c\uc11c(\u8b80\u842c\u5377\u66f8) \ud589\ub9cc\ub9ac\ub85c(\u884c\u842c\u91cc\u8def)**\n\n---\n\n## \ud83d\udcda \ubd80\ub85d : \ucc45\ucd94\ub0a8 \ucd94\ucc9c \uc5d0\uba38\uc2a8 \uc77d\uae30 \uc21c\uc11c\n### \ub3c5\ub9cc\uad8c\uc11c(\u8b80\u842c\u5377\u66f8)\uc758 \uae38 \u2014 \uc5d0\uba38\uc2a8\uc73c\ub85c \uc2dc\uc791\ud558\ub294 \uc9c0\ud61c\uc758 \uc9c0\ub3c4\n\n![\ubd80\ub85d \ubc30\ub108](images/appendix_banner.png)\n\n[APP_BOX] **1. \uc790\uae30 \uc2e0\ub8b0 (Self-Reliance, 1841) \u2014 \ubb34\uc870\uac74 \uccab \ubc88\uc9f8**<br/><br/>- \uc5d0\uba38\uc2a8 \uc785\ubb38\uc758 \uc808\ub300 \uc815\uc11d. \ud575\uc2ec: \"\ub2f9\uc2e0 \uc790\uc2e0\uc744 \ubbff\uc5b4\ub77c.\"<br/>- <b>\ucc45\ucd94\ub0a8 \ucf54\uba58\ud2b8:</b> \uc774 \uc5d0\uc138\uc774 \ud558\ub098\ub85c \uc778\uc0dd\uc774 \ubc14\ub010 \uc0ac\ub78c\ub4e4\uc774 \uc218\ub3c4 \uc5c6\uc774 \ub9ce\uc2b5\ub2c8\ub2e4. \uc9e7\uc9c0\ub9cc \uac15\ub825\ud569\ub2c8\ub2e4.\n\n[APP_BOX] **2. \ub300\ub839 (The Over-Soul, 1841) \u2014 \uc9c0\uae08 \uc774 \ucc45**<br/><br/>- \uc790\uae30 \uc2e0\ub8b0\uc758 \uc6b0\uc8fc\ub860\uc801 \ud1a0\ub300. \"\uc65c \uc790\uc2e0\uc744 \ubbff\uc5b4\uc57c \ud558\ub294\uac00\"\uc758 \ucca0\ud559\uc801 \uadfc\uac70\ub97c \uc90d\ub2c8\ub2e4.\n\n[APP_BOX] **3. \ubcf4\uc0c1 (Compensation, 1841)**<br/><br/>- \uc138\uc0c1\uc774 \uc5b4\ub5bb\uac8c \uade0\ud615\uc744 \uc774\ub8e8\ub294\uac00. \ub04c\uc5b4\ub2f9\uae40\uc758 \ubc95\uce59\uacfc \uce74\ub974\ub9c8\uc758 \ucca0\ud559\uc801 \uc6d0\ub9ac\ub97c \ub2f4\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\n[APP_BOX] **4. \uc790\uc5f0 (Nature, 1836)**<br/><br/>- \uc5d0\uba38\uc2a8\uc758 \uccab \ub300\uc791, \ucd08\uc6d4\uc8fc\uc758 \uc120\uc5b8\ubb38. \uc790\uc5f0\uc744 \ud1b5\ud574 \uc2e0\uc131\uc744 \ubc1c\uacac\ud558\ub294 \ubc29\ubc95\ub860\uc744 \uc81c\uc2dc\ud569\ub2c8\ub2e4.\n\n[APP_BOX] **5. \uacbd\ud5d8 (Experience, 1844) \u2014 \uac00\uc7a5 \uae4a\uc740 \uc5d0\uba38\uc2a8**<br/><br/>- \uc544\ub4e4\uc744 \uc783\uc740 \ud6c4 \uc4f4 \uc791\ud488. \uc5d0\uba38\uc2a8\uc758 \uae00 \uc911 \uac00\uc7a5 \uc194\uc9c1\ud558\uace0 \uac00\uc7a5 \uae4a\uc740 \ud1b5\ucc30\uc744 \ub2f4\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\n[APP_BOX] **\ud83d\udcd6 \ud568\uaed8 \uc77d\uc73c\uba74 \ub354 \uc88b\uc740 \ucc45\ub4e4 (\ucc45\ucd94\ub0a8 \ucd94\ucc9c)**<br/><br/>- \u300e\uc648\ub4e0\u300f \u2014 \ud5e8\ub9ac \ub370\uc774\ube44\ub4dc \uc18c\ub85c (\uc5d0\uba38\uc2a8 \ucca0\ud559\uc758 \uc2e4\ucc9c\ud310)<br/>- \u300e\ubab0\uc785\uc758 \uc990\uac70\uc6c0\u300f \u2014 \ubbf8\ud558\uc774 \uce59\uc13c\ud2b8\ubbf8\ud558\uc774 (\ub300\ub839=\ud50c\ub85c\uc6b0 \uc0c1\ud0dc)<br/>- \u300e\ud604\uc7ac\uc758 \ud798\u300f \u2014 \uc5d0\ud06c\ud558\ub974\ud2b8 \ud1a8\ub808 (\uc5d0\uba38\uc2a8\uc758 \ud604\ub300\uc801 \uacc4\uc2b9)<br/>- \u300e\ub3c4\ub355\uacbd\u300f \u2014 \ub178\uc790 (\ub3d9\uc11c\uc591 \uc9c0\ud61c\uc758 \uc218\ub834\uc810)<br/>- \u300e\ud589\uc6b4 \uc0ac\uc6a9\ubc95\u300f \u2014 \ucc45\ucd94\ub0a8 \uc800 (\ub300\ub839 \uc6d0\ub9ac\uc758 \uc2e4\uc804 \uc801\uc6a9)\n";

function updateCounts(){document.getElementById("charCount").textContent=E.value.replace(/\s/g,"").length.toLocaleString()+"자"}
function updateLine(){const l=E.value.substring(0,E.selectionStart).split("\n");document.getElementById("lineInfo").textContent="줄 "+l.length+", 열 "+(l[l.length-1].length+1)}
function toggleMode(m){mode=m;document.getElementById("btnEdit").classList.toggle("active",m==="edit");document.getElementById("btnPreview").classList.toggle("active",m==="preview");E.style.display=m==="edit"?"":"none";P.style.display=m==="preview"?"":"none";if(m==="preview")renderPreview()}
function renderPreview(){let m=E.value;m=m.replace(/^### (.*$)/gm,"<h3>$1</h3>");m=m.replace(/^## (.*$)/gm,"<h2>$1</h2>");m=m.replace(/^# (.*$)/gm,"<h1>$1</h1>");m=m.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>");m=m.replace(/\*(.*?)\*/g,"<em>$1</em>");m=m.replace(/^> (.*$)/gm,"<blockquote>$1</blockquote>");m=m.replace(/^---$/gm,"<hr>");m=m.replace(/!\[(.*?)\]\((.*?)\)/g,"<img src=\"$2\" alt=\"$1\">");m=m.replace(/\n\n/g,"</p><p>");P.innerHTML="<p>"+m+"</p>"}
function toggleFind(){document.getElementById("findBar").classList.toggle("open");if(document.getElementById("findBar").classList.contains("open"))document.getElementById("findInput").focus()}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
function doFind(){const t=document.getElementById("findInput").value;if(!t){document.getElementById("findCount").textContent="";return}const n=(E.value.match(new RegExp(escRe(t),"g"))||[]).length;document.getElementById("findCount").textContent=n+"건"}
function doReplace(){const o=document.getElementById("findInput").value,r=document.getElementById("replaceInput").value;if(!o)return;const i=E.value.indexOf(o);if(i===-1)return;pushUndo();E.value=E.value.substring(0,i)+r+E.value.substring(i+o.length);updateCounts();doFind()}
function doReplaceAll(){const o=document.getElementById("findInput").value,r=document.getElementById("replaceInput").value;if(!o)return;pushUndo();E.value=E.value.split(o).join(r);updateCounts();doFind()}
function pushUndo(){undoStack.push(E.value);if(undoStack.length>30)undoStack.shift()}

m=t.match(/["\u201c](.+?)["\u201d]\s*[→\u2192]\s*["\u201c](.+?)["\u201d]/);if(m){pushUndo();const i=E.value.indexOf(m[1]);if(i===-1){addMsg("bot","해당 텍스트를 찾을 수 없습니다.");return}E.value=E.value.substring(0,i)+m[2]+E.value.substring(i+m[1].length);updateCounts();addMsg("bot","\u201c"+shorten(m[1])+"\u201d → \u201c"+shorten(m[2])+"\u201d 수정 완료");return}
m=t.match(/["\u201c](.+?)["\u201d]\s*(?:를|을)\s*["\u201c](.+?)["\u201d]\s*(?:로|으로)\s*(?:수정|변경|바꿔|교체)/);if(m){pushUndo();const i=E.value.indexOf(m[1]);if(i===-1){addMsg("bot","해당 텍스트를 찾을 수 없습니다.");return}E.value=E.value.substring(0,i)+m[2]+E.value.substring(i+m[1].length);updateCounts();addMsg("bot","수정 완료");return}
m=t.match(/(?:끝에|마지막에|맨\s*끝에)\s*(?:추가|삽입)\s*[:：]\s*(.+)/s);if(m){pushUndo();E.value+="\n\n"+m[1].trim();updateCounts();addMsg("bot","맨 끝에 추가 완료");return}
m=t.match(/["\u201c](.+?)["\u201d]\s*(?:뒤에|다음에|아래에)\s*(?:추가|삽입)\s*[:：]\s*(.+)/s);if(m){pushUndo();const i=E.value.indexOf(m[1]);if(i===-1){addMsg("bot","기준 텍스트를 찾을 수 없습니다.");return}const p=i+m[1].length;E.value=E.value.substring(0,p)+"\n\n"+m[2].trim()+E.value.substring(p);updateCounts();addMsg("bot","\u201c"+shorten(m[1])+"\u201d 뒤에 삽입 완료");return}
addMsg("bot","명령 형식:\n\u2022 \"원문\" → \"수정문\"\n\u2022 \"원문\"을 \"수정문\"으로 수정\n\u2022 끝에 추가: 텍스트\n\u2022 \"기준\" 뒤에 추가: 텍스트")}

// Resize
const handle=document.getElementById("resizeHandle"),lp=document.getElementById("leftPanel");let resizing=false;
handle.addEventListener("mousedown",()=>{resizing=true;handle.classList.add("active");document.addEventListener("mousemove",onR);document.addEventListener("mouseup",()=>{resizing=false;handle.classList.remove("active");document.removeEventListener("mousemove",onR)},{once:true})});
function onR(e){if(!resizing)return;lp.style.width=Math.max(200,Math.min(e.clientX,window.innerWidth-350))+"px"}
</script>
